    // ── Swipe gestures ──
    let swipeState = null;
    const SWIPE_THRESHOLD = 80;

    function initSwipeListeners() {
      document.addEventListener('touchstart', function (e) {
        const wrap = e.target.closest('.item-swipe-wrap');
        if (!wrap) return;
        const touch = e.touches[0];
        swipeState = {
          id: wrap.dataset.swipeId,
          startX: touch.clientX,
          startY: touch.clientY,
          el: wrap,
          inner: wrap.querySelector('.item-swipe-inner'),
          bgRight: wrap.querySelector('.swipe-bg-right'),
          bgLeft: wrap.querySelector('.swipe-bg-left'),
          locked: false,
          swiping: false,
        };
      }, { passive: true });

      document.addEventListener('touchmove', function (e) {
        if (!swipeState) return;
        const touch = e.touches[0];
        const dx = touch.clientX - swipeState.startX;
        const dy = touch.clientY - swipeState.startY;

        // If vertical scroll is dominant, cancel swipe
        if (!swipeState.locked && Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 10) {
          swipeState = null;
          return;
        }
        if (Math.abs(dx) > 10) swipeState.locked = true;
        if (!swipeState.locked) return;

        swipeState.swiping = true;
        const clamped = Math.max(-150, Math.min(150, dx));
        swipeState.inner.style.transition = 'none';
        swipeState.inner.style.transform = `translateX(${clamped}px)`;

        // Show/hide swipe indicators
        const indRight = swipeState.el.querySelector('.swipe-indicator-right');
        const indLeft = swipeState.el.querySelector('.swipe-indicator-left');

        if (clamped > SWIPE_THRESHOLD) {
          swipeState.bgRight.classList.add('visible');
          swipeState.bgLeft.classList.remove('visible');
          if (indRight && !indRight.classList.contains('active')) {
            indRight.classList.add('active');
            haptic('light');
          }
          if (indLeft) indLeft.classList.remove('active');
        } else if (clamped < -SWIPE_THRESHOLD) {
          swipeState.bgLeft.classList.add('visible');
          swipeState.bgRight.classList.remove('visible');
          if (indLeft && !indLeft.classList.contains('active')) {
            indLeft.classList.add('active');
            haptic('light');
          }
          if (indRight) indRight.classList.remove('active');
        } else {
          swipeState.bgRight.classList.remove('visible');
          swipeState.bgLeft.classList.remove('visible');
          if (indRight) indRight.classList.remove('active');
          if (indLeft) indLeft.classList.remove('active');
        }
      }, { passive: true });

      document.addEventListener('touchend', function (e) {
        if (!swipeState || !swipeState.swiping) {
          swipeState = null;
          return;
        }
        const inner = swipeState.inner;
        const transform = inner.style.transform;
        const match = transform.match(/translateX\(([-.0-9]+)px\)/);
        const dx = match ? parseFloat(match[1]) : 0;

        inner.style.transition = 'transform 0.2s ease-out';
        inner.style.transform = 'translateX(0)';

        if (dx > SWIPE_THRESHOLD) {
          haptic('success');
          toggle(swipeState.id);
        } else if (dx < -SWIPE_THRESHOLD) {
          haptic('medium');
          setTaskStatus(swipeState.id, STATUS_SKIP);
        }

        swipeState = null;
      }, { passive: true });
    }

    function updateProgressBars() {

      if (taskCount) taskCount.textContent = `${prog.done}/${prog.total} tasks`;

      const weekVal = document.getElementById('week-val');
      if (weekVal) weekVal.textContent = `${wp.done}/${wp.total} \u00b7 ${wp.pct}%`;
      const weekFill = document.querySelector('.weekly-bar-fill');
      if (weekFill) weekFill.style.width = wp.pct + '%';

      document.querySelectorAll('.tab').forEach((tab, i) => {
        const p = getDayProgress(DAYS[i]);
        const bar = tab.querySelector('.tab-progress');
        if (bar) bar.style.width = p.pct + '%';
      });
    }

    function togglePanel(id) {
      openPanels[id] = !openPanels[id];
      _doRender();
    }

    function resetDay() {
      if (isDayLocked(DAYS[selectedDay])) { showToast('Day is locked'); return; }
      showConfirm(`Reset all tasks for ${DAYS[selectedDay]}?`, () => {
        const dayName = DAYS[selectedDay];
        schedule[dayName].sections.forEach(s => s.items.forEach(item => {
          delete checked[item.id];
          delete taskNotes[item.id];
          delete taskDeferred[item.id];
        }));
        saveState();
        render();
        showToast(`${dayName} reset`);
      });
    }

    // ── Progress (cached per render cycle) ──
    let _progressCache = {};
    function invalidateProgressCache() { _progressCache = {}; }

    function getDayProgress(dayName) {
      if (_progressCache[dayName]) return _progressCache[dayName];
      const day = schedule[dayName];
      let total = 0, done = 0, estRemain = 0;
      day.sections.forEach(s => s.items.forEach(item => {
        if (taskDeferred[item.id] && taskDeferred[item.id] !== dayName) return;
        total++;
        const st = getStatus(item.id);
        if (st === STATUS_DONE || st === STATUS_SKIP) done++;
        else estRemain += getEstimate(item);
      }));
      Object.entries(taskDeferred).forEach(([id, target]) => {
        if (target === dayName) {
          // Skip if task originally belongs to this day (already counted in section loop above)
          let isOwnTask = false;
          for (const sec of day.sections) {
            for (const it of sec.items) { if (it.id === id) { isOwnTask = true; break; } }
            if (isOwnTask) break;
          }
          if (isOwnTask) return;
          total++;
          const st = getStatus(id);
          if (st === STATUS_DONE || st === STATUS_SKIP) done++;
          else estRemain += findItemById(id)?.est || CAT_DEFAULT_EST[findItemById(id)?.cat] || 60;
        }
      });
      const result = { total, done, pct: total ? Math.round((done / total) * 100) : 0, estRemain };
      _progressCache[dayName] = result;
      return result;
    }

    function getWeeklyProgress() {
      if (_progressCache._weekly) return _progressCache._weekly;
      let total = 0, done = 0, estRemain = 0;
      DAYS.forEach(d => { const p = getDayProgress(d); total += p.total; done += p.done; estRemain += p.estRemain; });
      const result = { total, done, pct: total ? Math.round((done / total) * 100) : 0, estRemain };
      _progressCache._weekly = result;
      return result;
    }

    function findItemById(id) {
      for (const d of DAYS) for (const s of schedule[d].sections) for (const item of s.items) if (item.id === id) return item;
      return null;
    }

    // ── Time-aware sections ──
    function getCurrentSectionIndex(sections) {
      const now = nowInTZ();
      const h = now.getHours() + now.getMinutes() / 60;
      const times = sections.map((s, i) => {
        for (const item of s.items) {
          const m = item.text.match(/(\d{1,2}):(\d{2})/);
          if (m) return parseInt(m[1]) + parseInt(m[2]) / 60;
        }
        const l = s.label.toLowerCase();
        if (l.includes('before') || l.includes('morning') || l.includes('core')) return 8;
        if (l.includes('after') || l.includes('afternoon')) return 15;
        if (l.includes('evening')) return 18;
        if (l.includes('class') || l.includes('meeting')) return 9;
        return 8 + i * 3;
      });
      let idx = 0;
      for (let i = 0; i < times.length; i++) { if (h >= times[i]) idx = i; }
      return idx;
    }

    // ── Export / Import ──
    function exportData() {
      const data = { checked, notes: taskNotes, deferred: taskDeferred, history: loadHistory(), weekKey: getWeekKey(), exported: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `study-plan-${getWeekKey()}.json`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function importData() {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const data = JSON.parse(ev.target.result);
            if (typeof data !== 'object' || data === null) { showToast('Invalid file format'); return; }
            const validStates = [STATUS_DONE, STATUS_SKIP, STATUS_PROGRESS];
            if (data.checked && typeof data.checked === 'object') {
              // Validate: keys should match task ID pattern, values should be valid states
              const clean = {};
              for (const [k, v] of Object.entries(data.checked)) {
                if (/^[a-z]{3}-\d+$/.test(k) && (v === true || validStates.includes(v))) clean[k] = v;
              }
              checked = clean;
            }
            if (data.notes && typeof data.notes === 'object') {
              const clean = {};
              for (const [k, v] of Object.entries(data.notes)) {
                if (/^[a-z]{3}-\d+$/.test(k) && typeof v === 'string' && v.length < 1000) clean[k] = v;
              }
              taskNotes = clean;
            }
            if (data.deferred && typeof data.deferred === 'object') {
              const clean = {};
              for (const [k, v] of Object.entries(data.deferred)) {
                if (/^[a-z]{3}-\d+$/.test(k) && DAYS.includes(v)) clean[k] = v;
              }
              taskDeferred = clean;
            }
            saveState();
            if (data.history && typeof data.history === 'object') {
              const cleanHist = {};
              for (const [k, v] of Object.entries(data.history)) {
                if (new RegExp('^' + WEEK_PREFIX + '\\d+$').test(k) && typeof v === 'number' && v >= 0 && v <= 100) cleanHist[k] = v;
              }
              localStorage.setItem(HISTORY_KEY, JSON.stringify(cleanHist));
            }
            render();
            showToast('Data imported');
          } catch (err) { showToast('Invalid file'); }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    // ════════════════════════════════════════
    // ── Firebase Sync ──
    // ════════════════════════════════════════

    function getSyncConfig() {
      try { return JSON.parse(localStorage.getItem(SYNC_CONFIG_KEY)); }
      catch (e) { return null; }
    }

    function saveSyncConfig(config) {
      localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify(config));
    }

    function getSyncCreds() {
      try { return JSON.parse(sessionStorage.getItem(SYNC_CREDS_KEY)); }
      catch (e) { return null; }
    }

    function saveSyncCreds(email) {
      // Only store email for display purposes; Firebase SDK handles auth persistence
      sessionStorage.setItem(SYNC_CREDS_KEY, JSON.stringify({ email }));
    }

    function loadFirebaseSDK() {
      if (window.firebase && window.firebase.auth && window.firebase.database) return Promise.resolve();
      if (firebaseSDKPromise) return firebaseSDKPromise;

      const scripts = [
        ['https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js', 'Firebase app SDK'],
        ['https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js', 'Firebase auth SDK'],
        ['https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js', 'Firebase database SDK'],
      ];

      firebaseSDKPromise = scripts.reduce((promise, [src, label]) => {
        return promise.then(() => new Promise((resolve, reject) => {
          if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
          const script = document.createElement('script');
          script.src = src;
          script.onload = resolve;
          script.onerror = () => reject(new Error(`Failed to load ${label}`));
          document.head.appendChild(script);
        }));
      }, Promise.resolve()).catch(err => {
        firebaseSDKPromise = null;
        throw err;
      });

      return firebaseSDKPromise;
    }

    function parseFirebaseConfig(text) {
      function fillDatabaseURL(obj) {
        if (!obj.databaseURL && obj.projectId) {
          obj.databaseURL = 'https://' + obj.projectId + '-default-rtdb.firebaseio.com';
        }
        return (obj.apiKey && obj.projectId) ? obj : null;
      }
      // Try direct JSON
      try { const obj = JSON.parse(text); if (fillDatabaseURL(obj)) return obj; } catch (e) { }
      // Find the object containing apiKey and convert JS object literal to JSON
      const match = text.match(/\{[^{}]*apiKey[^{}]*\}/s);
      if (match) {
        try {
          // Convert JS object literal to valid JSON (quote unquoted keys)
          const jsonStr = match[0].replace(/(['"])?(\w+)(['"])?\s*:/g, '"$2":').replace(/'/g, '"').replace(/,\s*}/g, '}');
          const obj = JSON.parse(jsonStr);
          if (obj && typeof obj === 'object' && fillDatabaseURL(obj)) return obj;
        } catch (e) { }
      }
      return null;
    }

    async function initSync(config, email, password) {
      syncStatus = 'syncing';
      updateSyncDot();

      await loadFirebaseSDK();

      if (!firebase.apps.length) {
        firebase.initializeApp(config);
      }

      // Sign in with email/password
      if (!firebase.auth().currentUser) {
        try {
          await firebase.auth().signInWithEmailAndPassword(email, password);
        } catch (err) {
          if (err.code === 'auth/user-not-found') {
            await firebase.auth().createUserWithEmailAndPassword(email, password);
          } else {
            throw err;
          }
        }
      }

      syncUid = firebase.auth().currentUser.uid;
      attachSyncListeners();
      firebaseReady = true;
      saveSyncConfig(config);
      saveSyncCreds(email);
      syncPush();
    }

    function attachSyncListeners() {
      const db = firebase.database();
      const base = 'users/' + syncUid + '/study/';

      if (syncConnectionRef && syncConnectionListener) syncConnectionRef.off('value', syncConnectionListener);
      syncConnectionRef = db.ref('.info/connected');
      syncConnectionListener = syncConnectionRef.on('value', snap => {
        syncStatus = snap.val() ? 'connected' : 'offline';
        updateSyncDot();
      });

      if (syncRef && syncListener) syncRef.off('value', syncListener);
      syncRef = db.ref(base + getWeekKey());
      syncListener = syncRef.on('value', snap => {
        if (ignoreNextRemote) { ignoreNextRemote = false; return; }
        if (snap.exists()) { checked = snap.val(); invalidateProgressCache(); localStorage.setItem(getWeekKey(), JSON.stringify(checked)); render(); }
      });

      if (syncNotesRef && syncNotesListener) syncNotesRef.off('value', syncNotesListener);
      syncNotesRef = db.ref(base + getWeekKey() + '-notes');
      syncNotesListener = syncNotesRef.on('value', snap => {
        if (snap.exists()) { taskNotes = snap.val(); localStorage.setItem(getWeekKey() + '-notes', JSON.stringify(taskNotes)); render(); }
      });

      if (syncDeferRef && syncDeferListener) syncDeferRef.off('value', syncDeferListener);
      syncDeferRef = db.ref(base + getWeekKey() + '-defer');
      syncDeferListener = syncDeferRef.on('value', snap => {
        if (snap.exists()) { taskDeferred = snap.val(); invalidateProgressCache(); localStorage.setItem(getWeekKey() + '-defer', JSON.stringify(taskDeferred)); render(); }
      });

      if (syncHistoryRef && syncHistoryListener) syncHistoryRef.off('value', syncHistoryListener);
      syncHistoryRef = db.ref(base + 'history');
      syncHistoryListener = syncHistoryRef.on('value', snap => {
        if (snap.exists()) localStorage.setItem(HISTORY_KEY, JSON.stringify(snap.val()));
      });

      // Links
      if (syncLinksRef && syncLinksListener) syncLinksRef.off('value', syncLinksListener);
      syncLinksRef = db.ref(base + 'links');
      syncLinksListener = syncLinksRef.on('value', snap => {
        if (snap.exists()) { taskLinks = snap.val(); localStorage.setItem(LINKS_KEY, JSON.stringify(taskLinks)); render(); }
      });

      // Deadlines
      if (syncDeadlinesRef && syncDeadlinesListener) syncDeadlinesRef.off('value', syncDeadlinesListener);
      syncDeadlinesRef = db.ref(base + 'deadlines');
      syncDeadlinesListener = syncDeadlinesRef.on('value', snap => {
        if (snap.exists()) { deadlines = snap.val(); localStorage.setItem(DEADLINE_KEY, JSON.stringify(deadlines)); render(); }
      });

      // Scratchpad
      if (syncScratchRef && syncScratchListener) syncScratchRef.off('value', syncScratchListener);
      syncScratchRef = db.ref(base + 'scratchpad');
      syncScratchListener = syncScratchRef.on('value', snap => {
        const val = snap.exists() ? snap.val() : '';
        localStorage.setItem(SCRATCH_KEY, val);
        const ta = document.getElementById('scratchpad-text');
        if (ta && document.activeElement !== ta) ta.value = val;
      });
    }

    let syncPushTimer = null;
    function syncPush() {
      if (!firebaseReady || !syncRef) return;
      clearTimeout(syncPushTimer);
      syncPushTimer = setTimeout(() => {
        ignoreNextRemote = true;
        syncRef.set(checked).catch(err => {
          ignoreNextRemote = false;
          console.error('Sync write failed:', err.message);
          showToast('Sync write failed \u2014 check Firebase rules');
        });
        if (syncNotesRef) syncNotesRef.set(taskNotes).catch(err => console.warn('Notes sync failed:', err.message));
        if (syncDeferRef) syncDeferRef.set(taskDeferred).catch(err => console.warn('Defer sync failed:', err.message));
        if (syncHistoryRef) {
          syncHistoryRef.set(loadHistory()).catch(err => console.warn('History sync failed:', err.message));
        }
        if (syncLinksRef) syncLinksRef.set(taskLinks).catch(err => console.warn('Links sync failed:', err.message));
        if (syncDeadlinesRef) syncDeadlinesRef.set(deadlines).catch(err => console.warn('Deadlines sync failed:', err.message));
        if (syncScratchRef) syncScratchRef.set(loadScratchpad()).catch(err => console.warn('Scratchpad sync failed:', err.message));
      }, 500);
    }

    function updateSyncDot() {
      const dot = document.getElementById('sync-dot');
      if (!dot) return;
      dot.className = 'sync-dot ' + (getSyncConfig() || HARDCODED_CONFIG ? syncStatus : 'hidden');
      dot.title = syncStatus === 'connected' ? 'Synced' :
        syncStatus === 'syncing' ? 'Syncing\u2026' : 'Offline';
    }

    async function connectSync() {
      const input = document.getElementById('sync-config-input');
      const emailInput = document.getElementById('sync-email');
      const passInput = document.getElementById('sync-password');
      const msg = document.getElementById('sync-msg');
      if (!input || !msg) return;

      const config = parseFirebaseConfig(input.value.trim());
      if (!config) {
        msg.className = 'sync-msg err';
        msg.textContent = 'Could not parse config. Paste the full firebaseConfig object.';
        return;
      }

      const email = emailInput ? emailInput.value.trim() : '';
      const password = passInput ? passInput.value : '';
      if (!email || !password) {
        msg.className = 'sync-msg err';
        msg.textContent = 'Enter an email and password.';
        return;
      }

      msg.className = 'sync-msg wait';
      msg.textContent = 'Connecting\u2026';

      try {
        await initSync(config, email, password);
        render();
        showToast('Sync connected');
      } catch (err) {
        firebaseReady = false;
        syncStatus = 'offline';
        updateSyncDot();
        msg.className = 'sync-msg err';
        const friendly = err.code === 'auth/wrong-password' ? 'Wrong password.' :
          err.code === 'auth/invalid-email' ? 'Invalid email.' :
            err.code === 'auth/weak-password' ? 'Password must be at least 6 characters.' :
              err.message;
        msg.textContent = 'Failed: ' + friendly;
      }
    }

    function disconnectSync() {
      if (syncRef && syncListener) syncRef.off('value', syncListener);
      if (syncConnectionRef && syncConnectionListener) syncConnectionRef.off('value', syncConnectionListener);
      if (syncHistoryRef && syncHistoryListener) syncHistoryRef.off('value', syncHistoryListener);
      if (syncNotesRef && syncNotesListener) syncNotesRef.off('value', syncNotesListener);
      if (syncDeferRef && syncDeferListener) syncDeferRef.off('value', syncDeferListener);
      if (syncLinksRef && syncLinksListener) syncLinksRef.off('value', syncLinksListener);
      if (syncDeadlinesRef && syncDeadlinesListener) syncDeadlinesRef.off('value', syncDeadlinesListener);
      if (syncScratchRef && syncScratchListener) syncScratchRef.off('value', syncScratchListener);
      try {
        if (firebase.apps.length) {
          firebase.auth().signOut().catch(err => console.warn('Sign-out failed:', err.message));
        }
      } catch (e) { console.warn('Disconnect error:', e.message); }
      localStorage.removeItem(SYNC_CONFIG_KEY);
      sessionStorage.removeItem(SYNC_CREDS_KEY);
      firebaseReady = false;
      syncRef = null; syncListener = null;
      syncConnectionRef = null; syncConnectionListener = null;
      syncHistoryRef = null; syncHistoryListener = null;
      syncNotesRef = null; syncNotesListener = null;
      syncDeferRef = null; syncDeferListener = null;
      syncLinksRef = null; syncLinksListener = null;
      syncDeadlinesRef = null; syncDeadlinesListener = null;
      syncScratchRef = null; syncScratchListener = null;
      syncUid = null;
      syncStatus = 'offline';
      render();
      showToast('Sync disconnected');
    }

    async function setupStoredSync() {
      const config = HARDCODED_CONFIG || getSyncConfig();
      if (!config) return;

      try {
        await loadFirebaseSDK();
        if (!firebase.apps.length) firebase.initializeApp(config);

        // Use Firebase's built-in auth persistence — wait for existing session
        const user = await new Promise((resolve) => {
          const unsub = firebase.auth().onAuthStateChanged(u => { unsub(); resolve(u); });
        });

        if (!user) {
          // No stored session — user needs to log in again
          syncStatus = 'offline';
          updateSyncDot();
          return;
        }

        syncUid = user.uid;
        syncStatus = 'syncing';
        updateSyncDot();
        attachSyncListeners();
        firebaseReady = true;
        saveSyncCreds(user.email);
        syncPush();
        render();
      } catch (err) {
        firebaseReady = false;
        syncStatus = 'offline';
        updateSyncDot();
        console.warn('Auto-sync failed:', err.message);
      }
    }

    // ── Schedule Editor ──
    function addTaskToSection(dayName, sectionIdx, text, cat, hint) {
      const section = schedule[dayName].sections[sectionIdx];
      if (!section || !text.trim()) return;
      // Sanitize cat to alphanumeric only
      cat = (cat || 'homework').replace(/[^a-zA-Z0-9]/g, '');
      // Generate unique ID
      const dayPrefix = dayName.slice(0, 3).toLowerCase();
      let maxNum = 0;
      schedule[dayName].sections.forEach(s => s.items.forEach(item => {
        const m = item.id.match(new RegExp('^' + dayPrefix + '-(\\d+)$'));
        if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
      }));
      const newId = dayPrefix + '-' + (maxNum + 1);
      section.items.push({ id: newId, text: text.trim(), hint: hint || null, cat: cat || 'homework' });
      // Add cat to CAT if not present (use default colors)
      if (!CAT[cat]) {
        CAT[cat] = { bg: '#1a1a1a', border: '#888' };
        CAT_LABEL[cat] = cat.toUpperCase();
      }
      saveScheduleToStorage();
      render();
      showToast('Task added');
    }

    function removeTaskFromSchedule(dayName, sectionIdx, itemIdx) {
      const section = schedule[dayName].sections[sectionIdx];
      if (!section) return;
      const item = section.items[itemIdx];
      if (item) {
        delete checked[item.id];
        delete taskNotes[item.id];
        delete taskDeferred[item.id];
      }
      section.items.splice(itemIdx, 1);
      saveScheduleToStorage();
      saveState();
      render();
      showToast('Task removed');
    }

    function saveScheduleToStorage() {
      try {
        localStorage.setItem('sp26-custom-schedule', JSON.stringify(schedule));
      } catch (e) { console.warn('Failed to save schedule:', e.message); }
    }

    function loadCustomSchedule() {
      try {
        const raw = localStorage.getItem('sp26-custom-schedule');
        if (!raw) return;
        const custom = JSON.parse(raw);
        if (typeof custom !== 'object') return;
        for (const day of DAYS) {
          if (custom[day] && custom[day].sections) {
            schedule[day] = custom[day];
          }
        }
      } catch (e) { console.warn('Failed to load custom schedule:', e.message); }
    }

    // Load custom schedule overrides
    loadCustomSchedule();

    // ── Data pruning (remove stale meal/history entries) ──
    function pruneOldData() {
      try {
        const hist = loadHistory();
        const keys = Object.keys(hist).sort();
        if (keys.length > 20) {
          const pruned = {};
          keys.slice(-20).forEach(k => pruned[k] = hist[k]);
          localStorage.setItem(HISTORY_KEY, JSON.stringify(pruned));
        }
        const mealKeys = Object.keys(mealData).sort();
        if (mealKeys.length > 30) {
          const cutoff = mealKeys[mealKeys.length - 30];
          for (const k of mealKeys) { if (k < cutoff) delete mealData[k]; }
          saveMeals();
        }
      } catch (e) { /* non-critical */ }
    }

    // ── localStorage quota check ──
    function checkStorageQuota() {
      try {
        let total = 0;
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          total += k.length + (localStorage.getItem(k) || '').length;
        }
        if (total > 4 * 1024 * 1024) {
          setTimeout(() => showToast('Storage nearly full — export your data'), 1000);
        }
      } catch (e) { /* non-critical */ }
    }

    // ── Cross-week deferral carry-over ──
    function carryOverDeferrals() {
      try {
        const currentWeek = getISOWeek(nowInTZ());
        if (currentWeek <= 1) return;
        const prevKey = WEEK_PREFIX + (currentWeek - 1);
        const prevDefer = JSON.parse(localStorage.getItem(prevKey + '-defer') || '{}');
        const prevChecked = JSON.parse(localStorage.getItem(prevKey) || '{}');
        let carried = 0;
        for (const [id, target] of Object.entries(prevDefer)) {
          const st = prevChecked[id];
          if (st === true || st === STATUS_DONE || st === STATUS_SKIP) continue;
          if (!checked[id] && !taskDeferred[id]) {
            taskDeferred[id] = DAYS.includes(target) ? target : 'Monday';
            carried++;
          }
        }
        if (carried > 0) {
          saveState();
          setTimeout(() => showToast(`${carried} undone task(s) carried from last week`), 800);
        }
      } catch (e) { /* non-critical */ }
    }

    // ════════════════════════════════════════
    // ── Commute Countdown ──
    // ════════════════════════════════════════
    function getCommuteInfo() {
      const dayName = DAYS[selectedDay];
      const day = schedule[dayName];
      if (!day.leave) return null;
      const now = nowInTZ();
      if (selectedDay !== todayIdx) return { label: `Leave at ${day.leave}`, mins: null };
      const [lh, lm] = day.leave.split(':').map(Number);
      const leaveMin = lh * 60 + lm;
      const nowMin = now.getHours() * 60 + now.getMinutes();
      const diff = leaveMin - nowMin;
      if (diff <= 0) return null;
      return { label: `Leave in`, mins: diff, time: day.leave };
    }

    // ════════════════════════════════════════
    // ── Focus Timer ──
    // ════════════════════════════════════════
    const POMO_KEY = 'sp26-pomo-log';
    let pomoState = null; // { taskId, taskText, startTime, duration (ms), paused, elapsed }
    let pomoInterval = null;
    let focusTimerMin = parseInt(localStorage.getItem('sp26-timer-min')) || 25;

    function setFocusTimerMin(min) {
      focusTimerMin = Math.max(1, Math.min(180, parseInt(min) || 25));
      localStorage.setItem('sp26-timer-min', focusTimerMin);
    }

    function startPomo(taskId, customMin) {
      const item = findItemById(taskId);
      if (!item) return;
      const mins = customMin || focusTimerMin;
      pomoState = { taskId, taskText: item.text, startTime: Date.now(), duration: mins * 60 * 1000, paused: false, elapsed: 0 };
      haptic('success');
      pomoInterval = setInterval(pomoTick, 1000);
      render();
      showToast(`Focus timer started — ${mins} min`);
    }
    function pomoTick() {
      if (!pomoState || pomoState.paused) return;
      pomoState.elapsed = Date.now() - pomoState.startTime;
      if (pomoState.elapsed >= pomoState.duration) {
        finishPomo();
        return;
      }
      _updatePomoBarContent();
    }
    function finishPomo() {
      clearInterval(pomoInterval);
      logPomoSession(pomoState.taskId, pomoState.elapsed);
      haptic('heavy');
      showToast('Focus session complete! Take a break.');
      if (Notification.permission === 'granted') new Notification('Focus Timer Complete', { body: 'Take a break!', icon: '📘' });
      pomoState = null;
      _ensurePomoBar();
      render();
    }
    function cancelPomo() {
      if (pomoState && pomoState.elapsed > 60000) logPomoSession(pomoState.taskId, pomoState.elapsed);
      clearInterval(pomoInterval);
      pomoState = null;
      _ensurePomoBar();
      render();
      showToast('Focus timer cancelled');
    }
    function togglePomoPause() {
      if (!pomoState) return;
      if (pomoState.paused) {
        pomoState.startTime = Date.now() - pomoState.elapsed;
        pomoState.paused = false;
      } else {
        pomoState.paused = true;
      }
      render();
    }
    function logPomoSession(taskId, elapsed) {
      try {
        const log = JSON.parse(localStorage.getItem(POMO_KEY) || '{}');
        const today = nowInTZ();
        const dateKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        if (!log[dateKey]) log[dateKey] = {};
        const item = findItemById(taskId);
        const cat = item ? item.cat : 'unknown';
        log[dateKey][cat] = (log[dateKey][cat] || 0) + Math.round(elapsed / 60000);
        localStorage.setItem(POMO_KEY, JSON.stringify(log));
      } catch (e) { /* non-critical */ }
    }
    function getPomoLog() {
      try { return JSON.parse(localStorage.getItem(POMO_KEY) || '{}'); } catch (e) { return {}; }
    }
    function getWeeklyPomoMinutes() {
      const log = getPomoLog();
      const totals = {};
      const now = nowInTZ();
      const dow = now.getDay() === 0 ? 6 : now.getDay() - 1;
      for (let i = 0; i <= dow; i++) {
        const d = new Date(now); d.setDate(d.getDate() - (dow - i));
        const dk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        if (log[dk]) { for (const [cat, min] of Object.entries(log[dk])) { totals[cat] = (totals[cat] || 0) + min; } }
      }
      return totals;
    }

    // ── Persistent timer bar (not rebuilt on render) ──
    let _pomoBarEl = null;
    let _pomoBarPos = null; // { x, y } if user dragged it

    function _ensurePomoBar() {
      if (pomoState && !_pomoBarEl) {
        _pomoBarEl = document.createElement('div');
        _pomoBarEl.className = 'pomo-bar';
        _pomoBarEl.id = 'pomo-bar';
        _pomoBarEl.style.animation = 'fabSlideUp 0.25s ease-out';
        _pomoBarEl.oncontextmenu = e => showTimerCtxMenu(e);
        document.body.appendChild(_pomoBarEl);
        _initPomoDrag(_pomoBarEl);
        _updatePomoBarContent();
      } else if (!pomoState && _pomoBarEl) {
        _pomoBarEl.remove();
        _pomoBarEl = null;
        _pomoBarPos = null;
      }
    }

    function _resetPomoPosition() {
      if (!_pomoBarEl) return;
      _pomoBarEl.style.left = '50%';
      _pomoBarEl.style.top = '';
      _pomoBarEl.style.bottom = '84px';
      _pomoBarEl.style.transform = 'translateX(-50%)';
      _pomoBarPos = null;
    }

    function restartPomo() {
      if (!pomoState) return;
      pomoState.startTime = Date.now();
      pomoState.elapsed = 0;
      pomoState.paused = false;
      haptic('success');
      showToast(`Timer restarted — ${Math.round(pomoState.duration / 60000)} min`);
    }

    function _updatePomoBarContent() {
      if (!_pomoBarEl || !pomoState) return;
      const remain = Math.max(0, pomoState.duration - pomoState.elapsed);
      const m = Math.floor(remain / 60000), s = Math.floor((remain % 60000) / 1000);
      const pct = pomoState.elapsed / pomoState.duration;
      const circ = 2 * Math.PI * 15;
      _pomoBarEl.innerHTML = `
        <svg class="pomo-ring" viewBox="0 0 36 36"><circle class="pomo-ring-bg" cx="18" cy="18" r="15"/><circle class="pomo-ring-fg" cx="18" cy="18" r="15" stroke-dasharray="${circ}" stroke-dashoffset="${circ * (1 - pct)}"/></svg>
        <div class="pomo-time">${m}:${String(s).padStart(2,'0')}</div>
        <div class="pomo-task" title="${escapeHtml(pomoState.taskText)}">${escapeHtml(pomoState.taskText.slice(0,25))}</div>
        <button class="pomo-btn" onclick="togglePomoPause()" title="${pomoState.paused ? 'Resume' : 'Pause'}">${pomoState.paused ? '\u25B6' : '\u23F8'}</button>
        <button class="pomo-btn" onclick="restartPomo()" title="Restart">\u21BB</button>
        <button class="pomo-btn" onclick="_resetPomoPosition()" title="Re-center">\u2316</button>
        <button class="pomo-btn stop" onclick="cancelPomo()" title="Stop">\u2715</button>`;
    }

    function _initPomoDrag(el) {
      let startX, startY, origX, origY, dragging = false;
      function onStart(e) {
        if (e.button && e.button !== 0) return;
        if (e.target.closest('.pomo-btn')) return;
        e.preventDefault();
        const t = e.touches ? e.touches[0] : e;
        const rect = el.getBoundingClientRect();
        startX = t.clientX; startY = t.clientY;
        origX = rect.left + rect.width / 2; origY = rect.top + rect.height / 2;
        dragging = true;
        el.classList.add('dragging');
      }
      function onMove(e) {
        if (!dragging) return;
        const t = e.touches ? e.touches[0] : e;
        const dx = t.clientX - startX, dy = t.clientY - startY;
        const newX = Math.max(80, Math.min(window.innerWidth - 80, origX + dx));
        const newY = Math.max(30, Math.min(window.innerHeight - 30, origY + dy));
        el.style.left = newX + 'px';
        el.style.top = newY + 'px';
        el.style.bottom = 'auto';
        el.style.transform = 'translate(-50%, -50%)';
        _pomoBarPos = { x: newX, y: newY };
      }
      function onEnd() {
        if (!dragging) return;
        dragging = false;
        el.classList.remove('dragging');
      }
      el.addEventListener('mousedown', onStart);
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onEnd);
      el.addEventListener('touchstart', onStart, { passive: false });
      document.addEventListener('touchmove', onMove, { passive: true });
      document.addEventListener('touchend', onEnd);
    }

    // ════════════════════════════════════════
    // ── Calendar Export (.ics) ──
    // ════════════════════════════════════════
    function exportCalendar() {
      let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//StudyPlan//EN\r\nCALSCALE:GREGORIAN\r\n';
      const now = nowInTZ();
      const dow = now.getDay() === 0 ? 6 : now.getDay() - 1;
      const monday = new Date(now); monday.setDate(monday.getDate() - dow);
      DAYS.forEach((dayName, di) => {
        schedule[dayName].sections.forEach(s => s.items.forEach(item => {
          if (item.cat !== 'class' && item.cat !== 'fameeting') return;
          const timeMatch = item.text.match(/(\d{1,2}):(\d{2})\u2014(\d{1,2}):(\d{2})/);
          if (!timeMatch) return;
          const eventDate = new Date(monday); eventDate.setDate(eventDate.getDate() + di);
          const ds = `${eventDate.getFullYear()}${String(eventDate.getMonth()+1).padStart(2,'0')}${String(eventDate.getDate()).padStart(2,'0')}`;
          const dtStart = `${ds}T${String(timeMatch[1]).padStart(2,'0')}${timeMatch[2]}00`;
          const dtEnd = `${ds}T${String(timeMatch[3]).padStart(2,'0')}${timeMatch[4]}00`;
          ics += `BEGIN:VEVENT\r\nDTSTART;TZID=Europe/Istanbul:${dtStart}\r\nDTEND;TZID=Europe/Istanbul:${dtEnd}\r\n`;
          ics += `SUMMARY:${item.text.split('\u2014')[0].trim()}\r\n`;
          if (item.hint) ics += `LOCATION:${item.hint}\r\n`;
          ics += `END:VEVENT\r\n`;
        }));
      });
      ics += 'END:VCALENDAR\r\n';
      const blob = new Blob([ics], { type: 'text/calendar' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'study-plan-classes.ics'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
      showToast('Calendar exported');
    }

    // ════════════════════════════════════════
    // ── Push Notifications ──
    // ════════════════════════════════════════
    let notifEnabled = Notification && Notification.permission === 'granted';
    let notifTimers = [];
    function requestNotifPermission() {
      if (!('Notification' in window)) { showToast('Notifications not supported'); return; }
      Notification.requestPermission().then(p => {
        notifEnabled = p === 'granted';
        if (notifEnabled) { scheduleNotifications(); showToast('Notifications enabled'); }
        else showToast('Notifications denied');
        render();
      });
    }
    function scheduleNotifications() {
      notifTimers.forEach(t => clearTimeout(t));
      notifTimers = [];
      if (!notifEnabled) return;
      const now = nowInTZ();
      if (selectedDay !== todayIdx) return;
      const dayName = DAYS[todayIdx];
      const day = schedule[dayName];
      if (day.leave) {
        const [lh, lm] = day.leave.split(':').map(Number);
        const leaveMs = new Date(now).setHours(lh, lm, 0, 0) - now.getTime() - 1800000;
        if (leaveMs > 0) notifTimers.push(setTimeout(() => new Notification('Leave in 30 min', { body: `Head out at ${day.leave}`, icon: '🚶' }), leaveMs));
      }
      // Class reminders
      day.sections.forEach(s => s.items.forEach(item => {
        if (item.cat !== 'class' && item.cat !== 'fameeting') return;
        const m = item.text.match(/(\d{1,2}):(\d{2})/);
        if (!m) return;
        const classMs = new Date(now).setHours(parseInt(m[1]), parseInt(m[2]), 0, 0) - now.getTime() - 900000;
        if (classMs > 0) notifTimers.push(setTimeout(() => new Notification('Class in 15 min', { body: item.text.split('\u2014')[0].trim(), icon: '📘' }), classMs));
      }));
    }

    // ════════════════════════════════════════
    // ── Auto Theme Switch (Istanbul sunset/sunrise) ──
    // ════════════════════════════════════════
    function checkAutoTheme() {
      if (localStorage.getItem('sp26-theme')) return; // manual preference set
      const now = nowInTZ();
      const month = now.getMonth();
      // Approximate Istanbul sunrise/sunset hours by month
      const sunrise = [7.5, 7, 6.5, 6, 5.5, 5.5, 5.5, 6, 6.5, 7, 7, 7.5][month];
      const sunset = [17, 17.5, 18, 19, 19.5, 20.5, 20.5, 20, 19, 18, 17, 16.5][month];
      const h = now.getHours() + now.getMinutes() / 60;
      const shouldBeLight = h >= sunrise && h < sunset;
      const newTheme = shouldBeLight ? 'light' : 'dark';
      if (newTheme !== currentTheme) {
        currentTheme = newTheme;
        document.documentElement.setAttribute('data-theme', currentTheme);
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = currentTheme === 'light' ? '#faf6ed' : '#09090b';
      }
    }

      // Weekly progress

      // Search bar

               value="${escapeHtml(searchQuery)}" oninput="setSearch(this.value)" onfocus="this.select()">

      </div>`;

              const checkIcon = st === STATUS_DONE ? '\u2713' : st === STATUS_SKIP ? '\u2716' : st === STATUS_PROGRESS ? '\u25B6' : '';
              const stLabel = st === STATUS_DONE ? 'done' : st === STATUS_SKIP ? 'skipped' : st === STATUS_PROGRESS ? 'in progress' : 'not started';
              const catLabel = CAT_LABEL[item.cat] || '';
              html += `<div class="${cls}" data-task-id="${item.id}" onclick="toggle('${item.id}')" role="checkbox" tabindex="0" aria-checked="${st === STATUS_DONE}" aria-label="${escapeHtml(item.text)} — ${stLabel}"
                       onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggle('${item.id}')}">
                <div class="week-task-check">${checkIcon}</div>
                <div class="week-task-text">${escapeHtml(item.text)}</div>
                ${catLabel ? `<div class="week-task-cat">${catLabel}</div>` : ''}
              </div>`;
            });
          });
          // Deferred-in tasks
          Object.entries(taskDeferred).forEach(([id, target]) => {
            if (target !== wDayName) return;
            for (const dName of DAYS) {
              for (const sec of schedule[dName].sections) {
                for (const item of sec.items) {
                  if (item.id !== id) continue;
                  const st = getStatus(item.id);
                  let cls = 'week-task';
                  if (st === STATUS_DONE) cls += ' done';
                  else if (st === STATUS_SKIP) cls += ' skip';
                  else if (st === STATUS_PROGRESS) cls += ' progress';
                  const checkIcon = st === STATUS_DONE ? '\u2713' : st === STATUS_SKIP ? '\u2716' : st === STATUS_PROGRESS ? '\u25B6' : '';
                  html += `<div class="${cls}" data-task-id="${item.id}" onclick="toggle('${item.id}')" style="border-left:2px solid var(--accent)">
                    <div class="week-task-check">${checkIcon}</div>
                    <div class="week-task-text">\u2192 ${escapeHtml(item.text)}</div>
                  </div>`;
                }
              }
            }
          });
          html += `</div>
            <div style="padding:4px 10px 6px;text-align:center">
              <button class="cat-filter-btn haptic-press" onclick="event.stopPropagation();selectDay(${di})" style="font-size:10px">Open day \u2192</button>
            </div>
          </div>`;
        });
        html += `</div>`;
      }

      if (viewMode === 'day') {
        // Day header
        const leaveHtml = day.leave ? `<span>Leave <span class="val">${day.leave}</span></span>` : `<span class="home">Home day</span>`;
        const metaHtml = day.meta ? `<span class="flag">\u2691 ${day.meta}</span>` : '';
        const dayLocked = isDayLocked(dayName);
        html += `
    <div class="day-header">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="day-name">${dayName}${isToday ? ' <span style="font-size:12px;color:var(--accent);font-weight:400">today</span>' : ''}</div>
        <button class="lock-btn ${dayLocked ? 'locked' : ''}" onclick="toggleLock('${dayName}')">${dayLocked ? '\uD83D\uDD12 Locked' : '\uD83D\uDD13 Lock'}</button>
      </div>
      <div class="day-meta">
        <span>Wake <span class="val">${day.wake}</span></span>
        ${leaveHtml} ${metaHtml}
      </div>
    </div>`;

        // Commute countdown
        const commute = getCommuteInfo();
        if (commute && commute.mins !== null) {
          const cCls = commute.mins <= 10 ? 'red' : commute.mins <= 30 ? 'orange' : 'green';
          html += `<div class="commute-banner ${cCls}">
            <span class="commute-icon">\uD83D\uDEB6</span>
            <span>${commute.label} <span class="commute-time">${commute.mins} min</span> (at ${commute.time})</span>
          </div>`;
        }

        // Deadline countdown card
        const activeDeadlines = deadlines.filter(d => getDaysUntil(d.date) >= 0).slice(0, 5);
        if (activeDeadlines.length > 0) {
          html += `<div class="deadline-card"><div class="deadline-card-title">\uD83D\uDCC5 Upcoming Deadlines</div>`;
          activeDeadlines.forEach((dl, idx) => {
            const days = getDaysUntil(dl.date);
            const cls = days <= 3 ? 'urgent' : days <= 7 ? 'soon' : 'ok';
            const label = days === 0 ? 'TODAY' : days === 1 ? 'Tomorrow' : `${days} days`;
            html += `<div class="deadline-item">
              <span class="deadline-name">${escapeHtml(dl.name)}</span>
              <span class="deadline-days ${cls}">${label}</span>
            </div>`;
          });
          html += `</div>`;
        }

        // Meal card (smart time filtering for today)
        const dayMeals = getDayMeals(selectedDay);
        if (dayMeals && (dayMeals.kahvalti.length || dayMeals.ogle.length || dayMeals.aksam.length || (dayMeals.vegan && dayMeals.vegan.length))) {
          const mealTitle = isToday ? "Today's Menu" : `${dayName}'s Menu`;
          const relevantTypes = isToday ? getRelevantMealTypes() : ['kahvalti', 'ogle', 'aksam'];
          html += `<div class="meal-card">
          <div class="meal-card-header">
            <div class="meal-card-title">\uD83C\uDF7D\uFE0F ${mealTitle}</div>
            <button class="meal-card-refresh" onclick="event.stopPropagation();fetchMeals()">Refresh</button>
          </div>
          <div class="meal-items">`;
          if (dayMeals.kahvalti.length && relevantTypes.includes('kahvalti')) {
            html += `<div class="meal-type-label">Kahvalt\u0131</div>`;
            dayMeals.kahvalti.forEach(item => {
              html += `<div class="meal-item"><div class="meal-item-dot"></div>${escapeHtml(item)}</div>`;
            });
          }
          if (dayMeals.ogle.length && relevantTypes.includes('ogle')) {
            html += `<div class="meal-type-label">\u00D6\u011Fle</div>`;
            dayMeals.ogle.forEach(item => {
              html += `<div class="meal-item"><div class="meal-item-dot"></div>${escapeHtml(item)}</div>`;
            });
          }
          if (dayMeals.aksam.length && relevantTypes.includes('aksam')) {
            html += `<div class="meal-type-label">Ak\u015Fam</div>`;
            dayMeals.aksam.forEach(item => {
              html += `<div class="meal-item"><div class="meal-item-dot"></div>${escapeHtml(item)}</div>`;
            });
          }
          if (dayMeals.vegan && dayMeals.vegan.length) {
            html += `<div class="meal-type-label" style="color:#4caf50">\uD83C\uDF31 Vegan</div>`;
            dayMeals.vegan.forEach(item => {
              html += `<div class="meal-item"><div class="meal-item-dot" style="background:#4caf50"></div>${escapeHtml(item)}</div>`;
            });
          }
          html += `</div></div>`;
        }


        // Skipped tasks banner
        const skippedItems = [];
        day.sections.forEach(s => s.items.forEach(item => {
          if (taskDeferred[item.id] && taskDeferred[item.id] !== dayName) return;
          if (getStatus(item.id) === STATUS_SKIP) skippedItems.push(item);
        }));
        if (skippedItems.length > 0) {
          html += `<div class="skipped-banner">
          <div class="skipped-banner-header">\u23ed Skipped <span class="skipped-banner-count">${skippedItems.length}</span></div>
          <div class="skipped-banner-list">`;
          skippedItems.forEach(item => {
            const catLabel = CAT_LABEL[item.cat] || '';
            html += `<div class="skipped-banner-item">${escapeHtml(item.text)}${catLabel ? `<span class="sbi-cat">${catLabel}</span>` : ''}</div>`;
          });
          html += `</div></div>`;
        }

        // Helper: render one task item (uses dayName from render scope)
        function renderItem(item, extraClass, fromDay) {
          const c = CAT[item.cat];
          const st = getStatus(item.id);
          const isDeferred = taskDeferred[item.id] && taskDeferred[item.id] !== dayName;
          if (focusMode && (st === STATUS_DONE || st === STATUS_SKIP) && !isDeferred) return '';
          if (searchQuery && !item.text.toLowerCase().includes(searchQuery) && !(item.hint && item.hint.toLowerCase().includes(searchQuery))) return '';
          let cls = 'item';
          if (st === STATUS_DONE) cls += ' done';
          else if (st === STATUS_SKIP) cls += ' skip';
          else if (st === STATUS_PROGRESS) cls += ' progress';
          if (isDeferred) cls += ' deferred-out';
          if (extraClass) cls += ' ' + extraClass;
          if (justCompletedId === item.id) cls += ' just-completed';
          if (justSkippedId === item.id) cls += ' just-skipped';
          if (activeFilter && item.cat !== activeFilter) cls += ' item-filtered-out';
          const textColor = item.cat === "class" || item.cat === "fameeting" ? c.border : "var(--text)";
          const catLabel = CAT_LABEL[item.cat];
          const note = taskNotes[item.id];
          const hasActions = openActions === item.id;
          const hasNoteInput = openNoteInput === item.id;

          let h = `
        <div class="item-swipe-wrap" data-swipe-id="${item.id}">

              ${catLabel ? `<div class="item-cat" style="color:${c.border}">${catLabel}${st !== STATUS_DONE && st !== STATUS_SKIP && getEstimate(item) > 0 ? `<span class="est-badge">~${formatEst(getEstimate(item))}</span>` : ''}</div>` : (st !== STATUS_DONE && st !== STATUS_SKIP && getEstimate(item) > 0 ? `<div class="item-cat est-badge">~${formatEst(getEstimate(item))}</div>` : '')}
              ${fromDay ? `<div class="deferred-from">\u2192 from ${fromDay}</div>` : ''}
              ${note ? `<div class="item-note">${escapeHtml(note)}</div>` : ''}
              ${taskLinks[item.id] && taskLinks[item.id].length ? `<div class="item-links">${taskLinks[item.id].map((url, li) => { let host; try { host = new URL(url).hostname.replace('www.',''); } catch(e) { host = url.slice(0,20); } return `<a class="item-link" href="${escapeHtml(url)}" target="_blank" onclick="event.stopPropagation()" title="${escapeHtml(url)}">\uD83D\uDD17 ${host.slice(0,20)}</a>`; }).join('')}</div>` : ''}

            <div class="item-actions-btn" onclick="toggleActionMenu('${item.id}',event)">\u22ee</div>

          // Action bar
          if (hasActions) {

            <button class="action-btn act-defer" onclick="event.stopPropagation();showDeferPicker('${item.id}',event)">\u2192 Defer</button>
            <button class="action-btn act-clear" onclick="clearTask('${item.id}',event)">\u2715 Clear</button>
            <button class="action-btn" onclick="event.stopPropagation();startPomo('${item.id}')" style="color:#e94560;border-color:#e9456033">\u23F1 Focus</button>
            <button class="action-btn" onclick="event.stopPropagation();addLink('${item.id}')" style="color:var(--accent);border-color:#00d2ff33">\uD83D\uDD17 Link</button>
          </div>`;
          }

          // Note input (multiline textarea)
          if (hasNoteInput) {
            h += `<textarea class="note-input" id="note-input-${item.id}"
                 placeholder="Add a note\u2026"
                 onclick="event.stopPropagation()"
                 onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();saveNote('${item.id}')}">${escapeHtml(note || '')}</textarea>`;
          }

          // Link input
          if (openLinkInput === item.id) {
            h += `<div style="padding:4px 12px 8px;display:flex;gap:4px">
              <input id="link-input-${item.id}" type="url" placeholder="https://\u2026"
                     style="flex:1;font-family:inherit;font-size:11px;background:var(--bg);color:var(--text);border:1px solid var(--accent);border-radius:6px;padding:6px 10px;outline:none"
                     onclick="event.stopPropagation()"
                     onkeydown="if(event.key==='Enter'){event.preventDefault();saveLink('${item.id}')};if(event.key==='Escape'){openLinkInput=null;render()}">
              <button class="action-btn" onclick="event.stopPropagation();saveLink('${item.id}')" style="color:var(--accent);border-color:#00d2ff33">\uD83D\uDD17 Add</button>
            </div>`;
          }

          // Defer picker
          if (hasDeferPicker) {
            h += `<div class="defer-picker open">`;
            DAYS.forEach(d => {
              if (d !== dayName) {
                h += `<button class="defer-day-btn" onclick="event.stopPropagation();deferTask('${item.id}','${d}')">${d.slice(0, 3)}</button>`;
              }
            });
            h += `</div>`;
          }

          h += `</div></div></div>`; // close item + swipe-inner + swipe-wrap
          return h;
        }

        // Deferred tasks coming INTO this day
        const deferredIn = [];
        Object.entries(taskDeferred).forEach(([id, target]) => {
          if (target === dayName) {
            // Find the original item across all days
            for (const dName of DAYS) {
              for (const sec of schedule[dName].sections) {
                for (const item of sec.items) {
                  if (item.id === id) deferredIn.push({ item, fromDay: dName });
                }
              }
            }
          }
        });

        if (deferredIn.length > 0) {
          html += `<div class="deferred-section"><div class="deferred-label">\u2192 Deferred In <span class="deferred-badge">${deferredIn.length} task${deferredIn.length > 1 ? 's' : ''}</span></div><div class="items">`;
          deferredIn.forEach(({ item, fromDay }) => {
            html += renderItem(item, 'deferred-in-highlight', fromDay);
          });
          html += `</div></div>`;
        }

        // Day completion celebration
        if (prog.pct === 100 && prog.total > 0) {
          const confettiColors = ['#00d2ff', '#00e676', '#ffab00', '#b44aff', '#e94560', '#ff6d00'];
          const confettiShapes = ['50%', '2px', '0'];
          let confettiHtml = '';
          for (let c = 0; c < 30; c++) {
            const color = confettiColors[c % confettiColors.length];
            const left = 30 + Math.random() * 40;
            const top = 30 + Math.random() * 20;
            const delay = Math.random() * 0.5;
            const size = 4 + Math.random() * 5;
            const angle = (Math.random() * 360) * Math.PI / 180;
            const dist = 40 + Math.random() * 80;
            const sprayX = Math.cos(angle) * dist;
            const sprayY = Math.sin(angle) * dist - 30;
            const shape = confettiShapes[c % confettiShapes.length];
            confettiHtml += `<div class="confetti-particle" style="left:${left}%;top:${top}%;background:${color};width:${size}px;height:${size * (0.5 + Math.random())}px;border-radius:${shape};--spray-x:${sprayX}px;--spray-y:${sprayY}px;animation-delay:${delay}s"></div>`;
          }
          html += `<div class="day-complete-banner">
          ${confettiHtml}
          <div class="day-complete-text">\u2728 ${dayName} Complete!</div>
          <div class="day-complete-sub">All ${prog.total} tasks done. You crushed it.</div>
        </div>`;
        }

        // Skip debt warning
        const skipDebt = getSkipDebt();
        const debtEntries = Object.entries(skipDebt).filter(([, c]) => c >= 2);
        if (debtEntries.length > 0) {
          html += `<div class="skip-debt-banner">
          <div class="skip-debt-header">\u26a0 Skip Debt</div>`;
          debtEntries.forEach(([label, count]) => {
            html += `<div class="skip-debt-item"><span>${label}</span><span class="skip-debt-count">${count} skipped</span></div>`;
          });
          html += `</div>`;
        }

        // Category filter bar
        const usedCats = new Set();
        day.sections.forEach(s => s.items.forEach(item => {
          if (item.cat && item.cat !== 'routine' && item.cat !== 'reflect') usedCats.add(item.cat);
        }));
        if (usedCats.size > 1) {
          html += `<div class="cat-filter-bar">
          <button class="cat-filter-btn haptic-press ${!activeFilter ? 'active' : ''}" onclick="toggleCatFilter(null)"
                  style="${!activeFilter ? 'background:var(--text-bright);color:var(--bg);border-color:transparent;font-weight:600' : ''}">All</button>`;
          usedCats.forEach(cat => {
            const c = CAT[cat];
            const label = CAT_LABEL[cat] || cat;
            const isActive = activeFilter === cat;
            html += `<button class="cat-filter-btn haptic-press ${isActive ? 'active' : ''}" onclick="toggleCatFilter('${cat}')"
                    style="${isActive ? `background:${c.border}22;color:${c.border};border-color:${c.border}` : `color:${c.border}`}">${label}</button>`;
          });
          html += `</div>`;
        }

        // Sections
        const transClass = lastDayDirection === 'left' ? 'day-transition-left' : lastDayDirection === 'right' ? 'day-transition-right' : '';
        html += `<div class="sections ${dayLocked ? 'day-locked-overlay' : ''} ${transClass}" role="list" aria-label="Tasks for ${dayName}">`;
        let taskCounter = 0;
        day.sections.forEach((section, sIdx) => {
          let sClass = 'section-group';
          if (isToday) {
            if (sIdx < currentSectionIdx) sClass += ' section-past';
            else if (sIdx === currentSectionIdx) sClass += ' section-current';
          }
          // Check if all section tasks are done
          const sectionAllDone = section.items.every(item => {
            if (taskDeferred[item.id] && taskDeferred[item.id] !== dayName) return true;
            const st = getStatus(item.id);
            return st === STATUS_DONE || st === STATUS_SKIP;
          });
          html += `<div class="${sClass}"><div class="section-label">${section.label}`;
          if (!dayLocked && !sectionAllDone) {
            html += `<button class="section-done-btn haptic-press" onclick="event.stopPropagation();markSectionDone('${dayName}',${sIdx})">\u2713 All done</button>`;
          } else if (sectionAllDone && section.items.length > 0) {
            html += `<span style="font-size:9px;color:var(--accent);margin-left:6px;letter-spacing:0">\u2713</span>`;
          }
          html += `</div><div class="items">`;
          section.items.forEach(item => {
            html += renderItem(item);
            taskCounter++;
          });
          html += `</div></div>`;
        });
        html += `</div>`;
        lastDayDirection = null; // clear after rendering
      } // end if (viewMode === 'day')

      // ── Panels ──

      function lazyPanel(id, title, titleStyle, contentFn) {
        const isOpen = openPanels[id];
        html += `<div class="panel">
    <div class="panel-header ${isOpen ? 'open' : ''}" data-panel-id="${id}" onclick="togglePanel('${id}')"
         role="button" aria-expanded="${!!isOpen}" aria-controls="panel-${id}" tabindex="0">
      <div class="panel-title"${titleStyle ? ` style="${titleStyle}"` : ''}>${title}</div><div class="panel-arrow">\u25bc</div>
    </div>
    <div class="panel-content ${isOpen ? 'open' : ''}" id="panel-${id}">`;
        if (isOpen) contentFn();
        html += `</div></div>`;
      }

      // Weekly overview
      lazyPanel('overview', 'Weekly Pattern', '', () => {
        overviewData.forEach(row => {
          html += `<div class="overview-row">
      <div class="overview-day" style="color:${row.color}">${row.day}</div>
      <div class="overview-tag" style="background:${row.color}15;color:${row.color};border:1px solid ${row.color}30">${row.tag}</div>
      <div class="overview-desc">${row.desc}</div>
    </div>`;
        });
      });

      // FA Engine
      lazyPanel('fa', 'FA Weekly Engine', '', () => {
        html += `<div style="font-size:12px;color:#71717a;line-height:1.8">
      <span style="color:#ff9100;font-weight:600">Thu</span> Meeting \u2192 feedback + follow-up questions<br>
      <span style="color:#ffab00;font-weight:600">Thu\u2013Fri</span> Start follow-ups while conversation is fresh<br>
      <span style="color:#00d2ff;font-weight:600">Sat\u2013Sun</span> Bulk deep work (fueled by Thu feedback)<br>
      <span style="color:#b44aff;font-weight:600">Mon\u2013Tue</span> Continue exercises, build intuition arguments<br>
      <span style="color:#00e676;font-weight:600">Wed</span> Polish & prep material to present Thursday
    </div>`;
      });

      // How it works
      lazyPanel('how', 'How this works', '', () => {
        html += `<div class="info" style="background:#0a1628;border:1px solid rgba(0,210,255,0.13);color:#8899aa">
        <p><strong>No fixed times except class, wake & FA meeting.</strong> Work through tasks in order. Finish early? Take the slack.</p>
        <p><strong>Every course block = homework.</strong> The schedule routes hw to optimal days based on lecture timing.</p>
        <p><strong>Analysis IV has the only external check.</strong> Mon lecture \u2192 Mon/Tue hw \u2192 Wed office hours. Other courses: hw + check with AI.</p>
      </div>`;
      });

      // Cut order
      lazyPanel('cut', 'Bad day? Cut order', 'color:#e94560', () => {
        html += `<div class="info" style="background:#1a0a0a;border:1px solid rgba(233,69,96,0.13);color:#aa8888">
        <p>1. Next-day previews</p>
        <p>2. Physics II / Comp Math hw</p>
        <p>3. Number Theory II hw</p>
        <p>4. Algebra II hw</p>
        <p style="color:#aabbcc">\u2014 protected below \u2014</p>
        <p style="color:#aabbcc">5. Analysis IV hw (office hours deadline)</p>
        <p style="color:#aabbcc">6. FA blocks (whole week \u2192 Thursday)</p>
      </div>`;
      });

      // Reading list (Goodreads to-read)
      lazyPanel('readinglist', `Reading List (${readingList.length} books)`, 'color:#cf7aff', () => {
        html += `<div class="data-controls" style="margin-bottom:10px">
          <button class="data-btn" onclick="event.stopPropagation();syncGoodreads()" style="color:#cf7aff;border-color:#cf7aff33">
            ${readingSyncStatus === 'syncing' ? 'Syncing\u2026' : '\uD83D\uDD04 Sync RSS'}
          </button>
          <button class="data-btn" onclick="event.stopPropagation();readingShowCSV=!readingShowCSV;render()" style="color:#b44aff;border-color:#b44aff33">
            \uD83D\uDCC4 Import CSV
          </button>
          ${readingList.length > 0 ? '<button class="data-btn" onclick="event.stopPropagation();readingList=READING_LIST_DEFAULT;saveReadingList();readingSyncStatus=null;render()" style="color:#e94560;border-color:#e9456033">\u2715 Reset</button>' : ''}
        </div>`;
        if (readingLastSync) {

      if (pageSwipeBlocked) { pageSwipeBlocked = false; return; }
      const diffX = e.changedTouches[0].screenX - touchStartX;
      const diffY = e.changedTouches[0].screenY - touchStartY;
      if (Math.abs(diffY) > Math.abs(diffX)) return;
      if (Math.abs(diffX) > 60) {
        if (diffX < 0 && selectedDay < 6) selectDay(selectedDay + 1);
        else if (diffX > 0 && selectedDay > 0) selectDay(selectedDay - 1);
      }
    }, { passive: true });

    // ── Keyboard ──
    document.addEventListener('keydown', e => {
      const tag = (e.target.tagName || '').toLowerCase();
      const isInput = tag === 'input' || tag === 'textarea' || tag === 'select';

      if (e.key === 'Enter' || e.key === ' ') {
        const el = document.activeElement;
        if (el && el.dataset.taskId) { e.preventDefault(); toggle(el.dataset.taskId); return; }
        if (el && el.dataset.panelId) { e.preventDefault(); togglePanel(el.dataset.panelId); return; }
      }
      if (e.key === 'Escape') {
        if (showShortcuts) { toggleShortcuts(); return; }
        if (searchQuery) { clearSearch(); return; }
        if (fabOpen) { fabOpen = false; render(); return; }
      }
      if (isInput) return;
      if (e.key === 'ArrowRight' && selectedDay < 6) selectDay(selectedDay + 1);
      if (e.key === 'ArrowLeft' && selectedDay > 0) selectDay(selectedDay - 1);
      if (e.key === '?' || (e.shiftKey && e.key === '/')) { e.preventDefault(); toggleShortcuts(); }
      if (e.key === '/' && !e.shiftKey) { e.preventDefault(); const si = document.getElementById('search-input'); if (si) si.focus(); }
      if (e.key === 'f' || e.key === 'F') toggleFocusMode();
      if (e.key === 'w' || e.key === 'W') setViewMode('week');
      if (e.key === 'd' || e.key === 'D') setViewMode('day');
      if (e.key === '+' || e.key === '=') { if (fontScale !== 'large') toggleFontSize(); }
      if (e.key === '-') { if (fontScale !== 'normal') toggleFontSize(); }
    });

    // ── PWA Manifest (with multiple icon sizes) ──
    (function () {
      // Generate PNG icons via canvas
      function generateIcon(size) {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#09090b';
        ctx.fillRect(0, 0, size, size);
        ctx.font = `${size * 0.7}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('\ud83d\udcd8', size / 2, size / 2 + size * 0.05);
        return canvas.toDataURL('image/png');
      }
      const m = {
        name: 'Study Plan', short_name: 'Study', start_url: '.', display: 'standalone',
        background_color: '#09090b', theme_color: '#09090b',
        icons: [
          { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>\ud83d\udcd8</text></svg>", sizes: 'any', type: 'image/svg+xml' },
          { src: generateIcon(192), sizes: '192x192', type: 'image/png' },
          { src: generateIcon(512), sizes: '512x512', type: 'image/png' },
        ]
      };
      const l = document.createElement('link'); l.rel = 'manifest';
      l.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(m));
      document.head.appendChild(l);
    })();

    // ── Service Worker (with update detection) ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          if (!newSW) return;
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              const banner = document.getElementById('sw-update');
              if (banner) banner.classList.add('show');
            }
          });
        });
      }).catch(err => {
        console.warn('SW registration failed:', err.message);
      });
      // Pre-cache the font on first load
      if (window.caches) {
        caches.open('study-plan-fonts-v1').then(cache => {
          cache.match('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap').then(r => {
            if (!r) fetch('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap').then(res => { if (res.ok) cache.put(res.url, res); }).catch(() => {});
          });
        }).catch(() => {});
      }
    }

    // ── Offline / Online indicator ──
    function updateOfflineBanner() {
      const banner = document.getElementById('offline-banner');
      if (banner) banner.classList.toggle('show', !navigator.onLine);
    }
    window.addEventListener('online', () => { updateOfflineBanner(); showToast('Back online'); });
    window.addEventListener('offline', updateOfflineBanner);
    updateOfflineBanner();

    // ── Schedule migration ──
    // Preserves progress when schedule task IDs change across updates
    function getScheduleFingerprint() {
      const ids = [];
      DAYS.forEach(d => schedule[d].sections.forEach(s => s.items.forEach(item => ids.push(item.id))));
      return ids.join(',');
    }

    function buildTextToIdMap() {
      // Maps normalized task text+day → task id for current schedule
      // Uses day prefix to handle duplicate task texts across days
      const map = {};
      const seen = {};
      DAYS.forEach(d => schedule[d].sections.forEach(s => s.items.forEach(item => {
        const key = item.text.trim().toLowerCase();
        const uniqueKey = d + '::' + key;
        map[uniqueKey] = item.id;
        // Also store plain text key only if not a duplicate
        if (!seen[key]) {
          map[key] = item.id;
          seen[key] = true;
        }
      })));
      return map;
    }

    function buildIdToTextMap() {
      // For current schedule, maps id → { text, day } for migration
      const map = {};
      DAYS.forEach(d => schedule[d].sections.forEach(s => s.items.forEach(item => {
        map[item.id] = { text: item.text.trim().toLowerCase(), day: d };
      })));
      return map;
    }

    function getCurrentIds() {
      const ids = new Set();
      DAYS.forEach(d => schedule[d].sections.forEach(s => s.items.forEach(item => ids.add(item.id))));
      return ids;
    }

    function migrateProgress() {
      const fpKey = getWeekKey() + '-schedule-fp';
      const textMapKey = getWeekKey() + '-schedule-textmap';
      const currentFp = getScheduleFingerprint();
      const storedFp = localStorage.getItem(fpKey);

      if (storedFp === currentFp) return; // no change

      // First run — just store fingerprint and text map
      if (!storedFp) {
        localStorage.setItem(fpKey, currentFp);
        localStorage.setItem(textMapKey, JSON.stringify(buildIdToTextMap()));
        return;
      }

      // Schedule changed — attempt migration
      let oldTextMap = {};
      try {
        const raw = localStorage.getItem(textMapKey);
        if (raw) oldTextMap = JSON.parse(raw);
      } catch (e) { /* ignore */ }

      const newTextToId = buildTextToIdMap();
      const currentIds = getCurrentIds();
      let migrated = 0;

      // Build reverse map: old id → old text
      // Then find matching new id by text
      const newChecked = {};
      const newNotes = {};
      const newDeferred = {};

      // First, keep all entries that still have valid IDs
      for (const [id, val] of Object.entries(checked)) {
        if (currentIds.has(id)) {
          newChecked[id] = val;
        }
      }
      for (const [id, val] of Object.entries(taskNotes)) {
        if (currentIds.has(id)) {
          newNotes[id] = val;
        }
      }
      for (const [id, val] of Object.entries(taskDeferred)) {
        if (currentIds.has(id)) {
          newDeferred[id] = val;
        }
      }

      // Then, try to migrate orphaned entries by matching text (with day disambiguation)
      function findNewId(oldId) {
        const entry = oldTextMap[oldId];
        if (!entry) return null;
        const text = typeof entry === 'string' ? entry : entry.text;
        const day = typeof entry === 'object' ? entry.day : null;
        // Try day-specific match first (handles duplicates)
        if (day) {
          const dayKey = day + '::' + text;
          if (newTextToId[dayKey]) return newTextToId[dayKey];
        }
        // Fall back to plain text match
        return newTextToId[text] || null;
      }

      for (const [oldId, val] of Object.entries(checked)) {
        if (currentIds.has(oldId)) continue;
        const newId = findNewId(oldId);
        if (newId && !newChecked[newId]) {
          newChecked[newId] = val;
          migrated++;
        }
      }
      for (const [oldId, val] of Object.entries(taskNotes)) {
        if (currentIds.has(oldId)) continue;
        const newId = findNewId(oldId);
        if (newId && !newNotes[newId]) {
          newNotes[newId] = val;
          migrated++;
        }
      }
      for (const [oldId, val] of Object.entries(taskDeferred)) {
        if (currentIds.has(oldId)) continue;
        const newId = findNewId(oldId);
        if (newId && !newDeferred[newId]) {
          newDeferred[newId] = val;
          migrated++;
        }
      }

      checked = newChecked;
      taskNotes = newNotes;
      taskDeferred = newDeferred;

      // Save new fingerprint and text map
      localStorage.setItem(fpKey, currentFp);
      localStorage.setItem(textMapKey, JSON.stringify(buildIdToTextMap()));
      saveState();

      if (migrated > 0) {
        setTimeout(() => showToast(`Schedule updated \u2014 migrated ${migrated} item(s)`), 500);
      } else if (Object.keys(checked).length > 0 || Object.keys(taskNotes).length > 0) {
        setTimeout(() => showToast('Schedule updated \u2014 progress preserved'), 500);
      }
    }

    // ── Init ──
    loadState();
    migrateProgress();
    carryOverDeferrals();
    pruneOldData();
    checkStorageQuota();
    checkAutoTheme();
    setInterval(checkAutoTheme, 300000);
    renderImmediate();
    if (notifEnabled) scheduleNotifications();

    // Auto-connect sync if previously configured
    (function () {
      setupStoredSync().catch(err => {
        console.warn('Auto-sync failed:', err.message);
      });
    })();
  </script>
