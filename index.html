<style>
:root {
  --bg: #09090b; --surface: #111113; --surface2: #151518;
  --border: #1c1c1f; --border2: #222; --text: #e4e4e7;
  --muted: #71717a; --dim: #555; --faint: #333;
  --accent: #00d2ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  padding: 0; min-height: 100vh; overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }

.app { max-width: 680px; margin: 0 auto; padding: 20px 16px 100px; }

/* Header */
.header { padding: 16px 0 20px; }
.header-sub { font-size: 10px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; margin-bottom: 6px; }
.header h1 { font-size: 24px; font-weight: 700; letter-spacing: -1px; color: #fafafa; margin-bottom: 2px; }
.header-tag { font-size: 12px; color: var(--muted); }

/* Weekly progress */
.weekly-progress {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--muted); margin-bottom: 8px;
  padding: 8px 12px; background: var(--surface); border-radius: 8px;
  border: 1px solid var(--border);
}
.weekly-label { color: var(--dim); letter-spacing: 1px; text-transform: uppercase; font-size: 10px; }
.weekly-val { color: var(--text); font-weight: 500; }
.weekly-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; margin: 0 12px; overflow: hidden; }
.weekly-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

/* Progress bar */
.progress-wrap { margin-bottom: 24px; }
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
.progress-text { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
.tabs[role="tablist"] { outline: none; }
.tab {
  flex: 1 0 auto; padding: 10px 12px; font-size: 12px; font-weight: 400;
  font-family: inherit; background: var(--surface2); color: var(--muted);
  border: 1px solid var(--border2); border-radius: 8px; cursor: pointer;
  transition: all 0.15s; letter-spacing: 0.5px; position: relative;
}
.tab.active { font-weight: 600; background: #fafafa; color: var(--bg); border-color: transparent; }
.tab.today::after {
  content: ''; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%; background: var(--accent);
}
.tab .tab-progress {
  position: absolute; bottom: 0; left: 0; height: 2px; border-radius: 0 0 8px 8px;
  background: #00d2ff44; transition: width 0.3s;
}
.tab.active .tab-progress { background: #09090b33; }
.tab:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* Day header */
.day-header { margin-bottom: 20px; }
.day-name { font-size: 20px; font-weight: 600; color: #fafafa; margin-bottom: 6px; }
.day-meta { display: flex; gap: 12px; font-size: 11px; color: var(--muted); flex-wrap: wrap; align-items: center; }
.day-meta .val { color: var(--text); }
.day-meta .home { color: var(--accent); }
.day-meta .flag { color: #ff9100; }

/* Sections */
.sections { display: flex; flex-direction: column; gap: 22px; margin-bottom: 32px; }
.section-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; padding-left: 2px; transition: color 0.3s; }
.items { display: flex; flex-direction: column; gap: 4px; }

/* Section time awareness */
.section-group { transition: opacity 0.3s; }
.section-past { opacity: 0.45; }
.section-past .item:not(.done) { opacity: 0.7; }
.section-current > .section-label { color: var(--accent); }
.section-current > .section-label::after {
  content: ' now'; font-size: 9px; color: #00d2ff88; letter-spacing: 1px; font-weight: 400;
}

/* Task item */
.item {
  display: flex; align-items: flex-start; border-radius: 10px; overflow: hidden;
  transition: opacity 0.3s, transform 0.2s; cursor: pointer; user-select: none;
  outline: none;
}
.item:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; border-radius: 10px; }
.item.done { opacity: 0.35; }
.item.done .item-text { text-decoration: line-through; }
.item-bar { width: 3px; flex-shrink: 0; align-self: stretch; }
.item-body { padding: 10px 12px; flex: 1; display: flex; align-items: flex-start; gap: 10px; }
.item-check {
  width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--faint);
  flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; background: transparent;
}
.item.done .item-check { border-color: var(--accent); background: #00d2ff22; }
.item.done .item-check::after { content: '\2713'; font-size: 11px; color: var(--accent); }
.item-info { flex: 1; min-width: 0; }
.item-text { font-size: 13px; font-weight: 500; line-height: 1.4; }
.item-hint { font-size: 11px; color: var(--dim); margin-top: 2px; line-height: 1.4; }
.item-cat { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; opacity: 0.6; }

/* Check animation */
@keyframes checkPop {
  0% { transform: scale(1); }
  40% { transform: scale(0.96); }
  100% { transform: scale(1); }
}
.item.just-toggled { animation: checkPop 0.25s ease; }

/* Panels */
.panel {
  background: var(--surface); border-radius: 12px; border: 1px solid var(--border);
  margin-bottom: 16px; overflow: hidden;
}
.panel-header {
  padding: 14px 16px; cursor: pointer; display: flex; justify-content: space-between;
  align-items: center; user-select: none; outline: none;
}
.panel-header:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; border-radius: 12px; }
.panel-title { font-size: 13px; font-weight: 600; color: #fafafa; letter-spacing: 0.5px; }
.panel-arrow { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
.panel-header.open .panel-arrow { transform: rotate(180deg); }
.panel-content { padding: 0 16px 16px; display: none; }
.panel-content.open { display: block; }

/* Overview */
.overview-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: baseline; flex-wrap: wrap; }
.overview-day { width: 30px; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.overview-tag { font-size: 9px; padding: 2px 5px; border-radius: 4px; flex-shrink: 0; white-space: nowrap; }
.overview-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }

/* Info panels */
.info { padding: 14px; border-radius: 10px; font-size: 11px; line-height: 1.7; margin-bottom: 12px; }
.info strong { color: #aabbcc; }
.info p { margin-top: 6px; }
.info p:first-child { margin-top: 0; }

/* Streak chart */
.streak-chart {
  display: flex; align-items: flex-end; gap: 3px; height: 36px; padding: 4px 0;
}
.streak-bar {
  flex: 1; background: var(--faint); border-radius: 2px; min-height: 3px;
  transition: height 0.3s; position: relative;
}
.streak-bar.current { background: var(--accent); }
.streak-bar-label {
  position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
  font-size: 8px; color: var(--dim); white-space: nowrap;
}
.streak-bar.current .streak-bar-label { color: var(--accent); }
.streak-empty { font-size: 11px; color: var(--dim); padding: 8px 0; }

/* Data controls */
.data-controls { display: flex; gap: 8px; }
.data-btn {
  font-family: inherit; font-size: 11px; color: var(--muted); background: var(--surface2);
  border: 1px solid var(--border2); border-radius: 6px; padding: 8px 14px;
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px; flex: 1;

.data-btn:hover { color: var(--text); border-color: #00d2ff44; }
.data-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

/* Sync */
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%; display: inline-block;
  margin-left: 8px; vertical-align: middle; position: relative; top: -1px;
}
.sync-dot.connected { background: #00e676; box-shadow: 0 0 6px #00e67644; }
.sync-dot.syncing { background: #ffab00; animation: syncPulse 1.2s infinite; }
.sync-dot.offline { background: var(--faint); }
.sync-dot.hidden { display: none; }
@keyframes syncPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.sync-input {
  width: 100%; font-family: inherit; font-size: 10px; background: var(--bg);
  color: var(--text); border: 1px solid var(--border2); border-radius: 6px;
  padding: 8px 10px; resize: vertical; min-height: 80px; margin-bottom: 8px;
  line-height: 1.5;
}
.sync-input:focus { outline: none; border-color: var(--accent); }
.sync-input::placeholder { color: var(--faint); }
.sync-msg { font-size: 11px; margin-top: 8px; line-height: 1.4; }
.sync-msg.ok { color: #00e676; }
.sync-msg.err { color: #e94560; }
.sync-msg.wait { color: #ffab00; }
.sync-info { font-size: 10px; color: var(--dim); line-height: 1.6; margin-bottom: 10px; }

/* Reset button */
.reset-wrap { text-align: center; padding: 20px 0; }
.reset-btn {
  font-family: inherit; font-size: 11px; color: var(--dim); background: none;
  border: 1px solid var(--border2); border-radius: 6px; padding: 6px 14px;
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;

.reset-btn:hover { color: #e94560; border-color: #e9456044; }
.reset-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* Toast */
.toast {
  position: fixed; bottom: -70px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px;
  padding: 10px 16px; font-family: inherit; font-size: 12px; color: var(--text);

  white-space: nowrap; max-width: 90vw;
}
.toast.show { bottom: 28px; }
.toast-undo {
  font-family: inherit; font-size: 11px; font-weight: 600; color: var(--accent);
  background: none; border: none; cursor: pointer; padding: 2px 8px; border-radius: 4px;
}
.toast-undo:hover { background: #00d2ff15; }

@media (max-width: 400px) {
  .app { padding: 12px 12px 100px; }
  .header h1 { font-size: 20px; }
  .item-text { font-size: 12px; }
  .tab { padding: 8px 10px; font-size: 11px; }
}
</style>

// ── ISO Week (fixed) ──
function getISOWeek(d) {
  const date = new Date(d.getTime());
  date.setHours(0, 0, 0, 0);
  date.setDate(date.getDate() + 3 - ((date.getDay() + 6) % 7));
  const week1 = new Date(date.getFullYear(), 0, 4);
  return 1 + Math.round(((date - week1) / 86400000 - 3 + ((week1.getDay() + 6) % 7)) / 7);
}

function getWeekKey() { return `sp26-w${getISOWeek(new Date())}`; }
function getWeekNum() { return getISOWeek(new Date()); }

// ── History / Streak ──
function saveHistory() {
  try {
    const hist = JSON.parse(localStorage.getItem('sp26-history') || '{}');
    hist[getWeekKey()] = getWeeklyProgress().pct;
    localStorage.setItem('sp26-history', JSON.stringify(hist));
  } catch(e) {}
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem('sp26-history') || '{}'); }
  catch(e) { return {}; }
}

// ── Toast / Undo ──
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.innerHTML = `<span>${msg}</span><button class="toast-undo" onclick="undoToggle()">Undo</button>`;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(hideToast, 3500);
}

function hideToast() {
  document.getElementById('toast').classList.remove('show');
}

function undoToggle() {
  if (!lastToggle) return;
  checked[lastToggle.id] = !lastToggle.wasChecked;
  lastToggle = null;
  saveState();
  hideToast();
  render();
}

// ── Toggle (targeted DOM update) ──
function toggle(id) {
  checked[id] = !checked[id];
  lastToggle = { id, wasChecked: checked[id] };
  saveState();

  const item = document.querySelector(`[data-task-id="${id}"]`);
  if (item) {
    const isDone = !!checked[id];
    item.classList.toggle('done', isDone);
    item.setAttribute('aria-checked', String(isDone));
    if (isDone) {
      item.classList.remove('just-toggled');
      void item.offsetWidth;
      item.classList.add('just-toggled');
      setTimeout(() => item.classList.remove('just-toggled'), 300);
    }
    updateProgressBars();
    showToast(isDone ? 'Task completed' : 'Task unchecked');
  } else {
    render();
    showToast(checked[id] ? 'Task completed' : 'Task unchecked');
  }
}

function updateProgressBars() {
  const dayName = DAYS[selectedDay];
  const prog = getDayProgress(dayName);
  const wp = getWeeklyProgress();

  const fill = document.querySelector('.progress-fill');
  if (fill) fill.style.width = prog.pct + '%';

  const taskCount = document.getElementById('task-count');
  const taskPct = document.getElementById('task-pct');
  if (taskCount) taskCount.textContent = `${prog.done}/${prog.total} tasks`;
  if (taskPct) taskPct.textContent = `${prog.pct}%`;

  const weekVal = document.getElementById('week-val');
  if (weekVal) weekVal.textContent = `${wp.done}/${wp.total} \u00b7 ${wp.pct}%`;
  const weekFill = document.querySelector('.weekly-bar-fill');
  if (weekFill) weekFill.style.width = wp.pct + '%';

  document.querySelectorAll('.tab').forEach((tab, i) => {
    const p = getDayProgress(DAYS[i]);
    const bar = tab.querySelector('.tab-progress');
    if (bar) bar.style.width = p.pct + '%';
  });
}

function togglePanel(id) {
  openPanels[id] = !openPanels[id];
  const header = document.querySelector(`[data-panel-id="${id}"]`);
  if (header) {
    const content = document.getElementById(`panel-${id}`);
    header.classList.toggle('open', !!openPanels[id]);
    header.setAttribute('aria-expanded', String(!!openPanels[id]));
    if (content) content.classList.toggle('open', !!openPanels[id]);
  } else {
    render();
  }
}

function resetDay() {
  if (!confirm(`Reset all tasks for ${DAYS[selectedDay]}?`)) return;
  const dayName = DAYS[selectedDay];
  schedule[dayName].sections.forEach(s => s.items.forEach(item => { delete checked[item.id]; }));
  saveState();
  render();
}

// ── Progress ──
function getDayProgress(dayName) {
  const day = schedule[dayName];
  let total = 0, done = 0;
  day.sections.forEach(s => s.items.forEach(item => {
    total++;
    if (checked[item.id]) done++;
  }));
  return { total, done, pct: total ? Math.round((done/total)*100) : 0 };
}

function getWeeklyProgress() {
  let total = 0, done = 0;
  DAYS.forEach(d => { const p = getDayProgress(d); total += p.total; done += p.done; });
  return { total, done, pct: total ? Math.round((done/total)*100) : 0 };
}

// ── Time-aware sections ──
function getCurrentSectionIndex(sections) {
  const now = new Date();
  const h = now.getHours() + now.getMinutes() / 60;
  const times = sections.map((s, i) => {
    for (const item of s.items) {
      const m = item.text.match(/(\d{1,2}):(\d{2})/);
      if (m) return parseInt(m[1]) + parseInt(m[2]) / 60;
    }
    const l = s.label.toLowerCase();
    if (l.includes('before') || l.includes('morning') || l.includes('core')) return 8;
    if (l.includes('class') || l.includes('meeting')) return 9;
    if (l.includes('after') || l.includes('afternoon')) return 15;
    if (l.includes('evening')) return 18;
    return 8 + i * 3;
  });
  let idx = 0;
  for (let i = 0; i < times.length; i++) { if (h >= times[i]) idx = i; }
  return idx;
}

// ── Export / Import ──
function exportData() {
  const data = { checked, history: loadHistory(), weekKey: getWeekKey(), exported: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `study-plan-${getWeekKey()}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.checked) { checked = data.checked; saveState(); }
        if (data.history) localStorage.setItem('sp26-history', JSON.stringify(data.history));
        render();
        showToast('Data imported');
      } catch(err) { showToast('Invalid file'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── Firebase Sync ──
// ════════════════════════════════════════

function getSyncConfig() {
  try { return JSON.parse(localStorage.getItem('sp26-sync-config')); }
  catch(e) { return null; }
}

function saveSyncConfig(config) {
  localStorage.setItem('sp26-sync-config', JSON.stringify(config));
}

function loadFirebaseSDK() {
  return new Promise((resolve, reject) => {
    if (window.firebase && window.firebase.database) { resolve(); return; }
    const s1 = document.createElement('script');
    s1.src = 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js';
    s1.onload = () => {
      const s2 = document.createElement('script');
      s2.src = 'https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js';
      s2.onload = resolve;
      s2.onerror = () => reject(new Error('Failed to load database SDK'));
      document.head.appendChild(s2);
    };
    s1.onerror = () => reject(new Error('Failed to load Firebase SDK'));
    document.head.appendChild(s1);
  });
}

function parseFirebaseConfig(text) {
  // Try direct JSON
  try { const obj = JSON.parse(text); if (obj.databaseURL) return obj; } catch(e) {}
  // Find the object containing apiKey (handles full SDK snippet, surrounding code, etc.)
  const match = text.match(/\{[^{}]*apiKey[^{}]*\}/s);
  if (match) {
    try {
      // Evaluate as JS object literal — handles unquoted keys, single quotes, trailing commas
      const obj = new Function('return (' + match[0] + ')')();
      if (obj && typeof obj === 'object' && obj.databaseURL) return obj;
    } catch(e) {}
  }
  return null;
}

async function initSync(config) {
  syncStatus = 'syncing';
  updateSyncDot();

  await loadFirebaseSDK();

  if (!firebase.apps.length) {
    firebase.initializeApp(config);
  }

  const db = firebase.database();

  // Connection monitoring
  db.ref('.info/connected').on('value', snap => {
    syncStatus = snap.val() ? 'connected' : 'offline';
    updateSyncDot();
  });

  // Listen for current week's checked data
  if (syncRef && syncListener) syncRef.off('value', syncListener);

  syncRef = db.ref('study/' + getWeekKey());
  syncListener = syncRef.on('value', snap => {
    if (ignoreNextRemote) { ignoreNextRemote = false; return; }
    if (snap.exists()) {
      checked = snap.val();
      localStorage.setItem(getWeekKey(), JSON.stringify(checked));
      render();
    }
  });

  // Also listen for history
  db.ref('study/history').on('value', snap => {
    if (snap.exists()) {
      localStorage.setItem('sp26-history', JSON.stringify(snap.val()));
    }
  });

  firebaseReady = true;
  saveSyncConfig(config);
}

function syncPush() {
  if (!firebaseReady || !syncRef) return;
  ignoreNextRemote = true;
  syncRef.set(checked).catch(() => { ignoreNextRemote = false; });
  // Also push history
  try {
    firebase.database().ref('study/history').set(loadHistory()).catch(() => {});
  } catch(e) {}
}

function updateSyncDot() {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot ' + (getSyncConfig() ? syncStatus : 'hidden');
  dot.title = syncStatus === 'connected' ? 'Synced' :
              syncStatus === 'syncing' ? 'Syncing\u2026' : 'Offline';
}

async function connectSync() {
  const input = document.getElementById('sync-config-input');
  const msg = document.getElementById('sync-msg');
  if (!input || !msg) return;

  const config = parseFirebaseConfig(input.value.trim());
  if (!config) {
    msg.className = 'sync-msg err';
    msg.textContent = 'Could not parse config. Make sure you copied the full firebaseConfig object.';
    return;
  }

  msg.className = 'sync-msg wait';
  msg.textContent = 'Connecting\u2026';

  try {
    await initSync(config);
    render();
    showToast('Sync connected');
  } catch(err) {
    msg.className = 'sync-msg err';
    msg.textContent = 'Failed: ' + err.message;
  }
}

function disconnectSync() {
  if (syncRef && syncListener) syncRef.off('value', syncListener);
  try {
    if (firebase.apps.length) {
      firebase.database().ref('.info/connected').off();
      firebase.database().ref('study/history').off();
    }
  } catch(e) {}
  localStorage.removeItem('sp26-sync-config');
  firebaseReady = false;
  syncRef = null;
  syncListener = null;
  syncStatus = 'offline';
  render();
  showToast('Sync disconnected');
}

  </div>`;

  // Reset
  html += `<div class="reset-wrap"><button class="reset-btn" onclick="resetDay()">Reset ${dayName}</button></div>`;

  document.getElementById('app').innerHTML = html;
  requestAnimationFrame(() => window.scrollTo(0, scrollY));
}

function selectDay(i) {
  selectedDay = i;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Swipe (with vertical guard) ──
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, { passive: true });
document.addEventListener('touchend', e => {
  const diffX = e.changedTouches[0].screenX - touchStartX;
  const diffY = e.changedTouches[0].screenY - touchStartY;
  if (Math.abs(diffY) > Math.abs(diffX)) return;
  if (Math.abs(diffX) > 60) {
    if (diffX < 0 && selectedDay < 6) selectDay(selectedDay + 1);
    else if (diffX > 0 && selectedDay > 0) selectDay(selectedDay - 1);
  }
}, { passive: true });

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    const el = document.activeElement;
    if (el && el.dataset.taskId) { e.preventDefault(); toggle(el.dataset.taskId); return; }
    if (el && el.dataset.panelId) { e.preventDefault(); togglePanel(el.dataset.panelId); return; }
  }
  if (e.key === 'ArrowRight' && selectedDay < 6) selectDay(selectedDay + 1);
  if (e.key === 'ArrowLeft' && selectedDay > 0) selectDay(selectedDay - 1);
});

// ── PWA Manifest ──
(function() {
  const m = { name:'Study Plan', short_name:'Study', start_url:'.', display:'standalone',
    background_color:'#09090b', theme_color:'#09090b',
    icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>\ud83d\udcd8</text></svg>",sizes:'any',type:'image/svg+xml'}]};
  const l = document.createElement('link'); l.rel = 'manifest';
  l.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(m));
  document.head.appendChild(l);
})();

// ── Init ──
loadState();
render();

// Auto-connect sync if previously configured
(function() {
  const config = getSyncConfig();
  if (config) {
    initSync(config).catch(err => {
      console.warn('Auto-sync failed:', err.message);
    });
  }
})();
</script>
</body>
</html>
