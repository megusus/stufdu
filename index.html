<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#09090b">
  <title>Study Plan</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --surface: #111113;
      --surface2: #151518;
      --border: #1c1c1f;
      --border2: #222;
      --text: #e4e4e7;
      --text-bright: #fafafa;
      --muted: #71717a;
      --dim: #555;
      --faint: #333;
      --accent: #00d2ff;
      --toast-shadow: rgba(0, 0, 0, 0.5);
    }

    [data-theme="light"] {
      --bg: #faf6ed;
      --surface: #f2ead8;
      --surface2: #ebe3d0;
      --border: #ddd4bf;
      --border2: #d0c7b0;
      --text: #3c3836;
      --text-bright: #2c2620;
      --muted: #7c6f64;
      --dim: #a89984;
      --faint: #d5c8ac;
      --accent: #007a99;
      --toast-shadow: rgba(0, 0, 0, 0.15);
    }

    [data-theme="light"] .tab.active {
      background: var(--text-bright);
      color: var(--bg);
    }

    [data-theme="light"] .tab .tab-progress {
      background: #007a9944;
    }

    [data-theme="light"] .tab.active .tab-progress {
      background: #faf6ed33;
    }

    [data-theme="light"] .item {
      background: var(--surface) !important;
      border-color: var(--border) !important;
    }

    [data-theme="light"] .item.done .item-check {
      border-color: var(--accent);
      background: #007a9922;
    }

    [data-theme="light"] .item.done .item-check::after {
      color: var(--accent);
    }

    [data-theme="light"] .item.done .item-text::after {
      color: var(--accent);
    }

    [data-theme="light"] .info {
      background: var(--surface) !important;
      border-color: var(--border) !important;
    }

    [data-theme="light"] .sync-dot.connected {
      background: #2e8b57;
      box-shadow: 0 0 6px #2e8b5744;
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      transition: all 0.15s;
      color: var(--muted);
      vertical-align: middle;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--faint);
      border-radius: 2px;
    }

    .app {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 16px 100px;
    }

    /* Header */
    .header {
      padding: 16px 0 20px;
    }

    .header-sub {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text-bright);
      margin-bottom: 2px;
    }

    .header-tag {
      font-size: 12px;
      color: var(--muted);
    }

    /* Weekly progress */
    .weekly-progress {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .weekly-label {
      color: var(--dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 10px;
    }

    .weekly-val {
      color: var(--text);
      font-weight: 500;
    }

    .weekly-bar {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 12px;
      overflow: hidden;
    }

    .weekly-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #00e676);
      background-size: 200% 100%;
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 24px;
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #00e676);
      background-size: 200% 100%;
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .progress-text {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }

    .tabs[role="tablist"] {
      outline: none;
    }

    .tab {
      flex: 1 0 auto;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 400;
      font-family: inherit;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
      position: relative;
    }

    .tab.active {
      font-weight: 600;
      background: var(--text-bright);
      color: var(--bg);
      border-color: transparent;
    }

    .tab.today::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    .tab .tab-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      border-radius: 0 0 8px 8px;
      background: #00d2ff44;
      transition: width 0.3s;
    }

    .tab.active .tab-progress {
      background: #09090b33;
    }

    .tab:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Day header */
    .day-header {
      margin-bottom: 20px;
    }

    .day-name {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 6px;
    }

    .day-meta {
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: var(--muted);
      flex-wrap: wrap;
      align-items: center;
    }

    .day-meta .val {
      color: var(--text);
    }

    .day-meta .home {
      color: var(--accent);
    }

    .day-meta .flag {
      color: #ff9100;
    }

    /* Sections */
    .sections {
      display: flex;
      flex-direction: column;
      gap: 22px;
      margin-bottom: 32px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 8px;
      padding-left: 2px;
      transition: color 0.3s;
    }

    .items {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* Section time awareness */
    .section-group {
      transition: opacity 0.3s;
    }

    .section-past {
      opacity: 0.45;
    }

    .section-past .item:not(.done) {
      opacity: 0.7;
    }

    .section-current>.section-label {
      color: var(--accent);
    }

    .section-current>.section-label::after {
      content: ' now';
      font-size: 9px;
      color: #00d2ff88;
      letter-spacing: 1px;
      font-weight: 400;
    }

    /* Task item */
    .item {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      border-radius: 10px;
      overflow: hidden;
      transition: opacity 0.3s, transform 0.2s;
      cursor: pointer;
      user-select: none;
      outline: none;
    }

    .item:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-radius: 10px;
    }

    .item.done {
      opacity: 0.55;
    }

    .item.done .item-text {
      text-decoration: line-through;
    }

    .item-bar {
      width: 3px;
      flex-shrink: 0;
      align-self: stretch;
    }

    .item-body {
      padding: 10px 12px;
      flex: 1;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .item-check {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid var(--faint);
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: transparent;
    }

    .item.done .item-check {
      border-color: var(--accent);
      background: #00d2ff22;
    }

    .item.done .item-check::after {
      content: '\2713';
      font-size: 11px;
      color: var(--accent);
    }

    .item-info {
      flex: 1;
      min-width: 0;
    }

    .item-text {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
    }

    .item-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      line-height: 1.4;
    }

    .item-cat {
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 3px;
      opacity: 0.8;
    }

    /* Task states */
    .item.skip {
      opacity: 0.55;
    }

    .item.skip .item-text {
      text-decoration: line-through;
      color: #e94560 !important;
    }

    /* Skipped summary banner */
    .skipped-banner {
      background: #e9456012;
      border: 1px solid #e9456030;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 12px;
    }

    .skipped-banner-header {
      font-size: 11px;
      font-weight: 600;
      color: #e94560;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .skipped-banner-count {
      background: #e9456033;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
    }

    .skipped-banner-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .skipped-banner-item {
      font-size: 11px;
      color: #e9456099;
      text-decoration: line-through;
      padding: 2px 0;
    }

    .skipped-banner-item .sbi-cat {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.7;
      margin-left: 6px;
      text-decoration: none;
      display: inline-block;
    }

    .item.skip .item-check {
      border-color: #e94560;
      background: #e9456022;
    }

    .item.skip .item-check::after {
      content: '\u2716';
      font-size: 10px;
      color: #e94560;
    }

    .item.progress .item-check {
      border-color: #ffab00;
      background: #ffab0022;
    }

    .item.progress .item-check::after {
      content: '\25B6';
      font-size: 9px;
      color: #ffab00;
      animation: progressPulse 1.5s infinite;
    }

    .item.progress .item-text::after {
      content: ' [in progress]';
      font-size: 9px;
      color: #ffab00;
      font-weight: 400;
    }

    .item.skip .item-text::after {
      content: ' [skipped]';
      font-size: 9px;
      color: #e94560;
      font-weight: 400;
    }

    .item.done .item-text::after {
      content: ' [done]';
      font-size: 9px;
      color: var(--accent);
      font-weight: 400;
    }

    @keyframes progressPulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .item.deferred-out {
      display: none;
    }

    /* Lock button */
    .lock-btn {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      font-family: inherit;
      transition: all 0.15s;
    }

    .lock-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .lock-btn.locked {
      background: #ffab0018;
      border-color: #ffab0044;
      color: #ffab00;
    }

    .day-locked-overlay {
      pointer-events: none;
      opacity: 0.6;
    }

    .day-locked-overlay .item-swipe-wrap {
      pointer-events: none;
    }

    /* Swipe reveal layers */
    .item-swipe-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      margin-bottom: 0;
    }

    .swipe-bg {
      position: absolute;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      padding: 0 18px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .swipe-bg-right {
      left: 0;
      right: 50%;
      background: linear-gradient(90deg, #00d2ff33, transparent);
      color: var(--accent);
      justify-content: flex-start;
    }

    .swipe-bg-left {
      right: 0;
      left: 50%;
      background: linear-gradient(-90deg, #e9456033, transparent);
      color: #e94560;
      justify-content: flex-end;
    }

    .swipe-bg.visible {
      opacity: 1;
    }

    .item-swipe-inner {
      position: relative;
      z-index: 1;
      transition: transform 0.15s ease-out;
      touch-action: pan-y;
    }

    /* Task entrance animation */
    @keyframes taskPop {
      0% {
        transform: scale(0.97);
        opacity: 0.5;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Completion celebration */
    @keyframes taskComplete {
      0% {
        transform: scale(1);
      }

      25% {
        transform: scale(1.025);
      }

      50% {
        transform: scale(0.99);
      }

      100% {
        transform: scale(1);
      }
    }

    /* Action menu */
    .item-actions-btn {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--dim);
      cursor: pointer;
      border-radius: 4px;
      transition: color 0.15s;
      margin-left: auto;
      align-self: center;
    }

    .item-actions-btn:hover {
      color: var(--text);
    }

    .item-action-bar {
      display: none;
      gap: 2px;
      padding: 6px 12px 8px;
      flex-wrap: wrap;
      width: 100%;
    }

    .item-action-bar.open {
      display: flex;
    }

    .action-btn {
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.3px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .action-btn:hover {
      color: var(--text);
      border-color: #00d2ff44;
    }

    .action-btn.act-skip {
      color: #e94560;
      border-color: #e9456033;
    }

    .action-btn.act-progress {
      color: #ffab00;
      border-color: #ffab0033;
    }

    .action-btn.act-note {
      color: #b44aff;
      border-color: #b44aff33;
    }

    .action-btn.act-defer {
      color: #00d2ff;
      border-color: #00d2ff33;
    }

    .action-btn.act-clear {
      color: var(--dim);
    }

    /* Defer day picker */
    .defer-picker {
      display: none;
      gap: 3px;
      padding: 4px 12px 8px;
      flex-wrap: wrap;
    }

    .defer-picker.open {
      display: flex;
    }

    .defer-day-btn {
      font-family: inherit;
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--accent);
      cursor: pointer;
      transition: all 0.15s;
    }

    .defer-day-btn:hover {
      background: #00d2ff15;
    }

    /* Inline note */
    .item.done .item-note,
    .item.skip .item-note {
      opacity: 1;
    }

    .item-note {
      font-size: 11px;
      color: #d4a0ff;
      margin-top: 3px;
      line-height: 1.5;
      padding: 4px 8px;
      background: #b44aff15;
      border-radius: 4px;
      border: 1px solid #b44aff25;
    }

    [data-theme="light"] .item-note {
      color: #7b2cbf;
      background: #b44aff12;
      border-color: #b44aff20;
    }

    .note-input:focus {
      border-color: #d4a0ff;
    }

    /* Deferred section */
    .deferred-section {
      margin-bottom: 16px;
    }

    .deferred-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #00d2ff88;
      margin-bottom: 8px;
      padding-left: 2px;
    }

    .deferred-from {
      font-size: 9px;
      color: #00d2ff88;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Note icon */
    .note-icon {
      font-size: 10px;
      margin-left: 4px;
      opacity: 0.6;
    }

    /* Check animation */
    @keyframes checkPop {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(0.96);
      }

      100% {
        transform: scale(1);
      }
    }

    .item.just-toggled {
      animation: checkPop 0.25s ease;
    }

    /* Panels */
    .panel {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      outline: none;
    }

    .panel-header:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
      border-radius: 12px;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-bright);
      letter-spacing: 0.5px;
    }

    .panel-arrow {
      font-size: 12px;
      color: var(--muted);
      transition: transform 0.2s;
    }

    .panel-header.open .panel-arrow {
      transform: rotate(180deg);
    }

    .panel-content {
      padding: 0 16px 16px;
      display: none;
    }

    .panel-content.open {
      display: block;
    }

    /* Overview */
    .overview-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .overview-day {
      width: 30px;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .overview-tag {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 4px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .overview-desc {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* Info panels */
    .info {
      padding: 14px;
      border-radius: 10px;
      font-size: 11px;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .info strong {
      color: #aabbcc;
    }

    .info p {
      margin-top: 6px;
    }

    .info p:first-child {
      margin-top: 0;
    }

    /* Streak chart */
    .streak-chart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 36px;
      padding: 4px 0;
    }

    .streak-bar {
      flex: 1;
      background: var(--faint);
      border-radius: 2px;
      min-height: 3px;
      transition: height 0.3s;
      position: relative;
    }

    .streak-bar.current {
      background: var(--accent);
    }

    .streak-bar-label {
      position: absolute;
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      color: var(--dim);
      white-space: nowrap;
    }

    .streak-bar.current .streak-bar-label {
      color: var(--accent);
    }

    .streak-empty {
      font-size: 11px;
      color: var(--dim);
      padding: 8px 0;
    }

    /* Data controls */
    .data-controls {
      display: flex;
      gap: 8px;
    }

    .data-btn {
      font-family: inherit;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
      flex: 1;
    }

    .data-btn:hover {
      color: var(--text);
      border-color: #00d2ff44;
    }

    .data-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    /* Sync */
    .sync-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
      margin-left: 8px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .sync-dot.connected {
      background: #00e676;
      box-shadow: 0 0 6px #00e67644;
    }

    .sync-dot.syncing {
      background: #ffab00;
      animation: syncPulse 1.2s infinite;
    }

    .sync-dot.offline {
      background: var(--faint);
    }

    .sync-dot.hidden {
      display: none;
    }

    @keyframes syncPulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .sync-input {
      width: 100%;
      font-family: inherit;
      font-size: 10px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 8px 10px;
      resize: vertical;
      min-height: 80px;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .sync-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .sync-input::placeholder {
      color: var(--faint);
    }

    .sync-msg {
      font-size: 11px;
      margin-top: 8px;
      line-height: 1.4;
    }

    .sync-msg.ok {
      color: #00e676;
    }

    .sync-msg.err {
      color: #e94560;
    }

    .sync-msg.wait {
      color: #ffab00;
    }

    .sync-info {
      font-size: 10px;
      color: var(--dim);
      line-height: 1.6;
      margin-bottom: 10px;
    }

    /* Reset button */
    .reset-wrap {
      text-align: center;
      padding: 20px 0;
    }

    .reset-btn {
      font-family: inherit;
      font-size: 11px;
      color: var(--dim);
      background: none;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }

    .reset-btn:hover {
      color: #e94560;
      border-color: #e9456044;
    }

    .reset-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: -70px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
      transition: bottom 0.3s ease;
      box-shadow: 0 4px 24px var(--toast-shadow);
      white-space: nowrap;
      max-width: 90vw;
    }

    .toast.show {
      bottom: 28px;
      animation: toastIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes toastIn {
      from {
        transform: translateX(-50%) translateY(20px) scale(0.9);
        opacity: 0;
      }

      to {
        transform: translateX(-50%) translateY(0) scale(1);
        opacity: 1;
      }
    }

    .toast-undo {
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .toast-undo:hover {
      background: #00d2ff15;
    }

    /* Schedule editor */
    .editor-section {
      margin-bottom: 12px;
    }

    .editor-section-label {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 6px;
    }

    .editor-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 11px;
      color: var(--text);
    }

    .editor-item-text {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .editor-item-cat {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .editor-remove-btn {
      background: none;
      border: none;
      color: #e94560;
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
      line-height: 1;
    }

    .editor-add-row {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }

    .editor-input {
      flex: 1;
      font-family: inherit;
      font-size: 10px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 5px 8px;
    }

    .editor-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .editor-select {
      font-family: inherit;
      font-size: 10px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 5px 6px;
      width: 70px;
    }

    .editor-add-btn {
      font-family: inherit;
      font-size: 10px;
      background: var(--surface2);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 5px 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    .editor-add-btn:hover {
      background: #00d2ff15;
    }

    /* View toggle */
    .view-toggle {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .view-btn {
      flex: 1;
      font-family: inherit;
      font-size: 11px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }

    .view-btn.active {
      background: var(--text-bright);
      color: var(--bg);
      border-color: transparent;
      font-weight: 600;
    }

    /* Week view */
    .week-view {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 32px;
    }

    .week-day-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .week-day-header {
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .week-day-header:hover {
      background: var(--surface2);
    }

    .week-day-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-bright);
    }

    .week-day-name.is-today {
      color: var(--accent);
    }

    .week-day-meta {
      font-size: 10px;
      color: var(--muted);
    }

    .week-day-progress {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    .week-day-progress .pct {
      color: var(--accent);
      font-weight: 600;
    }

    .week-day-tasks {
      padding: 8px 10px;
    }

    .week-task {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 6px;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s;
      font-size: 12px;
    }

    .week-task:hover {
      background: var(--surface2);
    }

    .week-task.done {
      opacity: 0.35;
      text-decoration: line-through;
    }

    .week-task.skip {
      opacity: 0.25;
      text-decoration: line-through;
      color: #e94560;
    }

    .week-task.progress {
      color: #ffab00;
    }

    .week-task-check {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1.5px solid var(--faint);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
    }

    .week-task.done .week-task-check {
      border-color: var(--accent);
      background: #00d2ff22;
      color: var(--accent);
    }

    .week-task.skip .week-task-check {
      border-color: #e94560;
      background: #e9456022;
      color: #e94560;
    }

    .week-task.progress .week-task-check {
      border-color: #ffab00;
      background: #ffab0022;
      color: #ffab00;
    }

    .week-task-text {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .week-task-cat {
      font-size: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--dim);
      flex-shrink: 0;
    }

    .week-section-label {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--dim);
      padding: 6px 6px 2px;
    }

    @media (max-width: 768px) {
      .app {
        padding: 16px 14px 100px;
      }

      .header h1 {
        font-size: 22px;
      }

      .overview-row {
        flex-direction: column;
        gap: 4px;
      }

      .overview-day {
        width: auto;
      }
    }

    @media (max-width: 400px) {
      .app {
        padding: 12px 12px 100px;
      }

      .header h1 {
        font-size: 20px;
      }

      .item-text {
        font-size: 12px;
      }

      .tab {
        padding: 8px 10px;
        font-size: 11px;
      }
    }

    /* ── Tablet breakpoint ── */
    @media (max-width: 600px) {
      .tabs {
        gap: 3px;
      }

      .tab {
        padding: 8px 10px;
        font-size: 11px;
      }

      .day-name {
        font-size: 18px;
      }

      .item-body {
        padding: 8px 10px;
      }

      .weekly-progress {
        flex-wrap: wrap;
        gap: 6px;
      }
    }

    /* ── Offline banner ── */
    .offline-banner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 14px;
      margin-bottom: 12px;
      background: #e9456018;
      border: 1px solid #e9456030;
      border-radius: 8px;
      font-size: 11px;
      color: #e94560;
      letter-spacing: 0.5px;
      animation: taskPop 0.3s ease-out;
      max-width: 680px;
      margin-left: auto;
      margin-right: auto;
    }

    .offline-banner.show {
      display: flex;
    }

    .offline-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #e94560;
      flex-shrink: 0;
      animation: progressPulse 1.5s infinite;
    }

    /* ── Quick-add FAB ── */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: var(--accent);
      color: #09090b;
      border: none;
      font-size: 26px;
      font-weight: 700;
      cursor: pointer;
      z-index: 90;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0, 210, 255, 0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .fab:active {
      transform: scale(0.9);
    }

    .fab.open {
      transform: rotate(45deg);
      border-radius: 50%;
    }

    .fab-panel {
      position: fixed;
      bottom: 86px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      z-index: 89;
      width: min(320px, calc(100vw - 40px));
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      animation: fabSlideUp 0.25s ease-out;
    }

    @keyframes fabSlideUp {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.9);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .fab-panel input,
    .fab-panel select {
      width: 100%;
      font-family: inherit;
      font-size: 12px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      outline: none;
    }

    .fab-panel input:focus,
    .fab-panel select:focus {
      border-color: var(--accent);
    }

    .fab-panel select {
      padding: 8px 10px;
    }

    .fab-panel-row {
      display: flex;
      gap: 6px;
    }

    .fab-add-btn {
      width: 100%;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #09090b;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .fab-add-btn:active {
      opacity: 0.7;
    }

    /* ── Category filter bar ── */
    .cat-filter-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }

    .cat-filter-btn {
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 0.5px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .cat-filter-btn.active {
      font-weight: 600;
    }

    .cat-filter-btn:active {
      transform: scale(0.95);
    }

    /* ── Subject streaks ── */
    .subject-streaks {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 6px;
      margin-top: 10px;
    }

    .subject-streak-card {
      background: var(--surface2);
      border-radius: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
    }

    .subject-streak-label {
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .subject-streak-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 3px;
    }

    .subject-streak-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .subject-streak-val {
      font-size: 10px;
      color: var(--muted);
    }

    /* ── Mark section done ── */
    .section-done-btn {
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      transition: all 0.15s;
      margin-left: 8px;
      vertical-align: middle;
    }

    .section-done-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .section-done-btn:active {
      transform: scale(0.95);
    }

    /* ── Swipe threshold indicator ── */
    .swipe-indicator {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      opacity: 0;
      transition: opacity 0.1s, transform 0.1s;
      pointer-events: none;
      z-index: 5;
    }

    .swipe-indicator-right {
      left: 14px;
    }

    .swipe-indicator-left {
      right: 14px;
    }

    .swipe-indicator.active {
      opacity: 1;
      animation: swipeReady 0.2s ease-out;
    }

    @keyframes swipeReady {
      0% {
        transform: translateY(-50%) scale(0.3);
        opacity: 0;
      }

      40% {
        transform: translateY(-50%) scale(1.4);
        opacity: 1;
      }

      60% {
        transform: translateY(-50%) scale(0.85);
      }

      80% {
        transform: translateY(-50%) scale(1.1);
      }

      100% {
        transform: translateY(-50%) scale(1);
      }
    }

    /* ── Collapsible week view ── */
    .week-day-tasks.collapsed {
      display: none;
    }

    .week-day-collapse-arrow {
      font-size: 10px;
      color: var(--muted);
      transition: transform 0.2s;
      margin-left: 8px;
    }

    .week-day-collapse-arrow.open {
      transform: rotate(180deg);
    }

    /* ── Day completion celebration ── */
    @keyframes celebrationPop {
      0% {
        transform: scale(0.3);
        opacity: 0;
      }

      50% {
        transform: scale(1.06);
      }

      70% {
        transform: scale(0.97);
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @keyframes confettiDrift {
      0% {
        transform: translateY(0) rotate(0deg) scale(1);
        opacity: 1;
      }

      60% {
        opacity: 0.8;
      }

      100% {
        transform: translateY(80px) rotate(900deg) scale(0.3);
        opacity: 0;
      }
    }

    @keyframes confettiSpray {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(0);
        opacity: 0;
      }

      15% {
        opacity: 1;
        transform: translate(var(--spray-x), var(--spray-y)) rotate(180deg) scale(1);
      }

      100% {
        transform: translate(var(--spray-x), calc(var(--spray-y) + 60px)) rotate(720deg) scale(0.2);
        opacity: 0;
      }
    }

    .day-complete-banner {
      text-align: center;
      padding: 16px;
      background: linear-gradient(135deg, #00d2ff12, #00e67612);
      border: 1px solid #00d2ff30;
      border-radius: 12px;
      margin-bottom: 16px;
      animation: celebrationPop 0.4s ease-out;
      position: relative;
      overflow: hidden;
    }

    .day-complete-text {
      font-size: 14px;
      font-weight: 600;
      background: linear-gradient(90deg, var(--accent), #00e676, var(--accent));
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }

    .day-complete-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .confetti-particle {
      position: absolute;
      border-radius: 2px;
      animation: confettiSpray 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      pointer-events: none;
    }

    /* ── Deferred highlight ── */
    .item.deferred-in-highlight {
      border-left: 3px solid var(--accent) !important;
    }

    .deferred-badge {
      display: inline-block;
      font-size: 8px;
      letter-spacing: 0.5px;
      padding: 1px 6px;
      border-radius: 3px;
      background: #00d2ff18;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 600;
      margin-left: 6px;
      animation: celebrationPop 0.3s ease-out;
    }

    /* ── Note textarea (multiline) ── */
    .note-input {
      width: 100%;
      font-family: inherit;
      font-size: 11px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid #b44aff44;
      border-radius: 8px;
      padding: 8px 10px;
      margin: 6px 12px 8px;
      resize: vertical;
      min-height: 60px;
      max-height: 150px;
      outline: none;
      line-height: 1.5;
    }

    /* ── Past week viewer ── */
    .past-week-nav {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .past-week-btn {
      font-family: inherit;
      font-size: 10px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .past-week-btn.active {
      background: var(--accent);
      color: #09090b;
      border-color: var(--accent);
      font-weight: 600;
    }

    /* ── Skip debt counter ── */
    .skip-debt-banner {
      background: #ff610012;
      border: 1px solid #ff610030;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 12px;
      animation: celebrationPop 0.3s ease-out;
    }

    .skip-debt-header {
      font-size: 11px;
      font-weight: 600;
      color: #ff6100;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .skip-debt-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #ff6100aa;
      padding: 2px 0;
    }

    .skip-debt-count {
      font-weight: 600;
      color: #ff6100;
    }

    /* ── Enhanced animations ── */
    @keyframes slideInLeft {
      from {
        transform: translateX(-20px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes slideInRight {
      from {
        transform: translateX(20px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes bounceCheck {
      0% {
        transform: scale(0);
      }

      40% {
        transform: scale(1.5);
      }

      60% {
        transform: scale(0.8);
      }

      80% {
        transform: scale(1.15);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes shakeX {

      0%,
      100% {
        transform: translateX(0);
      }

      15% {
        transform: translateX(-5px);
      }

      30% {
        transform: translateX(5px);
      }

      45% {
        transform: translateX(-3px);
      }

      60% {
        transform: translateX(3px);
      }

      75% {
        transform: translateX(-1px);
      }
    }

    @keyframes completionGlow {
      0% {
        box-shadow: 0 0 0px transparent;
      }

      50% {
        box-shadow: 0 0 16px rgba(0, 210, 255, 0.3);
      }

      100% {
        box-shadow: 0 0 0px transparent;
      }
    }

    @keyframes skipFade {
      0% {
        opacity: 1;
        transform: translateX(0);
      }

      30% {
        opacity: 0.6;
        transform: translateX(8px);
      }

      100% {
        opacity: 0.5;
        transform: translateX(0);
      }
    }

    @keyframes sectionAppear {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .item.just-completed {
      animation: completionGlow 0.6s ease-out;
    }

    .item.just-completed .item-check {
      animation: bounceCheck 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .item.just-skipped {
      animation: shakeX 0.4s ease-out;
    }

    .day-transition-left {
      animation: slideInLeft 0.25s ease-out;
    }

    .day-transition-right {
      animation: slideInRight 0.25s ease-out;
    }

    .item-swipe-wrap {
      transition: margin 0.2s;
    }

    /* ── Haptic-style button press ── */
    .haptic-press {
      transition: transform 0.1s;
    }

    .haptic-press:active {
      transform: scale(0.95);
    }

    /* ── Filter dimming ── */
    .item-filtered-out {
      opacity: 0.15 !important;
      transform: scale(0.98);
      transition: opacity 0.3s, transform 0.3s;
    }

    .week-task.filtered-out {
      opacity: 0.1 !important;
    }

    /* ── Meal widget ── */
    .meal-card {
      background: linear-gradient(135deg, #1a1408, #0f1a0f);
      border: 1px solid #ff910030;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      transition: all 0.3s;
    }

    [data-theme="light"] .meal-card {
      background: linear-gradient(135deg, #f5edd8, #edf5e8);
      border-color: #ff910040;
    }

    .meal-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .meal-card-title {
      font-size: 11px;
      font-weight: 600;
      color: #ff9100;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .meal-card-refresh {
      font-size: 10px;
      color: var(--dim);
      cursor: pointer;
      background: none;
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: inherit;
      transition: all 0.15s;
    }

    .meal-card-refresh:hover {
      color: #ff9100;
      border-color: #ff910044;
    }

    .meal-items {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .meal-item {
      font-size: 12px;
      color: var(--text);
      padding: 3px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .meal-item-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #ff9100;
      flex-shrink: 0;
    }

    .meal-type-label {
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #ff910088;
      margin-top: 6px;
      margin-bottom: 2px;
    }

    .meal-type-label:first-child {
      margin-top: 0;
    }

    .meal-empty {
      font-size: 11px;
      color: var(--dim);
      font-style: italic;
    }

    .meal-paste-area {
      width: 100%;
      font-family: inherit;
      font-size: 10px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid #ff910033;
      border-radius: 8px;
      padding: 8px 10px;
      resize: vertical;
      min-height: 80px;
      max-height: 200px;
      margin: 8px 0;
      outline: none;
      line-height: 1.5;
    }

    .meal-paste-area:focus {
      border-color: #ff9100;
    }

    .meal-paste-area::placeholder {
      color: var(--faint);
    }

    .meal-status {
      font-size: 9px;
      color: var(--dim);
      margin-top: 4px;
    }

    .meal-status.ok {
      color: #00e676;
    }

    .meal-status.err {
      color: #e94560;
    }

    .meal-status.wait {
      color: #ffab00;
    }

    /* ── News widget ── */

    /* ── Custom confirm modal ── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.15s ease-out;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .confirm-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      max-width: min(340px, 90vw);
      animation: celebrationPop 0.25s ease-out;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
    }

    .confirm-msg {
      font-size: 13px;
      color: var(--text-bright);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .confirm-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .confirm-btn {
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .confirm-btn:active {
      transform: scale(0.95);
    }

    .confirm-btn.danger {
      background: #e9456018;
      border-color: #e9456044;
      color: #e94560;
    }

    .confirm-btn.danger:hover {
      background: #e9456030;
    }

    /* ── Focus mode toggle ── */
    .focus-toggle {
      font-family: inherit;
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }

    .focus-toggle.active {
      background: var(--accent);
      color: #09090b;
      border-color: var(--accent);
      font-weight: 600;
    }

    .focus-toggle:active {
      transform: scale(0.95);
    }

    /* ── Search bar ── */
    .search-bar {
      position: relative;
      margin-bottom: 12px;
    }

    .search-input {
      width: 100%;
      font-family: inherit;
      font-size: 12px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px 10px 34px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .search-input::placeholder {
      color: var(--dim);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--dim);
      pointer-events: none;
    }

    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--dim);
      cursor: pointer;
      background: none;
      border: none;
      padding: 2px 4px;
      line-height: 1;
    }

    .search-clear:hover {
      color: var(--text);
    }

    /* ── Font size control ── */
    .fontsize-btn {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 3px 7px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      transition: all 0.15s;
      color: var(--muted);
      vertical-align: middle;
    }

    .fontsize-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    /* ── Keyboard shortcuts modal ── */
    .shortcuts-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.15s ease-out;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .shortcuts-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      max-width: min(380px, 90vw);
      max-height: 80vh;
      overflow-y: auto;
      animation: celebrationPop 0.25s ease-out;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
    }

    .shortcuts-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 14px;
    }

    .shortcut-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-size: 12px;
      border-bottom: 1px solid var(--border);
    }

    .shortcut-row:last-child {
      border-bottom: none;
    }

    .shortcut-key {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--accent);
      letter-spacing: 0.5px;
    }

    .shortcut-desc {
      color: var(--muted);
    }

    /* ── SW update banner ── */
    .sw-update-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 300;
      background: var(--accent);
      color: #09090b;
      text-align: center;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      animation: slideDown 0.3s ease-out;
    }

    .sw-update-banner.show {
      display: block;
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to { transform: translateY(0); }
    }

    /* ── Time estimate badge ── */
    .est-badge {
      font-size: 9px;
      color: var(--dim);
      margin-left: 6px;
      opacity: 0.7;
    }

    .item.done .est-badge,
    .item.skip .est-badge { display: none; }

    .est-remaining {
      font-size: 10px;
      color: var(--dim);
      margin-left: 8px;
    }

    /* ── Larger font scale support ── */
    .app.font-large {
      font-size: 15px;
    }

    .app.font-large .item-text {
      font-size: 15px;
    }

    .app.font-large .item-hint {
      font-size: 13px;
    }

    .app.font-large .tab {
      font-size: 13px;
    }

    .app.font-large .section-label {
      font-size: 12px;
    }

    .app.font-large .panel-title {
      font-size: 15px;
    }

    /* ── Context menu ── */
    .ctx-menu {
      position: fixed;
      z-index: 250;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px 0;
      min-width: 160px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      animation: celebrationPop 0.15s ease-out;
    }
    .ctx-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
      transition: background 0.1s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .ctx-item:hover { background: var(--surface2); }
    .ctx-item:active { transform: scale(0.98); }
    .ctx-item .ctx-icon { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; }
    .ctx-item.danger { color: #e94560; }
    .ctx-item.accent { color: var(--accent); }
    .ctx-item.warn { color: #ffab00; }
    .ctx-sep { height: 1px; background: var(--border); margin: 4px 8px; }

    /* ── Commute countdown ── */
    .commute-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      animation: taskPop 0.3s ease-out;
    }
    .commute-banner.green { background: #00e67612; border: 1px solid #00e67630; color: #00e676; }
    .commute-banner.orange { background: #ffab0012; border: 1px solid #ffab0030; color: #ffab00; }
    .commute-banner.red { background: #e9456012; border: 1px solid #e9456030; color: #e94560; }
    .commute-icon { font-size: 16px; }
    .commute-time { font-weight: 700; font-size: 14px; }

    /* ── Focus timer ── */
    .pomo-bar {
      position: fixed;
      bottom: 84px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 80;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      max-width: min(400px, 90vw);
      cursor: grab;
      user-select: none;
      touch-action: none;
    }
    .pomo-bar.dragging { cursor: grabbing; opacity: 0.9; }
    .pomo-time { font-size: 22px; font-weight: 700; color: var(--text-bright); font-variant-numeric: tabular-nums; min-width: 70px; text-align: center; }
    .pomo-task { font-size: 11px; color: var(--muted); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pomo-btn { font-family: inherit; font-size: 11px; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .pomo-btn:hover { color: var(--text); border-color: var(--accent); }
    .pomo-btn.stop { color: #e94560; border-color: #e9456033; }
    .pomo-ring { width: 36px; height: 36px; flex-shrink: 0; }
    .pomo-ring-bg { fill: none; stroke: var(--border); stroke-width: 3; }
    .pomo-ring-fg { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear; transform: rotate(-90deg); transform-origin: 50% 50%; }

    /* ── Deadlines ── */
    .deadline-card { background: linear-gradient(135deg, #1a0a1a, #0a1a28); border: 1px solid #b44aff20; border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; }
    [data-theme="light"] .deadline-card { background: linear-gradient(135deg, #f0e8f5, #e8f0f5); border-color: #b44aff30; }
    .deadline-card-title { font-size: 11px; font-weight: 600; color: #b44aff; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .deadline-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .deadline-item:last-child { border-bottom: none; }
    .deadline-name { color: var(--text); font-weight: 500; }
    .deadline-days { font-weight: 700; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    .deadline-days.urgent { background: #e9456022; color: #e94560; }
    .deadline-days.soon { background: #ffab0022; color: #ffab00; }
    .deadline-days.ok { background: #00e67622; color: #00e676; }
    .deadline-add { font-family: inherit; font-size: 10px; color: var(--dim); background: none; border: 1px dashed var(--border2); border-radius: 6px; padding: 5px 10px; cursor: pointer; width: 100%; margin-top: 6px; transition: all 0.15s; }
    .deadline-add:hover { color: #b44aff; border-color: #b44aff44; }
    .deadline-form { display: flex; gap: 4px; margin-top: 6px; }
    .deadline-form input, .deadline-form select { font-family: inherit; font-size: 10px; background: var(--bg); color: var(--text); border: 1px solid var(--border2); border-radius: 4px; padding: 5px 8px; }
    .deadline-form input { flex: 1; }

    /* ── Study heatmap ── */
    .heatmap-grid { display: flex; gap: 2px; flex-wrap: wrap; padding: 4px 0; }
    .heatmap-cell { width: 12px; height: 12px; border-radius: 2px; background: var(--border); transition: all 0.15s; }
    .heatmap-cell:hover { transform: scale(1.4); }
    .heatmap-cell.l1 { background: #00d2ff33; }
    .heatmap-cell.l2 { background: #00d2ff66; }
    .heatmap-cell.l3 { background: #00d2ff99; }
    .heatmap-cell.l4 { background: #00d2ffcc; }
    .heatmap-legend { display: flex; gap: 4px; align-items: center; font-size: 9px; color: var(--dim); margin-top: 6px; }

    /* ── Achievements ── */
    .badge-grid { display: none; }

    /* ── Scratchpad ── */
    .scratchpad-fab { position: fixed; bottom: 84px; left: 20px; width: 40px; height: 40px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-size: 18px; cursor: pointer; z-index: 88; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,0.3); transition: all 0.15s; }
    .scratchpad-fab:hover { color: var(--accent); border-color: var(--accent); }
    .scratchpad-panel { position: fixed; bottom: 130px; left: 20px; width: min(320px, calc(100vw - 40px)); background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; z-index: 89; box-shadow: 0 8px 32px rgba(0,0,0,0.5); animation: fabSlideUp 0.25s ease-out; }
    .scratchpad-area { width: 100%; min-height: 120px; max-height: 200px; font-family: inherit; font-size: 12px; background: var(--bg); color: var(--text); border: 1px solid var(--border2); border-radius: 8px; padding: 10px; resize: vertical; outline: none; line-height: 1.6; }
    .scratchpad-area:focus { border-color: var(--accent); }
    .scratchpad-header { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

    /* ── Resource links ── */
    .item-links { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
    .item-link { font-size: 9px; color: var(--accent); text-decoration: none; padding: 1px 6px; border-radius: 3px; background: #00d2ff12; border: 1px solid #00d2ff20; transition: all 0.15s; }
    .item-link:hover { background: #00d2ff22; }
    .link-add-btn { font-size: 9px; color: var(--dim); cursor: pointer; padding: 1px 6px; border-radius: 3px; background: none; border: 1px dashed var(--border2); font-family: inherit; }

    /* ── Grade tracker ── */
    .grade-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .grade-row:last-child { border-bottom: none; }
    .grade-subject { color: var(--text); font-weight: 500; }
    .grade-score { font-weight: 700; font-variant-numeric: tabular-nums; }
    .grade-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; margin: 0 10px; overflow: hidden; }
    .grade-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .grade-form { display: flex; gap: 4px; margin-top: 8px; }
    .grade-form input, .grade-form select { font-family: inherit; font-size: 10px; background: var(--bg); color: var(--text); border: 1px solid var(--border2); border-radius: 4px; padding: 5px 8px; }
    .grade-form input[type="number"] { width: 50px; }
    .grade-avg { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }

    /* ── Sleep tracker ── */
    .sleep-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 11px; }
    .sleep-day { width: 30px; font-weight: 600; color: var(--muted); }
    .sleep-planned { color: var(--dim); }
    .sleep-actual { font-weight: 600; }
    .sleep-diff { font-size: 10px; padding: 1px 6px; border-radius: 3px; }
    .sleep-diff.late { background: #e9456018; color: #e94560; }
    .sleep-diff.ontime { background: #00e67618; color: #00e676; }
    .sleep-input { font-family: inherit; font-size: 10px; background: var(--bg); color: var(--text); border: 1px solid var(--border2); border-radius: 4px; padding: 4px 6px; width: 55px; }

    /* ── Weekly summary ── */
    .summary-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
    .summary-stat { display: flex; justify-content: space-between; padding: 3px 0; font-size: 11px; }
    .summary-label { color: var(--muted); }
    .summary-value { color: var(--text); font-weight: 600; }
    .summary-value.good { color: #00e676; }
    .summary-value.warn { color: #ffab00; }
    .summary-value.bad { color: #e94560; }
  </style>
</head>

<body>
  <!-- Lock screen -->
  <div id="lock-screen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);position:fixed;inset:0;z-index:9999">

    // Parse Goodreads CSV export
    function parseGoodreadsCSV(text) {
      const lines = text.split('\n');
      if (lines.length < 2) return [];
      // Parse header to find column indices
      const header = parseCSVLine(lines[0]);
      const titleIdx = header.findIndex(h => h.toLowerCase().trim() === 'title');
      const authorIdx = header.findIndex(h => h.toLowerCase().trim() === 'author');
      const shelfIdx = header.findIndex(h => h.toLowerCase().trim() === 'exclusive shelf');
      if (titleIdx < 0 || authorIdx < 0) return [];
      const books = [];
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const cols = parseCSVLine(lines[i]);
        const shelf = shelfIdx >= 0 ? cols[shelfIdx]?.trim() : '';
        // Only include to-read shelf books
        if (shelfIdx >= 0 && shelf !== 'to-read') continue;
        const title = cols[titleIdx]?.trim();
        const author = cols[authorIdx]?.trim();
        if (title) books.push({ title, author: author || '' });
      }
      return books;
    }

    // Proper CSV line parser (handles quoted fields with commas)
    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
          if (ch === '"' && line[i + 1] === '"') { current += '"'; i++; }
          else if (ch === '"') { inQuotes = false; }
          else { current += ch; }
        } else {
          if (ch === '"') { inQuotes = true; }
          else if (ch === ',') { result.push(current); current = ''; }
          else { current += ch; }
        }
      }
      result.push(current);
      return result;
    }

    async function syncGoodreads() {
      readingSyncStatus = 'syncing';
      render();
      const allBooks = [];
      try {
        for (let page = 1; page <= 10; page++) {
          const url = `${GOODREADS_RSS}&per_page=200&page=${page}`;
          const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, {
            signal: AbortSignal.timeout(15000),
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const xml = await res.text();
          const parser = new DOMParser();
          const doc = parser.parseFromString(xml, 'text/xml');
          const items = doc.querySelectorAll('item');
          if (items.length === 0) break;
          items.forEach(item => {
            const rawTitle = item.querySelector('title')?.textContent?.trim() || '';
            const authorName = item.querySelector('author_name')?.textContent?.trim() || '';
            let title = rawTitle.replace(/\s+by\s+.+\(\d{4}(?:-\d{2}(?:-\d{2})?)?\)\s*$/, '').trim();
            if (title.length > 80) {
              title = title.replace(/\s*\([^)]{20,}\)\s*$/, '').trim();
            }
            if (title && !allBooks.some(b => b.title === title)) {
              allBooks.push({ title, author: authorName });
            }
          });
        }
        if (allBooks.length > 0) {
          readingList = allBooks;
          saveReadingList();
          const ts = new Date().toISOString();
          readingLastSync = ts;
          localStorage.setItem('sp26-reading-sync-ts', ts);
          readingSyncStatus = 'ok';
          render();
          showToast(`Synced ${allBooks.length} books from Goodreads RSS`);
        } else {
          throw new Error('No books found');
        }
      } catch (e) {
        console.warn('Goodreads RSS sync failed:', e.message);
        readingSyncStatus = 'error';
        readingShowCSV = true;
        render();
        showToast('RSS sync failed — use CSV import instead');
      }
    }

    // ── ISO Week (fixed) ──
    function getISOWeek(d) {
      const date = new Date(d.getTime());
      date.setHours(0, 0, 0, 0);
      date.setDate(date.getDate() + 3 - ((date.getDay() + 6) % 7));
      const week1 = new Date(date.getFullYear(), 0, 4);
      return 1 + Math.round(((date - week1) / 86400000 - 3 + ((week1.getDay() + 6) % 7)) / 7);
    }

    // ── Targeted DOM patch (avoid full rebuild for simple state changes) ──
    function patchTaskDOM(id) {
      const st = getStatus(id);
      let patched = false;
      // Day view task
      const el = document.querySelector(`.item[data-task-id="${id}"]`);
      if (el) {
        el.classList.remove('done', 'skip', 'progress', 'just-completed', 'just-skipped');
        if (st === STATUS_DONE) el.classList.add('done');
        else if (st === STATUS_SKIP) el.classList.add('skip');
        else if (st === STATUS_PROGRESS) el.classList.add('progress');
        if (justCompletedId === id) el.classList.add('just-completed');
        if (justSkippedId === id) el.classList.add('just-skipped');
        el.setAttribute('aria-checked', String(st === STATUS_DONE));
        patched = true;
      }
      // Week view task
      const wt = document.querySelector(`.week-task[data-task-id="${id}"]`);
      if (wt) {
        wt.classList.remove('done', 'skip', 'progress');
        if (st === STATUS_DONE) wt.classList.add('done');
        else if (st === STATUS_SKIP) wt.classList.add('skip');
        else if (st === STATUS_PROGRESS) wt.classList.add('progress');
        const check = wt.querySelector('.week-task-check');
        if (check) check.textContent = st === STATUS_DONE ? '\u2713' : st === STATUS_SKIP ? '\u2716' : st === STATUS_PROGRESS ? '\u25B6' : '';
        wt.setAttribute('aria-checked', String(st === STATUS_DONE));
        patched = true;
      }
      if (patched) {
        invalidateProgressCache();
        updateProgressBars();
      }
      return patched;
    }

    // ── Subject streaks (weekly) ──
    function getSubjectStreaks() {
      const catCounts = {};
      DAYS.forEach(dayName => {
        schedule[dayName].sections.forEach(s => s.items.forEach(item => {
          if (taskDeferred[item.id] && taskDeferred[item.id] !== dayName) return;
          const cat = item.cat;
          if (!cat || cat === 'routine' || cat === 'reflect') return;
          if (!catCounts[cat]) catCounts[cat] = { total: 0, done: 0 };
          catCounts[cat].total++;
          const st = getStatus(item.id);
          if (st === STATUS_DONE) catCounts[cat].done++;
        }));
      });
      return catCounts;
    }

    // ── Skip debt (across recent weeks) ──
    function getSkipDebt() {
      const debt = {};
      // Check current week only for now
      DAYS.forEach(dayName => {
        schedule[dayName].sections.forEach(s => s.items.forEach(item => {
          if (getStatus(item.id) === STATUS_SKIP) {
            const cat = item.cat;
            if (!cat || cat === 'routine') return;
            const label = CAT_LABEL[cat] || cat;
            if (!debt[label]) debt[label] = 0;
            debt[label]++;
          }
        }));
      });
      return debt;
    }

    const MEAL_KEY = 'sp26-meals';
    // Primary: SKS public JSON API (no auth required)
    const MEAL_API_URL = 'https://sks.istanbul.edu.tr/meal-schedule/filter';

    let mealData = {}; // { "2026-03-10": { kahvalti: [...], ogle: [...], aksam: [...], vegan: [...] } }
    let mealFetchStatus = ''; // '', 'fetching', 'ok', 'error'

    function loadMeals() {

    function getTodayMeals() {
      const now = nowInTZ();
      const key = now.getFullYear() + '-' +
        String(now.getMonth() + 1).padStart(2, '0') + '-' +
        String(now.getDate()).padStart(2, '0');
      return mealData[key] || null;
    }

    function getDayMeals(dayIdx) {
      const now = nowInTZ();
      const currentDay = now.getDay() === 0 ? 6 : now.getDay() - 1;
      const diff = dayIdx - currentDay;
      const target = new Date(now);
      target.setDate(target.getDate() + diff);
      const key = target.getFullYear() + '-' +
        String(target.getMonth() + 1).padStart(2, '0') + '-' +
        String(target.getDate()).padStart(2, '0');
      return mealData[key] || null;
    }

    // Parse comma / \r\n separated meal string into array
    function parseMealString(str) {
      if (!str || typeof str !== 'string') return [];
      return str.split(/[\r\n,]+/).map(s => s.trim()).filter(s => s.length > 0);
    }

    // Parse response from SKS public API (GET /meal-schedule/filter)
    function parseSKSApiResponse(data) {
      const newData = {};
      if (!Array.isArray(data)) return newData;
      for (const item of data) {
        // Build date key from created_at or date field
        let dateKey = null;
        if (item.created_at) {
          dateKey = item.created_at.substring(0, 10); // "2026-03-09T00:00:00.000000Z" → "2026-03-09"
        }
        if (!dateKey) continue;
        newData[dateKey] = {
          kahvalti: parseMealString(item.breakfast_tr || item.breakfast || ''),
          ogle: parseMealString(item.lunch_tr || item.lunch || ''),
          aksam: parseMealString(item.dinner_tr || item.dinner || ''),
          vegan: parseMealString(item.vegan_tr || item.vegan || ''),
        };
      }
      return newData;
    }


    function parseMealText(text) {
      // Parse pasted meal text into structured data
      const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
      const newData = {};
      let currentDate = null;
      let currentType = 'ogle';

      const trDays = {
        'pazartesi': 1, 'sali': 2, 'salı': 2, 'carsamba': 3, 'çarşamba': 3,
        'persembe': 4, 'perşembe': 4, 'cuma': 5, 'cumartesi': 6, 'pazar': 0
      };
      const months = {
        'ocak': 1, 'şubat': 2, 'subat': 2, 'mart': 3, 'nisan': 4, 'mayıs': 5, 'mayis': 5,
        'haziran': 6, 'temmuz': 7, 'ağustos': 8, 'agustos': 8, 'eylül': 9, 'eylul': 9,
        'ekim': 10, 'kasım': 11, 'kasim': 11, 'aralık': 12, 'aralik': 12
      };

      for (const line of lines) {
        const lower = line.toLowerCase();

        const dateMatch1 = line.match(/(\d{1,2})\s+(\w+)\s+(\d{4})/);
        const dateMatch2 = line.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
        const dateMatch3 = line.match(/(\d{4})-(\d{2})-(\d{2})/);

        if (dateMatch3) {
          currentDate = dateMatch3[0];
          if (!newData[currentDate]) newData[currentDate] = { kahvalti: [], ogle: [], aksam: [], vegan: [] };
          continue;
        }
        if (dateMatch2) {
          currentDate = `${dateMatch2[3]}-${dateMatch2[2].padStart(2, '0')}-${dateMatch2[1].padStart(2, '0')}`;
          if (!newData[currentDate]) newData[currentDate] = { kahvalti: [], ogle: [], aksam: [], vegan: [] };
          continue;
        }
        if (dateMatch1 && months[dateMatch1[2].toLowerCase()]) {
          const m = months[dateMatch1[2].toLowerCase()];
          currentDate = `${dateMatch1[3]}-${String(m).padStart(2, '0')}-${dateMatch1[1].padStart(2, '0')}`;
          if (!newData[currentDate]) newData[currentDate] = { kahvalti: [], ogle: [], aksam: [], vegan: [] };
          continue;
        }

        for (const [dayName, dayNum] of Object.entries(trDays)) {
          if (lower.includes(dayName)) {
            const numMatch = line.match(/(\d{1,2})/);
            if (numMatch) {
              const now = nowInTZ();
              const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${numMatch[1].padStart(2, '0')}`;
              currentDate = dateStr;
              if (!newData[currentDate]) newData[currentDate] = { kahvalti: [], ogle: [], aksam: [], vegan: [] };
            }
            break;
          }
        }

        if (lower.includes('kahvalt') || lower.includes('breakfast')) {
          currentType = 'kahvalti'; continue;
        }
        if (lower.includes('öğle') || lower.includes('ogle') || lower.includes('lunch')) {
          currentType = 'ogle'; continue;
        }
        if (lower.includes('akşam') || lower.includes('aksam') || lower.includes('dinner')) {
          currentType = 'aksam'; continue;
        }
        if (lower.includes('vegan')) {
          currentType = 'vegan'; continue;
        }

        if (currentDate && newData[currentDate]) {
          if (lower === 'tarih' || lower === 'gün' || lower === 'gun' || lower === 'menü' || lower === 'menu') continue;
          const clean = line.replace(/^\d+[\.)\]]\s*/, '').replace(/\t+/g, ' ').trim();
          if (clean.length > 1 && clean.length < 100) {
            newData[currentDate][currentType].push(clean);
          }
        }
      }

      return newData;
    }

    async function fetchMeals() {
      mealFetchStatus = 'fetching';
      render();

      const now = nowInTZ();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const year = now.getFullYear();

      // Try 1: SKS public API (GET, no auth, returns full month)
      try {
        const url = `${MEAL_API_URL}?category=lunch&month=${month}&year=${year}`;
        const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
        if (res.ok) {
          const json = await res.json();
          const items = Array.isArray(json) ? json : (json.data || []);
          const parsed = parseSKSApiResponse(items);
          if (Object.keys(parsed).length > 0) {
            Object.assign(mealData, parsed);
            saveMeals();
            mealFetchStatus = 'ok';
            render();
            showToast(`Loaded meals for ${Object.keys(parsed).length} days`);
            return;
          }
        }
      } catch (e) {
        console.warn('SKS API failed:', e.message);
      }

      mealFetchStatus = 'error';
      mealShowPaste = true;
      render();
    }

      if (!ta || !ta.value.trim()) { showToast('Paste meal data first'); return; }
      const parsed = parseMealText(ta.value);
      const count = Object.keys(parsed).length;
      if (count === 0) {
        showToast('Could not parse any dates from text');
        return;
      }
      Object.assign(mealData, parsed);
      saveMeals();
      mealShowPaste = false;
      haptic('success');
      render();
      showToast(`Loaded meals for ${count} day${count > 1 ? 's' : ''}`);
    }
