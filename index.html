<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#09090b">
  <title>Study Plan</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <!-- Lock screen -->
  <div id="lock-screen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);position:fixed;inset:0;z-index:9999">
    <div style="text-align:center;max-width:300px;padding:20px">
      <div style="font-size:48px;margin-bottom:16px">📘</div>
      <div style="font-size:18px;font-weight:700;color:var(--text-bright);margin-bottom:4px;font-family:'JetBrains Mono',monospace">Study Plan</div>
      <div style="font-size:11px;color:var(--dim);margin-bottom:20px;letter-spacing:1px">ENTER PASSWORD</div>
      <input id="lock-input" type="password" placeholder="Password"
             style="width:100%;font-family:'JetBrains Mono',monospace;font-size:14px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px 16px;outline:none;text-align:center;letter-spacing:2px;box-sizing:border-box"
             autofocus>
      <button id="lock-submit"
              style="margin-top:10px;width:100%;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;background:var(--accent);color:#09090b;border:none;border-radius:10px;padding:11px 16px;cursor:pointer;transition:opacity 0.15s"
              onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
        Unlock →
      </button>
      <div id="lock-error" style="font-size:11px;color:#e94560;margin-top:10px;display:none">Wrong password</div>
    </div>
  </div>

  <div id="app-wrapper" style="display:none">
    <div class="offline-banner" id="offline-banner"><span class="offline-dot"></span> You are offline — changes saved locally</div>
    <div class="hub-layout">
      <div id="sidebar" class="sidebar"></div>
      <div class="main-area">
        <div class="app" id="app"></div>
      </div>
    </div>
    <nav id="bottom-tabs" class="bottom-tabs" role="navigation" aria-label="Main navigation"></nav>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <div class="sw-update-banner" id="sw-update" data-action="reloadApp">New version available — tap to refresh</div>
  </div>

  <script type="module" src="js/init.js"></script>
</body>

</html>
