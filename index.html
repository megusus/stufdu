<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#09090b">
  <title>Study Plan</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --surface: #111113;
      --surface2: #151518;
      --border: #1c1c1f;
      --border2: #222;
      --text: #e4e4e7;
      --muted: #71717a;
      --dim: #555;
      --faint: #333;
      --accent: #00d2ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--faint);
      border-radius: 2px;
    }

    .app {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 16px 100px;
    }

    /* Header */
    .header {
      padding: 16px 0 20px;
    }

    .header-sub {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -1px;
      color: #fafafa;
      margin-bottom: 2px;
    }

    .header-tag {
      font-size: 12px;
      color: var(--muted);
    }

    /* Weekly progress */
    .weekly-progress {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .weekly-label {
      color: var(--dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 10px;
    }

    .weekly-val {
      color: var(--text);
      font-weight: 500;
    }

    .weekly-bar {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 12px;
      overflow: hidden;
    }

    .weekly-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 24px;
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .progress-text {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }

    .tabs[role="tablist"] {
      outline: none;
    }

    .tab {
      flex: 1 0 auto;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 400;
      font-family: inherit;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
      position: relative;
    }

    .tab.active {
      font-weight: 600;
      background: #fafafa;
      color: var(--bg);
      border-color: transparent;
    }

    .tab.today::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    .tab .tab-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      border-radius: 0 0 8px 8px;
      background: #00d2ff44;
      transition: width 0.3s;
    }

    .tab.active .tab-progress {
      background: #09090b33;
    }

    .tab:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Day header */
    .day-header {
      margin-bottom: 20px;
    }

    .day-name {
      font-size: 20px;
      font-weight: 600;
      color: #fafafa;
      margin-bottom: 6px;
    }

    .day-meta {
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: var(--muted);
      flex-wrap: wrap;
      align-items: center;
    }

    .day-meta .val {
      color: var(--text);
    }

    .day-meta .home {
      color: var(--accent);
    }

    .day-meta .flag {
      color: #ff9100;
    }

    /* Sections */
    .sections {
      display: flex;
      flex-direction: column;
      gap: 22px;
      margin-bottom: 32px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 8px;
      padding-left: 2px;
      transition: color 0.3s;
    }

    .items {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* Section time awareness */
    .section-group {
      transition: opacity 0.3s;
    }

    .section-past {
      opacity: 0.45;
    }

    .section-past .item:not(.done) {
      opacity: 0.7;
    }

    .section-current>.section-label {
      color: var(--accent);
    }

    .section-current>.section-label::after {
      content: ' now';
      font-size: 9px;
      color: #00d2ff88;
      letter-spacing: 1px;
      font-weight: 400;
    }

    /* Task item */
    .item {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      border-radius: 10px;
      overflow: hidden;
      transition: opacity 0.3s, transform 0.2s;
      cursor: pointer;
      user-select: none;
      outline: none;
    }

    .item:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-radius: 10px;
    }

    .item.done {
      opacity: 0.35;
    }

    .item.done .item-text {
      text-decoration: line-through;
    }

    .item-bar {
      width: 3px;
      flex-shrink: 0;
      align-self: stretch;
    }

    .item-body {
      padding: 10px 12px;
      flex: 1;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .item-check {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid var(--faint);
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: transparent;
    }

    .item.done .item-check {
      border-color: var(--accent);
      background: #00d2ff22;
    }

    .item.done .item-check::after {
      content: '\2713';
      font-size: 11px;
      color: var(--accent);
    }

    .item-info {
      flex: 1;
      min-width: 0;
    }

    .item-text {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
    }

    .item-hint {
      font-size: 11px;
      color: var(--dim);
      margin-top: 2px;
      line-height: 1.4;
    }

    .item-cat {
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 3px;
      opacity: 0.6;
    }

    /* Task states */
    .item.skip {
      opacity: 0.3;
    }

    .item.skip .item-text {
      text-decoration: line-through;
      color: #e94560 !important;
    }

    .item.skip .item-check {
      border-color: #e94560;
      background: #e9456022;
    }

    .item.skip .item-check::after {
      content: '\u2716';
      font-size: 10px;
      color: #e94560;
    }

    .item.progress .item-check {
      border-color: #ffab00;
      background: #ffab0022;
    }

    .item.progress .item-check::after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffab00;
      animation: progressPulse 1.5s infinite;
    }

    @keyframes progressPulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .item.deferred-out {
      display: none;
    }

    /* Action menu */
    .item-actions-btn {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--dim);
      cursor: pointer;
      border-radius: 4px;
      transition: color 0.15s;
      margin-left: auto;
      align-self: center;
    }

    .item-actions-btn:hover {
      color: var(--text);
    }

    .item-action-bar {
      display: none;
      gap: 2px;
      padding: 6px 12px 8px;
      flex-wrap: wrap;
      width: 100%;
    }

    .item-action-bar.open {
      display: flex;
    }

    .action-btn {
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.3px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .action-btn:hover {
      color: var(--text);
      border-color: #00d2ff44;
    }

    .action-btn.act-skip {
      color: #e94560;
      border-color: #e9456033;
    }

    .action-btn.act-progress {
      color: #ffab00;
      border-color: #ffab0033;
    }

    .action-btn.act-note {
      color: #b44aff;
      border-color: #b44aff33;
    }

    .action-btn.act-defer {
      color: #00d2ff;
      border-color: #00d2ff33;
    }

    .action-btn.act-clear {
      color: var(--dim);
    }

    /* Defer day picker */
    .defer-picker {
      display: none;
      gap: 3px;
      padding: 4px 12px 8px;
      flex-wrap: wrap;
    }

    .defer-picker.open {
      display: flex;
    }

    .defer-day-btn {
      font-family: inherit;
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--accent);
      cursor: pointer;
      transition: all 0.15s;
    }

    .defer-day-btn:hover {
      background: #00d2ff15;
    }

    /* Inline note */
    .item-note {
      font-size: 10px;
      color: #b44aff;
      margin-top: 3px;
      line-height: 1.4;
      padding: 3px 6px;
      background: #b44aff0a;
      border-radius: 4px;
      border: 1px solid #b44aff15;
    }

    .note-input {
      width: 100%;
      font-family: inherit;
      font-size: 10px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid #b44aff44;
      border-radius: 6px;
      padding: 6px 8px;
      margin: 4px 12px 8px;
      resize: none;
      height: 32px;
      outline: none;
    }

    .note-input:focus {
      border-color: #b44aff;
    }

    /* Deferred section */
    .deferred-section {
      margin-bottom: 16px;
    }

    .deferred-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #00d2ff88;
      margin-bottom: 8px;
      padding-left: 2px;
    }

    .deferred-from {
      font-size: 9px;
      color: #00d2ff88;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Note icon */
    .note-icon {
      font-size: 10px;
      margin-left: 4px;
      opacity: 0.6;
    }

    /* Check animation */
    @keyframes checkPop {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(0.96);
      }

      100% {
        transform: scale(1);
      }
    }

    .item.just-toggled {
      animation: checkPop 0.25s ease;
    }

    /* Panels */
    .panel {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      outline: none;
    }

    .panel-header:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
      border-radius: 12px;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: #fafafa;
      letter-spacing: 0.5px;
    }

    .panel-arrow {
      font-size: 12px;
      color: var(--muted);
      transition: transform 0.2s;
    }

    .panel-header.open .panel-arrow {
      transform: rotate(180deg);
    }

    .panel-content {
      padding: 0 16px 16px;
      display: none;
    }

    .panel-content.open {
      display: block;
    }

    /* Overview */
    .overview-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .overview-day {
      width: 30px;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .overview-tag {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 4px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .overview-desc {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* Info panels */
    .info {
      padding: 14px;
      border-radius: 10px;
      font-size: 11px;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .info strong {
      color: #aabbcc;
    }

    .info p {
      margin-top: 6px;
    }

    .info p:first-child {
      margin-top: 0;
    }

    /* Streak chart */
    .streak-chart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 36px;
      padding: 4px 0;
    }

    .streak-bar {
      flex: 1;
      background: var(--faint);
      border-radius: 2px;
      min-height: 3px;
      transition: height 0.3s;
      position: relative;
    }

    .streak-bar.current {
      background: var(--accent);
    }

    .streak-bar-label {
      position: absolute;
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      color: var(--dim);
      white-space: nowrap;
    }

    .streak-bar.current .streak-bar-label {
      color: var(--accent);
    }

    .streak-empty {
      font-size: 11px;
      color: var(--dim);
      padding: 8px 0;
    }

    /* Data controls */
    .data-controls {
      display: flex;
      gap: 8px;
    }

    .data-btn {
      font-family: inherit;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
      flex: 1;
    }

    .data-btn:hover {
      color: var(--text);
      border-color: #00d2ff44;
    }

    .data-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    /* Sync */
    .sync-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
      margin-left: 8px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .sync-dot.connected {
      background: #00e676;
      box-shadow: 0 0 6px #00e67644;
    }

    .sync-dot.syncing {
      background: #ffab00;
      animation: syncPulse 1.2s infinite;
    }

    .sync-dot.offline {
      background: var(--faint);
    }

    .sync-dot.hidden {
      display: none;
    }

    @keyframes syncPulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .sync-input {
      width: 100%;
      font-family: inherit;
      font-size: 10px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 8px 10px;
      resize: vertical;
      min-height: 80px;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .sync-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .sync-input::placeholder {
      color: var(--faint);
    }

    .sync-msg {
      font-size: 11px;
      margin-top: 8px;
      line-height: 1.4;
    }

    .sync-msg.ok {
      color: #00e676;
    }

    .sync-msg.err {
      color: #e94560;
    }

    .sync-msg.wait {
      color: #ffab00;
    }

    .sync-info {
      font-size: 10px;
      color: var(--dim);
      line-height: 1.6;
      margin-bottom: 10px;
    }

    /* Reset button */
    .reset-wrap {
      text-align: center;
      padding: 20px 0;
    }

    .reset-btn {
      font-family: inherit;
      font-size: 11px;
      color: var(--dim);
      background: none;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }

    .reset-btn:hover {
      color: #e94560;
      border-color: #e9456044;
    }

    .reset-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: -70px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
      transition: bottom 0.3s ease;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
      white-space: nowrap;
      max-width: 90vw;
    }

    .toast.show {
      bottom: 28px;
    }

    .toast-undo {
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .toast-undo:hover {
      background: #00d2ff15;
    }

    @media (max-width: 400px) {
      .app {
        padding: 12px 12px 100px;
      }

      .header h1 {
        font-size: 20px;
      }

      .item-text {
        font-size: 12px;
      }

      .tab {
        padding: 8px 10px;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <div class="app" id="app"></div>
  <div class="toast" id="toast"></div>

  <script>
    const CAT = {
      class: { bg: "#1a1a2e", border: "#e94560" },
      fa: { bg: "#0a1628", border: "#00d2ff" },
      fameeting: { bg: "#1a1408", border: "#ff9100" },
      analysis: { bg: "#1a0a28", border: "#b44aff" },
      algebra: { bg: "#0a2818", border: "#00e676" },
      diffeq: { bg: "#28200a", border: "#ffab00" },
      numtheory: { bg: "#281a0a", border: "#ff6d00" },
      physics: { bg: "#1a0a1a", border: "#e040fb" },
      homework: { bg: "#1a1a0a", border: "#c6a700" },
      routine: { bg: "#0f1a0f", border: "#66bb6a" },
      reflect: { bg: "#14140a", border: "#8d8d00" },
    };

    const CAT_LABEL = {
      class: "CLASS", fa: "FA", fameeting: "MTG", analysis: "ANL IV",
      algebra: "ALG II", diffeq: "DEQ II", numtheory: "NT II",
      physics: "PHY II", homework: "HW", routine: "", reflect: "",
    };

    const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
    const SHORT = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

    const schedule = {
      Monday: {
        wake: "08:00", leave: "11:15", meta: null,
        sections: [
          {
            label: "Before class", items: [
              { id: "mon-1", text: "Functional Analysis", hint: "Deep work \u2014 proofs & theory. Building toward Thursday\u2019s meeting.", cat: "fa" },
            ]
          },
          {
            label: "Class", items: [
              { id: "mon-2", text: "MATE2202 Analiz IV (Teori) \u2014 12:20\u201314:50", hint: "Feza G\u00fcrsey Amfisi", cat: "class" },
            ]
          },
          {
            label: "After class", items: [
              { id: "mon-3", text: "Analysis IV \u2014 homework", hint: "Start while lecture is fresh. Office hours Wednesday.", cat: "analysis" },
              { id: "mon-4", text: "Functional Analysis", hint: "Exercises & problems", cat: "fa" },
            ]

    // ── ISO Week (fixed) ──
    function getISOWeek(d) {
      const date = new Date(d.getTime());
      date.setHours(0, 0, 0, 0);
      date.setDate(date.getDate() + 3 - ((date.getDay() + 6) % 7));
      const week1 = new Date(date.getFullYear(), 0, 4);
      return 1 + Math.round(((date - week1) / 86400000 - 3 + ((week1.getDay() + 6) % 7)) / 7);
    }

    function getWeekKey() { return `sp26-w${getISOWeek(new Date())}`; }
    function getWeekNum() { return getISOWeek(new Date()); }

    // ── Persistence ──
    function getStatus(id) {
      const v = checked[id];
      if (v === true || v === 'done') return 'done';
      if (v === 'skip' || v === 'progress') return v;
      return '';
    }

    function loadState() {
      try {

        if (raw) checked = JSON.parse(raw);
      } catch (e) { checked = {}; }
      try {

        if (raw) taskNotes = JSON.parse(raw);
      } catch (e) { taskNotes = {}; }
      try {
        const raw = localStorage.getItem(getWeekKey() + '-defer');
        if (raw) taskDeferred = JSON.parse(raw);
      } catch (e) { taskDeferred = {}; }
    }

    // ── Toast / Undo ──
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerHTML = `<span>${msg}</span><button class="toast-undo" onclick="undoToggle()">Undo</button>`;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(hideToast, 3500);
    }

    function hideToast() {
      document.getElementById('toast').classList.remove('show');
    }

    function undoToggle() {
      if (!lastToggle) return;
      if (lastToggle.prevStatus) {
        checked[lastToggle.id] = lastToggle.prevStatus;
      } else {
        delete checked[lastToggle.id];
      }
      lastToggle = null;
      saveState();
      hideToast();
      render();
    }

    // ── Toggle (tap checkbox = toggle done) ──
    function toggle(id) {
      const prev = checked[id];
      const wasDone = getStatus(id) === 'done';
      if (wasDone) {
        delete checked[id];
      } else {
        checked[id] = 'done';
      }
      lastToggle = { id, prevStatus: prev };
      saveState();
      render();
      showToast(wasDone ? 'Task unchecked' : 'Task completed');
    }

    // ── Task actions ──
    function setTaskStatus(id, status) {
      const prev = checked[id];
      if (getStatus(id) === status) {
        delete checked[id];
        lastToggle = { id, prevStatus: prev };
        saveState(); render();
        showToast('Status cleared');
      } else {
        checked[id] = status;
        lastToggle = { id, prevStatus: prev };
        saveState(); render();
        const labels = { skip: 'Skipped', progress: 'In progress' };
        showToast(labels[status] || status);
      }
      openActions = null;
    }

    function resetDay() {
      if (!confirm(`Reset all tasks for ${DAYS[selectedDay]}?`)) return;
      const dayName = DAYS[selectedDay];
      schedule[dayName].sections.forEach(s => s.items.forEach(item => {

    // ── Progress ──
    function getDayProgress(dayName) {
      const day = schedule[dayName];
      let total = 0, done = 0;
      day.sections.forEach(s => s.items.forEach(item => {
        if (taskDeferred[item.id] && taskDeferred[item.id] !== dayName) return; // deferred out
        total++;
        const st = getStatus(item.id);
        if (st === 'done' || st === 'skip') done++;
      }));
      // Count deferred tasks coming IN from other days
      Object.entries(taskDeferred).forEach(([id, target]) => {
        if (target === dayName) {
          total++;
          const st = getStatus(id);
          if (st === 'done' || st === 'skip') done++;
        }
      });
      return { total, done, pct: total ? Math.round((done / total) * 100) : 0 };
    }

    function getWeeklyProgress() {
      let total = 0, done = 0;
      DAYS.forEach(d => { const p = getDayProgress(d); total += p.total; done += p.done; });
      return { total, done, pct: total ? Math.round((done / total) * 100) : 0 };
    }

    // ── Time-aware sections ──
    function getCurrentSectionIndex(sections) {
      const now = new Date();
      const h = now.getHours() + now.getMinutes() / 60;
      const times = sections.map((s, i) => {
        for (const item of s.items) {
          const m = item.text.match(/(\d{1,2}):(\d{2})/);
          if (m) return parseInt(m[1]) + parseInt(m[2]) / 60;
        }
        const l = s.label.toLowerCase();
        if (l.includes('before') || l.includes('morning') || l.includes('core')) return 8;
        if (l.includes('class') || l.includes('meeting')) return 9;
        if (l.includes('after') || l.includes('afternoon')) return 15;
        if (l.includes('evening')) return 18;
        return 8 + i * 3;
      });
      let idx = 0;
      for (let i = 0; i < times.length; i++) { if (h >= times[i]) idx = i; }
      return idx;
    }

    function loadFirebaseSDK() {
      if (window.firebase && window.firebase.auth && window.firebase.database) return Promise.resolve();
      if (firebaseSDKPromise) return firebaseSDKPromise;

      const scripts = [
        ['https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js', 'Firebase app SDK'],
        ['https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js', 'Firebase auth SDK'],
        ['https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js', 'Firebase database SDK'],
      ];

      firebaseSDKPromise = scripts.reduce((promise, [src, label]) => {
        return promise.then(() => new Promise((resolve, reject) => {
          if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
          const script = document.createElement('script');
          script.src = src;
          script.onload = resolve;
          script.onerror = () => reject(new Error(`Failed to load ${label}`));
          document.head.appendChild(script);
        }));
      }, Promise.resolve()).catch(err => {
        firebaseSDKPromise = null;
        throw err;
      });

      return firebaseSDKPromise;
    }

    function parseFirebaseConfig(text) {
      function fillDatabaseURL(obj) {
        if (!obj.databaseURL && obj.projectId) {
          obj.databaseURL = 'https://' + obj.projectId + '-default-rtdb.firebaseio.com';
        }
        return (obj.apiKey && obj.projectId) ? obj : null;
      }
      // Try direct JSON
      try { const obj = JSON.parse(text); if (fillDatabaseURL(obj)) return obj; } catch (e) { }
      // Find the object containing apiKey
      const match = text.match(/\{[^{}]*apiKey[^{}]*\}/s);
      if (match) {
        try {
          const obj = new Function('return (' + match[0] + ')')();
          if (obj && typeof obj === 'object' && fillDatabaseURL(obj)) return obj;
        } catch (e) { }
      }
      return null;
    }

    async function initSync(config, email, password) {
      syncStatus = 'syncing';
      updateSyncDot();

      await loadFirebaseSDK();

      if (!firebase.apps.length) {
        firebase.initializeApp(config);
      }

      // Sign in with email/password
      if (!firebase.auth().currentUser) {
        try {
          await firebase.auth().signInWithEmailAndPassword(email, password);
        } catch (err) {
          if (err.code === 'auth/user-not-found') {
            await firebase.auth().createUserWithEmailAndPassword(email, password);
          } else {
            throw err;
          }
        }
      }

      syncUid = firebase.auth().currentUser.uid;
      const db = firebase.database();
      const base = 'users/' + syncUid + '/study/';

      // Connection monitoring
      if (syncConnectionRef && syncConnectionListener) syncConnectionRef.off('value', syncConnectionListener);
      syncConnectionRef = db.ref('.info/connected');
      syncConnectionListener = syncConnectionRef.on('value', snap => {
        syncStatus = snap.val() ? 'connected' : 'offline';
        updateSyncDot();
      });

      // Listen for task states
      if (syncRef && syncListener) syncRef.off('value', syncListener);
      syncRef = db.ref(base + getWeekKey());
      syncListener = syncRef.on('value', snap => {
        if (ignoreNextRemote) { ignoreNextRemote = false; return; }
        if (snap.exists()) {
          checked = snap.val();
          localStorage.setItem(getWeekKey(), JSON.stringify(checked));
          render();
        }
      });

      // Listen for notes
      if (syncNotesRef && syncNotesListener) syncNotesRef.off('value', syncNotesListener);
      syncNotesRef = db.ref(base + getWeekKey() + '-notes');
      syncNotesListener = syncNotesRef.on('value', snap => {
        if (snap.exists()) {
          taskNotes = snap.val();
          localStorage.setItem(getWeekKey() + '-notes', JSON.stringify(taskNotes));
          render();
        }
      });

      // Listen for deferred
      if (syncDeferRef && syncDeferListener) syncDeferRef.off('value', syncDeferListener);
      syncDeferRef = db.ref(base + getWeekKey() + '-defer');
      syncDeferListener = syncDeferRef.on('value', snap => {
        if (snap.exists()) {
          taskDeferred = snap.val();
          localStorage.setItem(getWeekKey() + '-defer', JSON.stringify(taskDeferred));
          render();
        }
      });

      // Listen for history
      if (syncHistoryRef && syncHistoryListener) syncHistoryRef.off('value', syncHistoryListener);
      syncHistoryRef = db.ref(base + 'history');
      syncHistoryListener = syncHistoryRef.on('value', snap => {
        if (snap.exists()) {
          localStorage.setItem('sp26-history', JSON.stringify(snap.val()));
        }
      });

      firebaseReady = true;
      saveSyncConfig(config);
      saveSyncCreds(email, password);

      // Push local data on first connect
      syncPush();
    }

    function syncPush() {
      if (!firebaseReady || !syncRef) return;
      ignoreNextRemote = true;
      syncRef.set(checked).catch(err => {
        ignoreNextRemote = false;
        console.error('Sync write failed:', err.message);
        showToast('Sync write failed \u2014 check Firebase rules');
      });
      if (syncNotesRef) syncNotesRef.set(taskNotes).catch(() => { });
      if (syncDeferRef) syncDeferRef.set(taskDeferred).catch(() => { });
      if (syncHistoryRef) {
        syncHistoryRef.set(loadHistory()).catch(() => { });
      }
    }

    function updateSyncDot() {
      const dot = document.getElementById('sync-dot');
      if (!dot) return;
      dot.className = 'sync-dot ' + (getSyncConfig() || HARDCODED_CONFIG ? syncStatus : 'hidden');
      dot.title = syncStatus === 'connected' ? 'Synced' :
        syncStatus === 'syncing' ? 'Syncing\u2026' : 'Offline';
    }

    async function connectSync() {
      const input = document.getElementById('sync-config-input');
      const emailInput = document.getElementById('sync-email');
      const passInput = document.getElementById('sync-password');
      const msg = document.getElementById('sync-msg');
      if (!input || !msg) return;

      const config = parseFirebaseConfig(input.value.trim());
      if (!config) {
        msg.className = 'sync-msg err';
        msg.textContent = 'Could not parse config. Paste the full firebaseConfig object.';
        return;
      }

      const email = emailInput ? emailInput.value.trim() : '';
      const password = passInput ? passInput.value : '';
      if (!email || !password) {
        msg.className = 'sync-msg err';
        msg.textContent = 'Enter an email and password.';
        return;
      }

      msg.className = 'sync-msg wait';
      msg.textContent = 'Connecting\u2026';

      try {
        await initSync(config, email, password);
        render();
        showToast('Sync connected');
      } catch (err) {
        firebaseReady = false;
        syncStatus = 'offline';
        updateSyncDot();
        msg.className = 'sync-msg err';
        const friendly = err.code === 'auth/wrong-password' ? 'Wrong password.' :
          err.code === 'auth/invalid-email' ? 'Invalid email.' :
            err.code === 'auth/weak-password' ? 'Password must be at least 6 characters.' :
              err.message;
        msg.textContent = 'Failed: ' + friendly;
      }
    }

    function disconnectSync() {
      if (syncRef && syncListener) syncRef.off('value', syncListener);
      if (syncConnectionRef && syncConnectionListener) syncConnectionRef.off('value', syncConnectionListener);
      if (syncHistoryRef && syncHistoryListener) syncHistoryRef.off('value', syncHistoryListener);
      if (syncNotesRef && syncNotesListener) syncNotesRef.off('value', syncNotesListener);
      if (syncDeferRef && syncDeferListener) syncDeferRef.off('value', syncDeferListener);
      try {
        if (firebase.apps.length) {
          firebase.auth().signOut().catch(() => { });
        }
      } catch (e) { }
      localStorage.removeItem('sp26-sync-config');
      localStorage.removeItem('sp26-sync-creds');
      firebaseReady = false;
      syncRef = null; syncListener = null;
      syncConnectionRef = null; syncConnectionListener = null;
      syncHistoryRef = null; syncHistoryListener = null;
      syncNotesRef = null; syncNotesListener = null;
      syncDeferRef = null; syncDeferListener = null;
      syncUid = null;
      syncStatus = 'offline';
      render();
      showToast('Sync disconnected');
    }

    async function setupStoredSync() {
      const config = HARDCODED_CONFIG || getSyncConfig();
      const creds = getSyncCreds();
      if (!config || !creds) return;

      try {
        await initSync(config, creds.email, creds.password);
        render();
      } catch (err) {
        firebaseReady = false;
        syncStatus = 'offline';
        updateSyncDot();
        console.warn('Auto-sync failed:', err.message);
      }
    }

    function selectDay(i) {
      selectedDay = i;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── Swipe (with vertical guard) ──
    let touchStartX = 0, touchStartY = 0;
    document.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });
    document.addEventListener('touchend', e => {
      const diffX = e.changedTouches[0].screenX - touchStartX;
      const diffY = e.changedTouches[0].screenY - touchStartY;
      if (Math.abs(diffY) > Math.abs(diffX)) return;
      if (Math.abs(diffX) > 60) {
        if (diffX < 0 && selectedDay < 6) selectDay(selectedDay + 1);
        else if (diffX > 0 && selectedDay > 0) selectDay(selectedDay - 1);
      }
    }, { passive: true });

    // ── Keyboard ──
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        const el = document.activeElement;
        if (el && el.dataset.taskId) { e.preventDefault(); toggle(el.dataset.taskId); return; }
        if (el && el.dataset.panelId) { e.preventDefault(); togglePanel(el.dataset.panelId); return; }
      }
      if (e.key === 'ArrowRight' && selectedDay < 6) selectDay(selectedDay + 1);
      if (e.key === 'ArrowLeft' && selectedDay > 0) selectDay(selectedDay - 1);
    });

    // ── PWA Manifest ──
    (function () {
      const m = {
        name: 'Study Plan', short_name: 'Study', start_url: '.', display: 'standalone',
        background_color: '#09090b', theme_color: '#09090b',
        icons: [{ src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>\ud83d\udcd8</text></svg>", sizes: 'any', type: 'image/svg+xml' }]
      };
      const l = document.createElement('link'); l.rel = 'manifest';
      l.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(m));
      document.head.appendChild(l);
    })();

    // ── Init ──
    loadState();
    render();

    // Auto-connect sync if previously configured
    (function () {
      setupStoredSync().catch(err => {
        console.warn('Auto-sync failed:', err.message);
      });
    })();
  </script>
</body>

</html>
