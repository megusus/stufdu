<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#09090b">
  <title>Study Plan</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --surface: #111113;
      --surface2: #151518;
      --border: #1c1c1f;
      --border2: #222;
      --text: #e4e4e7;
      --text-bright: #fafafa;
      --muted: #71717a;
      --dim: #555;
      --faint: #333;
      --accent: #00d2ff;
      --toast-shadow: rgba(0, 0, 0, 0.5);
    }

    [data-theme="light"] {
      --bg: #faf6ed;
      --surface: #f2ead8;
      --surface2: #ebe3d0;
      --border: #ddd4bf;
      --border2: #d0c7b0;
      --text: #3c3836;
      --text-bright: #2c2620;
      --muted: #7c6f64;
      --dim: #a89984;
      --faint: #d5c8ac;
      --accent: #007a99;
      --toast-shadow: rgba(0, 0, 0, 0.15);
    }

    [data-theme="light"] .tab.active {
      background: var(--text-bright);
      color: var(--bg);
    }

    [data-theme="light"] .tab .tab-progress {
      background: #007a9944;
    }

    [data-theme="light"] .tab.active .tab-progress {
      background: #faf6ed33;
    }

    [data-theme="light"] .item {
      background: var(--surface) !important;
      border-color: var(--border) !important;
    }

    [data-theme="light"] .item.done .item-check {
      border-color: var(--accent);
      background: #007a9922;
    }

    [data-theme="light"] .item.done .item-check::after {
      color: var(--accent);
    }

    [data-theme="light"] .item.done .item-text::after {
      color: var(--accent);
    }

    [data-theme="light"] .info {
      background: var(--surface) !important;
      border-color: var(--border) !important;
    }

    [data-theme="light"] .sync-dot.connected {
      background: #2e8b57;
      box-shadow: 0 0 6px #2e8b5744;
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      transition: all 0.15s;
      color: var(--muted);
      vertical-align: middle;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--faint);
      border-radius: 2px;
    }

    .app {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 16px 100px;
    }

    /* Header */
    .header {
      padding: 16px 0 20px;
    }

    .header-sub {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text-bright);
      margin-bottom: 2px;
    }

    .header-tag {
      font-size: 12px;
      color: var(--muted);
    }

    /* Weekly progress */
    .weekly-progress {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .weekly-label {
      color: var(--dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 10px;
    }

    .weekly-val {
      color: var(--text);
      font-weight: 500;
    }

    .weekly-bar {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 12px;
      overflow: hidden;
    }

    .weekly-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 24px;
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .progress-text {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }

    .tabs[role="tablist"] {
      outline: none;
    }

    .tab {
      flex: 1 0 auto;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 400;
      font-family: inherit;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
      position: relative;
    }

    .tab.active {
      font-weight: 600;
      background: var(--text-bright);
      color: var(--bg);
      border-color: transparent;
    }

    .tab.today::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    .tab .tab-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      border-radius: 0 0 8px 8px;
      background: #00d2ff44;
      transition: width 0.3s;
    }

    .tab.active .tab-progress {
      background: #09090b33;
    }

    .tab:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Day header */
    .day-header {
      margin-bottom: 20px;
    }

    .day-name {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 6px;
    }

    .day-meta {
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: var(--muted);
      flex-wrap: wrap;
      align-items: center;
    }

    .day-meta .val {
      color: var(--text);
    }

    .day-meta .home {
      color: var(--accent);
    }

    .day-meta .flag {
      color: #ff9100;
    }

    /* Sections */
    .sections {
      display: flex;
      flex-direction: column;
      gap: 22px;
      margin-bottom: 32px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 8px;
      padding-left: 2px;
      transition: color 0.3s;
    }

    .items {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* Section time awareness */
    .section-group {
      transition: opacity 0.3s;
    }

    .section-past {
      opacity: 0.45;
    }

    .section-past .item:not(.done) {
      opacity: 0.7;
    }

    .section-current>.section-label {
      color: var(--accent);
    }

    .section-current>.section-label::after {
      content: ' now';
      font-size: 9px;
      color: #00d2ff88;
      letter-spacing: 1px;
      font-weight: 400;
    }

    /* Task item */
    .item {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      border-radius: 10px;
      overflow: hidden;
      transition: opacity 0.3s, transform 0.2s;
      cursor: pointer;
      user-select: none;
      outline: none;
    }

    .item:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-radius: 10px;
    }

    .item.done {
      opacity: 0.35;
    }

    .item.done .item-text {
      text-decoration: line-through;
    }

    .item-bar {
      width: 3px;
      flex-shrink: 0;
      align-self: stretch;
    }

    .item-body {
      padding: 10px 12px;
      flex: 1;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .item-check {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid var(--faint);
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: transparent;
    }

    .item.done .item-check {
      border-color: var(--accent);
      background: #00d2ff22;
    }

    .item.done .item-check::after {
      content: '\2713';
      font-size: 11px;
      color: var(--accent);
    }

    .item-info {
      flex: 1;
      min-width: 0;
    }

    .item-text {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
    }

    .item-hint {
      font-size: 11px;
      color: var(--dim);
      margin-top: 2px;
      line-height: 1.4;
    }

    .item-cat {
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 3px;
      opacity: 0.6;
    }

    /* Task states */
    .item.skip {
      opacity: 0.5;
    }

    .item.skip .item-text {
      text-decoration: line-through;
      color: #e94560 !important;
    }

    /* Skipped summary banner */
    .skipped-banner {
      background: #e9456012;
      border: 1px solid #e9456030;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 12px;
    }

    .skipped-banner-header {
      font-size: 11px;
      font-weight: 600;
      color: #e94560;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .skipped-banner-count {
      background: #e9456033;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
    }

    .skipped-banner-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .skipped-banner-item {
      font-size: 11px;
      color: #e9456099;
      text-decoration: line-through;
      padding: 2px 0;
    }

    .skipped-banner-item .sbi-cat {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.7;
      margin-left: 6px;
      text-decoration: none;
      display: inline-block;
    }

    .item.skip .item-check {
      border-color: #e94560;
      background: #e9456022;
    }

    .item.skip .item-check::after {
      content: '\u2716';
      font-size: 10px;
      color: #e94560;
    }

    .item.progress .item-check {
      border-color: #ffab00;
      background: #ffab0022;
    }

    .item.progress .item-check::after {
      content: '\25B6';
      font-size: 9px;
      color: #ffab00;
      animation: progressPulse 1.5s infinite;
    }

    .item.progress .item-text::after {
      content: ' [in progress]';
      font-size: 9px;
      color: #ffab00;
      font-weight: 400;
    }

    .item.skip .item-text::after {
      content: ' [skipped]';
      font-size: 9px;
      color: #e94560;
      font-weight: 400;
    }

    .item.done .item-text::after {
      content: ' [done]';
      font-size: 9px;
      color: var(--accent);
      font-weight: 400;
    }

    @keyframes progressPulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .item.deferred-out {
      display: none;
    }

    /* Lock button */
    .lock-btn {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      font-family: inherit;
      transition: all 0.15s;
    }

    .lock-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .lock-btn.locked {
      background: #ffab0018;
      border-color: #ffab0044;
      color: #ffab00;
    }

    .day-locked-overlay {
      pointer-events: none;
      opacity: 0.6;
    }

    .day-locked-overlay .item-swipe-wrap {
      pointer-events: none;
    }

    /* Swipe reveal layers */
    .item-swipe-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      margin-bottom: 0;
    }

    .swipe-bg {
      position: absolute;
      top: 0; bottom: 0;
      display: flex;
      align-items: center;
      padding: 0 18px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .swipe-bg-right {
      left: 0; right: 50%;
      background: linear-gradient(90deg, #00d2ff33, transparent);
      color: var(--accent);
      justify-content: flex-start;
    }

    .swipe-bg-left {
      right: 0; left: 50%;
      background: linear-gradient(-90deg, #e9456033, transparent);
      color: #e94560;
      justify-content: flex-end;
    }

    .swipe-bg.visible {
      opacity: 1;
    }

    .item-swipe-inner {
      position: relative;
      z-index: 1;
      transition: transform 0.15s ease-out;
      touch-action: pan-y;
    }

    /* Task entrance animation */
    @keyframes taskPop {
      0% { transform: scale(0.97); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    .item-animate-in {
      animation: taskPop 0.2s ease-out;
    }

    /* Completion celebration */
    @keyframes taskComplete {
      0% { transform: scale(1); }
      30% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .item.just-completed {
      animation: taskComplete 0.3s ease-out;
    }

    /* Action menu */
    .item-actions-btn {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--dim);
      cursor: pointer;
      border-radius: 4px;
      transition: color 0.15s;
      margin-left: auto;
      align-self: center;
    }

    .item-actions-btn:hover {
      color: var(--text);
    }

    .item-action-bar {
      display: none;
      gap: 2px;
      padding: 6px 12px 8px;
      flex-wrap: wrap;
      width: 100%;
    }

    .item-action-bar.open {
      display: flex;
    }

    .action-btn {
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.3px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .action-btn:hover {
      color: var(--text);
      border-color: #00d2ff44;
    }

    .action-btn.act-skip {
      color: #e94560;
      border-color: #e9456033;
    }

    .action-btn.act-progress {
      color: #ffab00;
      border-color: #ffab0033;
    }

    .action-btn.act-note {
      color: #b44aff;
      border-color: #b44aff33;
    }

    .action-btn.act-defer {
      color: #00d2ff;
      border-color: #00d2ff33;
    }

    .action-btn.act-clear {
      color: var(--dim);
    }

    /* Defer day picker */
    .defer-picker {
      display: none;
      gap: 3px;
      padding: 4px 12px 8px;
      flex-wrap: wrap;
    }

    .defer-picker.open {
      display: flex;
    }

    .defer-day-btn {
      font-family: inherit;
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--accent);
      cursor: pointer;
      transition: all 0.15s;
    }

    .defer-day-btn:hover {
      background: #00d2ff15;
    }

    /* Inline note */
    .item-note {
      font-size: 10px;
      color: #b44aff;
      margin-top: 3px;
      line-height: 1.4;
      padding: 3px 6px;
      background: #b44aff0a;
      border-radius: 4px;
      border: 1px solid #b44aff15;
    }

    .note-input:focus {
      border-color: #b44aff;
    }

    /* Deferred section */
    .deferred-section {
      margin-bottom: 16px;
    }

    .deferred-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #00d2ff88;
      margin-bottom: 8px;
      padding-left: 2px;
    }

    .deferred-from {
      font-size: 9px;
      color: #00d2ff88;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Note icon */
    .note-icon {
      font-size: 10px;
      margin-left: 4px;
      opacity: 0.6;
    }

    /* Check animation */
    @keyframes checkPop {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(0.96);
      }

      100% {
        transform: scale(1);
      }
    }

    .item.just-toggled {
      animation: checkPop 0.25s ease;
    }

    /* Panels */
    .panel {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      outline: none;
    }

    .panel-header:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
      border-radius: 12px;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-bright);
      letter-spacing: 0.5px;
    }

    .panel-arrow {
      font-size: 12px;
      color: var(--muted);
      transition: transform 0.2s;
    }

    .panel-header.open .panel-arrow {
      transform: rotate(180deg);
    }

    .panel-content {
      padding: 0 16px 16px;
      display: none;
    }

    .panel-content.open {
      display: block;
    }

    /* Overview */
    .overview-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .overview-day {
      width: 30px;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .overview-tag {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 4px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .overview-desc {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* Info panels */
    .info {
      padding: 14px;
      border-radius: 10px;
      font-size: 11px;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .info strong {
      color: #aabbcc;
    }

    .info p {
      margin-top: 6px;
    }

    .info p:first-child {
      margin-top: 0;
    }

    /* Streak chart */
    .streak-chart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 36px;
      padding: 4px 0;
    }

    .streak-bar {
      flex: 1;
      background: var(--faint);
      border-radius: 2px;
      min-height: 3px;
      transition: height 0.3s;
      position: relative;
    }

    .streak-bar.current {
      background: var(--accent);
    }

    .streak-bar-label {
      position: absolute;
      bottom: -14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      color: var(--dim);
      white-space: nowrap;
    }

    .streak-bar.current .streak-bar-label {
      color: var(--accent);
    }

    .streak-empty {
      font-size: 11px;
      color: var(--dim);
      padding: 8px 0;
    }

    /* Data controls */
    .data-controls {
      display: flex;
      gap: 8px;
    }

    .data-btn {
      font-family: inherit;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
      flex: 1;
    }

    .data-btn:hover {
      color: var(--text);
      border-color: #00d2ff44;
    }

    .data-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    /* Sync */
    .sync-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
      margin-left: 8px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .sync-dot.connected {
      background: #00e676;
      box-shadow: 0 0 6px #00e67644;
    }

    .sync-dot.syncing {
      background: #ffab00;
      animation: syncPulse 1.2s infinite;
    }

    .sync-dot.offline {
      background: var(--faint);
    }

    .sync-dot.hidden {
      display: none;
    }

    @keyframes syncPulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .sync-input {
      width: 100%;
      font-family: inherit;
      font-size: 10px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 8px 10px;
      resize: vertical;
      min-height: 80px;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .sync-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .sync-input::placeholder {
      color: var(--faint);
    }

    .sync-msg {
      font-size: 11px;
      margin-top: 8px;
      line-height: 1.4;
    }

    .sync-msg.ok {
      color: #00e676;
    }

    .sync-msg.err {
      color: #e94560;
    }

    .sync-msg.wait {
      color: #ffab00;
    }

    .sync-info {
      font-size: 10px;
      color: var(--dim);
      line-height: 1.6;
      margin-bottom: 10px;
    }

    /* Reset button */
    .reset-wrap {
      text-align: center;
      padding: 20px 0;
    }

    .reset-btn {
      font-family: inherit;
      font-size: 11px;
      color: var(--dim);
      background: none;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }

    .reset-btn:hover {
      color: #e94560;
      border-color: #e9456044;
    }

    .reset-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: -70px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
      transition: bottom 0.3s ease;
      box-shadow: 0 4px 24px var(--toast-shadow);
      white-space: nowrap;
      max-width: 90vw;
    }

    .toast.show {
      bottom: 28px;
    }

    .toast-undo {
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .toast-undo:hover {
      background: #00d2ff15;
    }

    /* Schedule editor */
    .editor-section {
      margin-bottom: 12px;
    }

    .editor-section-label {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 6px;
    }

    .editor-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 11px;
      color: var(--text);
    }

    .editor-item-text {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .editor-item-cat {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .editor-remove-btn {
      background: none;
      border: none;
      color: #e94560;
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
      line-height: 1;
    }

    .editor-add-row {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }

    .editor-input {
      flex: 1;
      font-family: inherit;
      font-size: 10px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 5px 8px;
    }

    .editor-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .editor-select {
      font-family: inherit;
      font-size: 10px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 5px 6px;
      width: 70px;
    }

    .editor-add-btn {
      font-family: inherit;
      font-size: 10px;
      background: var(--surface2);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 5px 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    .editor-add-btn:hover {
      background: #00d2ff15;
    }

    /* View toggle */
    .view-toggle {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .view-btn {
      flex: 1;
      font-family: inherit;
      font-size: 11px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }

    .view-btn.active {
      background: var(--text-bright);
      color: var(--bg);
      border-color: transparent;
      font-weight: 600;
    }

    /* Week view */
    .week-view {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 32px;
    }

    .week-day-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .week-day-header {
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .week-day-header:hover {
      background: var(--surface2);
    }

    .week-day-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-bright);
    }

    .week-day-name.is-today {
      color: var(--accent);
    }

    .week-day-meta {
      font-size: 10px;
      color: var(--muted);
    }

    .week-day-progress {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    .week-day-progress .pct {
      color: var(--accent);
      font-weight: 600;
    }

    .week-day-tasks {
      padding: 8px 10px;
    }

    .week-task {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 6px;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s;
      font-size: 12px;
    }

    .week-task:hover {
      background: var(--surface2);
    }

    .week-task.done {
      opacity: 0.35;
      text-decoration: line-through;
    }

    .week-task.skip {
      opacity: 0.25;
      text-decoration: line-through;
      color: #e94560;
    }

    .week-task.progress {
      color: #ffab00;
    }

    .week-task-check {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1.5px solid var(--faint);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
    }

    .week-task.done .week-task-check {
      border-color: var(--accent);
      background: #00d2ff22;
      color: var(--accent);
    }

    .week-task.skip .week-task-check {
      border-color: #e94560;
      background: #e9456022;
      color: #e94560;
    }

    .week-task.progress .week-task-check {
      border-color: #ffab00;
      background: #ffab0022;
      color: #ffab00;
    }

    .week-task-text {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .week-task-cat {
      font-size: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--dim);
      flex-shrink: 0;
    }

    .week-section-label {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--dim);
      padding: 6px 6px 2px;
    }

    @media (max-width: 768px) {
      .app {
        padding: 16px 14px 100px;
      }

      .header h1 {
        font-size: 22px;
      }

      .overview-row {
        flex-direction: column;
        gap: 4px;
      }

      .overview-day {
        width: auto;
      }
    }

    @media (max-width: 400px) {
      .app {
        padding: 12px 12px 100px;
      }

      .header h1 {
        font-size: 20px;
      }

      .item-text {
        font-size: 12px;
      }

      .tab {
        padding: 8px 10px;
        font-size: 11px;
      }
    }

    /* ── Quick-add FAB ── */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: var(--accent);
      color: #09090b;
      border: none;
      font-size: 26px;
      font-weight: 700;
      cursor: pointer;
      z-index: 90;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0, 210, 255, 0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .fab:active { transform: scale(0.9); }
    .fab.open { transform: rotate(45deg); border-radius: 50%; }

    .fab-panel {
      position: fixed;
      bottom: 86px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      z-index: 89;
      width: min(320px, calc(100vw - 40px));
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: fabSlideUp 0.25s ease-out;
    }

    @keyframes fabSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fab-panel input, .fab-panel select {
      width: 100%;
      font-family: inherit;
      font-size: 12px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      outline: none;
    }
    .fab-panel input:focus, .fab-panel select:focus { border-color: var(--accent); }
    .fab-panel select { padding: 8px 10px; }

    .fab-panel-row {
      display: flex;
      gap: 6px;
    }

    .fab-add-btn {
      width: 100%;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #09090b;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .fab-add-btn:active { opacity: 0.7; }

    /* ── Category filter bar ── */
    .cat-filter-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .cat-filter-btn {
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 0.5px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-filter-btn.active {
      font-weight: 600;
    }
    .cat-filter-btn:active { transform: scale(0.95); }

    /* ── Subject streaks ── */
    .subject-streaks {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 6px;
      margin-top: 10px;
    }
    .subject-streak-card {
      background: var(--surface2);
      border-radius: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
    }
    .subject-streak-label {
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .subject-streak-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 3px;
    }
    .subject-streak-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .subject-streak-val {
      font-size: 10px;
      color: var(--muted);
    }

    /* ── Mark section done ── */
    .section-done-btn {
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      transition: all 0.15s;
      margin-left: 8px;
      vertical-align: middle;
    }
    .section-done-btn:hover { color: var(--accent); border-color: var(--accent); }
    .section-done-btn:active { transform: scale(0.95); }

    /* ── Swipe threshold indicator ── */
    .swipe-indicator {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      opacity: 0;
      transition: opacity 0.1s, transform 0.1s;
      pointer-events: none;
      z-index: 5;
    }
    .swipe-indicator-right { left: 14px; }
    .swipe-indicator-left { right: 14px; }
    .swipe-indicator.active {
      opacity: 1;
      animation: swipeReady 0.2s ease-out;
    }

    @keyframes swipeReady {
      0% { transform: translateY(-50%) scale(0.5); }
      50% { transform: translateY(-50%) scale(1.3); }
      100% { transform: translateY(-50%) scale(1); }
    }

    /* ── Collapsible week view ── */
    .week-day-tasks.collapsed { display: none; }
    .week-day-collapse-arrow {
      font-size: 10px;
      color: var(--muted);
      transition: transform 0.2s;
      margin-left: 8px;
    }
    .week-day-collapse-arrow.open { transform: rotate(180deg); }

    /* ── Day completion celebration ── */
    @keyframes celebrationPop {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes confettiDrift {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(60px) rotate(720deg); opacity: 0; }
    }

    .day-complete-banner {
      text-align: center;
      padding: 16px;
      background: linear-gradient(135deg, #00d2ff12, #00e67612);
      border: 1px solid #00d2ff30;
      border-radius: 12px;
      margin-bottom: 16px;
      animation: celebrationPop 0.4s ease-out;
      position: relative;
      overflow: hidden;
    }
    .day-complete-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
    }
    .day-complete-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
    .confetti-particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      animation: confettiDrift 1.5s ease-out forwards;
      pointer-events: none;
    }

    /* ── Deferred highlight ── */
    .item.deferred-in-highlight {
      border-left: 3px solid var(--accent) !important;
    }
    .deferred-badge {
      display: inline-block;
      font-size: 8px;
      letter-spacing: 0.5px;
      padding: 1px 6px;
      border-radius: 3px;
      background: #00d2ff18;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 600;
      margin-left: 6px;
      animation: celebrationPop 0.3s ease-out;
    }

    /* ── Note textarea (multiline) ── */
    .note-input {
      width: 100%;
      font-family: inherit;
      font-size: 11px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid #b44aff44;
      border-radius: 8px;
      padding: 8px 10px;
      margin: 6px 12px 8px;
      resize: vertical;
      min-height: 60px;
      max-height: 150px;
      outline: none;
      line-height: 1.5;
    }

    /* ── Past week viewer ── */
    .past-week-nav {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .past-week-btn {
      font-family: inherit;
      font-size: 10px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .past-week-btn.active {
      background: var(--accent);
      color: #09090b;
      border-color: var(--accent);
      font-weight: 600;
    }

    /* ── Skip debt counter ── */
    .skip-debt-banner {
      background: #ff610012;
      border: 1px solid #ff610030;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 12px;
      animation: celebrationPop 0.3s ease-out;
    }
    .skip-debt-header {
      font-size: 11px;
      font-weight: 600;
      color: #ff6100;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .skip-debt-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #ff6100aa;
      padding: 2px 0;
    }
    .skip-debt-count {
      font-weight: 600;
      color: #ff6100;
    }

    /* ── Enhanced animations ── */
    @keyframes ripple {
      0% { transform: scale(0); opacity: 0.5; }
      100% { transform: scale(4); opacity: 0; }
    }

    .ripple-effect {
      position: absolute;
      border-radius: 50%;
      background: var(--accent);
      width: 20px;
      height: 20px;
      pointer-events: none;
      animation: ripple 0.5s ease-out forwards;
    }

    @keyframes slideInLeft {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes bounceCheck {
      0% { transform: scale(0); }
      50% { transform: scale(1.4); }
      70% { transform: scale(0.85); }
      100% { transform: scale(1); }
    }

    @keyframes shakeX {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 0px transparent; }
      50% { box-shadow: 0 0 12px var(--accent); }
    }

    .item.just-completed .item-check {
      animation: bounceCheck 0.4s ease-out;
    }

    .item.just-skipped {
      animation: shakeX 0.3s ease-out;
    }

    .day-transition-left {
      animation: slideInLeft 0.25s ease-out;
    }
    .day-transition-right {
      animation: slideInRight 0.25s ease-out;
    }

    .section-group {
      transition: opacity 0.3s;
    }

    .item-swipe-wrap {
      transition: margin 0.2s;
    }

    /* Smooth task entrance stagger */
    .item-stagger {
      opacity: 0;
      animation: taskPop 0.25s ease-out forwards;
    }

    /* ── Progress ring for day complete ── */
    .progress-ring-wrap {
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }
    .progress-ring-circle {
      transition: stroke-dashoffset 0.6s ease;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }

    /* ── Haptic-style button press ── */
    .haptic-press {
      transition: transform 0.1s;
    }
    .haptic-press:active {
      transform: scale(0.95);
    }

    /* ── Filter dimming ── */
    .item-filtered-out {
      opacity: 0.15 !important;
      transform: scale(0.98);
      transition: opacity 0.3s, transform 0.3s;
    }
    .week-task.filtered-out {
      opacity: 0.1 !important;
    }

    /* ── Meal widget ── */
    .meal-card {
      background: linear-gradient(135deg, #1a1408, #0f1a0f);
      border: 1px solid #ff910030;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      transition: all 0.3s;
    }
    [data-theme="light"] .meal-card {
      background: linear-gradient(135deg, #f5edd8, #edf5e8);
      border-color: #ff910040;
    }
    .meal-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .meal-card-title {
      font-size: 11px;
      font-weight: 600;
      color: #ff9100;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .meal-card-refresh {
      font-size: 10px;
      color: var(--dim);
      cursor: pointer;
      background: none;
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: inherit;
      transition: all 0.15s;
    }
    .meal-card-refresh:hover { color: #ff9100; border-color: #ff910044; }
    .meal-items {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .meal-item {
      font-size: 12px;
      color: var(--text);
      padding: 3px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .meal-item-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;

    // ── Timezone ──
    const TZ = 'Europe/Istanbul';

    function nowInTZ() {
      // Returns a Date-like object whose getDay/getHours/getMinutes reflect Turkey time
      const str = new Date().toLocaleString('en-US', { timeZone: TZ });
      return new Date(str);
    }

    // ── State ──
    const today = nowInTZ().getDay();
    const todayIdx = today === 0 ? 6 : today - 1;
    let selectedDay = todayIdx;

    let taskNotes = {};     // { id: "note text" }
    let taskDeferred = {};  // { id: "DayName" }
    let lockedDays = {};    // { "Monday": true, ... }

    let celebrationShown = {}; // { dayName: true } per session
    let pastWeekViewing = null; // null = current week, or 'sp26-wNN'

    // ── Haptics helper ──
    function haptic(style) {
      if (!navigator.vibrate) return;
      switch(style) {
        case 'light': navigator.vibrate(10); break;
        case 'medium': navigator.vibrate(20); break;
        case 'heavy': navigator.vibrate([15, 30, 15]); break;
        case 'success': navigator.vibrate([10, 50, 20]); break;
        case 'error': navigator.vibrate([30, 20, 30, 20, 30]); break;
        case 'select': navigator.vibrate(5); break;
        default: navigator.vibrate(15);
      }
    }

    // ── Sync state ──
    let firebaseReady = false;
    let syncRef = null;
    let syncStatus = 'offline';
    let syncListener = null;
    let ignoreNextRemote = false;
    let firebaseSDKPromise = null;
    let syncConnectionRef = null;
    let syncConnectionListener = null;
    let syncHistoryRef = null;
    let syncHistoryListener = null;
    let syncNotesRef = null;
    let syncNotesListener = null;

    // ── ISO Week (fixed) ──
    function getISOWeek(d) {
      const date = new Date(d.getTime());
      date.setHours(0, 0, 0, 0);
      date.setDate(date.getDate() + 3 - ((date.getDay() + 6) % 7));
      const week1 = new Date(date.getFullYear(), 0, 4);
      return 1 + Math.round(((date - week1) / 86400000 - 3 + ((week1.getDay() + 6) % 7)) / 7);
    }

    function getWeekKey() { return `sp26-w${getISOWeek(nowInTZ())}`; }
    function getWeekNum() { return getISOWeek(nowInTZ()); }

    const STORAGE_PREFIX = 'sp26';
    const HISTORY_KEY = STORAGE_PREFIX + '-history';
    const SYNC_CONFIG_KEY = STORAGE_PREFIX + '-sync-config';
    const SYNC_CREDS_KEY = STORAGE_PREFIX + '-sync-creds';
    const STATUS_DONE = 'done';
    const STATUS_SKIP = 'skip';
    const STATUS_PROGRESS = 'progress';

    // ── Persistence ──
    function getStatus(id) {
      const v = checked[id];
      if (v === true || v === STATUS_DONE) return STATUS_DONE;
      if (v === STATUS_SKIP || v === STATUS_PROGRESS) return v;
      return '';
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(getWeekKey());
        if (raw) checked = JSON.parse(raw);
      } catch (e) { console.warn('Failed to load task states:', e.message); checked = {}; }
      try {
        const raw = localStorage.getItem(getWeekKey() + '-notes');
        if (raw) taskNotes = JSON.parse(raw);
      } catch (e) { console.warn('Failed to load notes:', e.message); taskNotes = {}; }
      try {
        const raw = localStorage.getItem(getWeekKey() + '-defer');
        if (raw) taskDeferred = JSON.parse(raw);
      } catch (e) { console.warn('Failed to load deferred tasks:', e.message); taskDeferred = {}; }
      try {
        const raw = localStorage.getItem(getWeekKey() + '-lock');
        if (raw) lockedDays = JSON.parse(raw);
      } catch (e) { console.warn('Failed to load locks:', e.message); lockedDays = {}; }
    }

    function saveState() {
      try {
        localStorage.setItem(getWeekKey(), JSON.stringify(checked));
        localStorage.setItem(getWeekKey() + '-notes', JSON.stringify(taskNotes));
        localStorage.setItem(getWeekKey() + '-defer', JSON.stringify(taskDeferred));
        localStorage.setItem(getWeekKey() + '-lock', JSON.stringify(lockedDays));
        saveHistory();
        syncPush();
      } catch (e) { console.warn('Failed to save state:', e.message); }

        const hist = JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}');

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}'); }
      catch (e) { return {}; }
    }

    // ── HTML escaping ──
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ── Toast / Undo ──
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerHTML = `<span>${escapeHtml(msg)}</span><button class="toast-undo" onclick="undoToggle()">Undo</button>`;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(hideToast, 3500);
    }

    function hideToast() {
      document.getElementById('toast').classList.remove('show');
    }

    function undoToggle() {
      if (!lastToggle) return;
      if (lastToggle.prevStatus) {
        checked[lastToggle.id] = lastToggle.prevStatus;
      } else {
        delete checked[lastToggle.id];
      }
      lastToggle = null;
      saveState();
      hideToast();
      render();
    }

    // ── Lock ──
    function toggleLock(dayName) {
      if (lockedDays[dayName]) {
        delete lockedDays[dayName];
        showToast(dayName + ' unlocked');
      } else {
        lockedDays[dayName] = true;
        showToast(dayName + ' locked');
      }
      saveState();
      render();
    }

    function isDayLocked(dayName) {
      return !!lockedDays[dayName];
    }

    function getTaskDay(id) {
      // Check deferred target first
      if (taskDeferred[id]) return taskDeferred[id];
      // Find original day
      for (const dName of DAYS) {
        for (const sec of schedule[dName].sections) {
          for (const item of sec.items) {
            if (item.id === id) return dName;
          }
        }
      }
      return null;
    }

    function isTaskLocked(id) {
      const day = getTaskDay(id);
      return day && isDayLocked(day);
    }

    // ── Toggle (tap checkbox = toggle done) ──
    function toggle(id) {
      if (isTaskLocked(id)) { showToast('Day is locked'); haptic('error'); return; }
      const prev = checked[id];
      const wasDone = getStatus(id) === 'done';
      if (wasDone) {
        delete checked[id];
        haptic('light');
      } else {
        checked[id] = 'done';
        justCompletedId = id;
        setTimeout(() => { justCompletedId = null; }, 500);
        haptic('success');
      }
      lastToggle = { id, prevStatus: prev };
      saveState();
      render();
      showToast(wasDone ? 'Task unchecked' : 'Task completed');
      // Check if day is now 100%
      const dayName = getTaskDay(id);
      if (dayName && !wasDone) {
        const prog = getDayProgress(dayName);
        if (prog.pct === 100 && !celebrationShown[dayName]) {
          celebrationShown[dayName] = true;
          haptic('heavy');
        }
      }
    }

    // ── Task actions ──
    function setTaskStatus(id, status) {
      if (isTaskLocked(id)) { showToast('Day is locked'); haptic('error'); return; }
      const prev = checked[id];
      if (getStatus(id) === status) {
        delete checked[id];
        lastToggle = { id, prevStatus: prev };
        haptic('light');
        saveState(); render();
        showToast('Status cleared');
      } else {
        checked[id] = status;
        lastToggle = { id, prevStatus: prev };
        if (status === 'skip') {
          justSkippedId = id;
          setTimeout(() => { justSkippedId = null; }, 400);
          haptic('medium');
        } else {
          haptic('light');
        }
        saveState(); render();
        const labels = { skip: 'Skipped', progress: 'In progress' };
        showToast(labels[status] || status);
      }
      openActions = null;
    }

    function toggleActionMenu(id, e) {
      if (e) e.stopPropagation();
      openActions = openActions === id ? null : id;
      openNoteInput = null;
      openDeferPicker = null;
      haptic('select');
      render();

    function showNoteInput(id, e) {
      if (e) e.stopPropagation();
      openNoteInput = openNoteInput === id ? null : id;
      openDeferPicker = null;
      render();
      if (openNoteInput) {
        setTimeout(() => {
          const inp = document.getElementById('note-input-' + id);
          if (inp) inp.focus();
        }, 50);
      }
    }

    function saveNote(id, fromBlur) {
      const inp = document.getElementById('note-input-' + id);
      if (!inp) return;
      // Fix race condition: don't save from blur if we're closing via Enter
      if (fromBlur && openNoteInput !== id) return;
      const text = inp.value.trim();
      if (text) {
        taskNotes[id] = text;
      } else {
        delete taskNotes[id];
      }
      openNoteInput = null;
      saveState(); render();
      showToast(text ? 'Note saved' : 'Note removed');
    }

    function showDeferPicker(id, e) {
      if (e) e.stopPropagation();
      openDeferPicker = openDeferPicker === id ? null : id;
      openNoteInput = null;
      render();
    }

    function deferTask(id, targetDay) {
      if (isTaskLocked(id)) { showToast('Day is locked'); haptic('error'); return; }
      taskDeferred[id] = targetDay;
      openActions = null;
      openDeferPicker = null;
      haptic('medium');
      saveState(); render();
      showToast('Deferred to ' + targetDay);
    }

    function clearTask(id, e) {
      if (e) e.stopPropagation();
      if (isTaskLocked(id)) { showToast('Day is locked'); return; }
      delete checked[id];
      delete taskNotes[id];
      delete taskDeferred[id];
      openActions = null;
      saveState(); render();
      showToast('Cleared');

      section.items.forEach(item => {

    function getDayMeals(dayIdx) {
      // Get the date for a given day index in the current week
      const now = nowInTZ();
      const currentDay = now.getDay() === 0 ? 6 : now.getDay() - 1;
      const diff = dayIdx - currentDay;
      const target = new Date(now);
      target.setDate(target.getDate() + diff);
      const key = target.getFullYear() + '-' +
        String(target.getMonth() + 1).padStart(2, '0') + '-' +
        String(target.getDate()).padStart(2, '0');
      return mealData[key] || null;
    }

    function parseMealText(text) {
      // Parse pasted meal text into structured data
      // Supports various formats: tab-separated, line-separated, etc.
      const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
      const newData = {};
      let currentDate = null;
      let currentType = 'ogle'; // default to lunch

      // Turkish day names to detect dates
      const trDays = { 'pazartesi': 1, 'sali': 2, 'salı': 2, 'carsamba': 3, 'çarşamba': 3,
                        'persembe': 4, 'perşembe': 4, 'cuma': 5, 'cumartesi': 6, 'pazar': 0 };
      const months = { 'ocak': 1, 'şubat': 2, 'subat': 2, 'mart': 3, 'nisan': 4, 'mayıs': 5, 'mayis': 5,
                        'haziran': 6, 'temmuz': 7, 'ağustos': 8, 'agustos': 8, 'eylül': 9, 'eylul': 9,
                        'ekim': 10, 'kasım': 11, 'kasim': 11, 'aralık': 12, 'aralik': 12 };

      for (const line of lines) {
        const lower = line.toLowerCase();

        // Detect date patterns: "10 Mart 2026", "10.03.2026", "2026-03-10"
        const dateMatch1 = line.match(/(\d{1,2})\s+(\w+)\s+(\d{4})/);
        const dateMatch2 = line.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
        const dateMatch3 = line.match(/(\d{4})-(\d{2})-(\d{2})/);

        if (dateMatch3) {
          currentDate = dateMatch3[0];
          if (!newData[currentDate]) newData[currentDate] = { kahvalti: [], ogle: [], aksam: [] };
          continue;
        }
        if (dateMatch2) {
          currentDate = `${dateMatch2[3]}-${dateMatch2[2].padStart(2,'0')}-${dateMatch2[1].padStart(2,'0')}`;
          if (!newData[currentDate]) newData[currentDate] = { kahvalti: [], ogle: [], aksam: [] };
          continue;
        }
        if (dateMatch1 && months[dateMatch1[2].toLowerCase()]) {
          const m = months[dateMatch1[2].toLowerCase()];
          currentDate = `${dateMatch1[3]}-${String(m).padStart(2,'0')}-${dateMatch1[1].padStart(2,'0')}`;
          if (!newData[currentDate]) newData[currentDate] = { kahvalti: [], ogle: [], aksam: [] };
          continue;
        }

        // Detect day name with date: "Pazartesi 10"
        for (const [dayName, dayNum] of Object.entries(trDays)) {
          if (lower.includes(dayName)) {
            const numMatch = line.match(/(\d{1,2})/);
            if (numMatch) {
              const now = nowInTZ();
              const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${numMatch[1].padStart(2,'0')}`;
              currentDate = dateStr;
              if (!newData[currentDate]) newData[currentDate] = { kahvalti: [], ogle: [], aksam: [] };
            }
            break;
          }
        }

        // Detect meal type headers
        if (lower.includes('kahvalt') || lower.includes('breakfast')) {
          currentType = 'kahvalti'; continue;
        }
        if (lower.includes('öğle') || lower.includes('ogle') || lower.includes('lunch')) {
          currentType = 'ogle'; continue;
        }
        if (lower.includes('akşam') || lower.includes('aksam') || lower.includes('dinner')) {
          currentType = 'aksam'; continue;
        }

        // If we have a date context, add as food item
        if (currentDate && newData[currentDate]) {
          // Skip header-like lines
          if (lower === 'tarih' || lower === 'gün' || lower === 'gun' || lower === 'menü' || lower === 'menu') continue;
          // Clean up and add
          const clean = line.replace(/^\d+[\.\)]\s*/, '').replace(/\t+/g, ' ').trim();
          if (clean.length > 1 && clean.length < 100) {
            newData[currentDate][currentType].push(clean);
          }
        }
      }

      return newData;
    }

    function parseMealHTML(html) {
      // Try to parse meal data from the SKS HTML page
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const newData = {};

      // Try table format
      const tables = doc.querySelectorAll('table');
      for (const table of tables) {
        const rows = table.querySelectorAll('tr');
        for (const row of rows) {
          const cells = row.querySelectorAll('td, th');
          if (cells.length < 2) continue;
          const firstCell = cells[0].textContent.trim();
          // Check if first cell is a date
          const dateMatch = firstCell.match(/(\d{1,2})[\.\s\/](\d{1,2})[\.\s\/](\d{4})/);
          if (dateMatch) {
            const key = `${dateMatch[3]}-${dateMatch[2].padStart(2,'0')}-${dateMatch[1].padStart(2,'0')}`;
            if (!newData[key]) newData[key] = { kahvalti: [], ogle: [], aksam: [] };
            for (let i = 1; i < cells.length; i++) {
              const items = cells[i].textContent.trim().split(/[,\n]/).map(s => s.trim()).filter(Boolean);
              if (i === 1) newData[key].ogle.push(...items);
              if (i === 2) newData[key].aksam.push(...items);
            }
          }
        }
      }

      // Try div/list format
      if (Object.keys(newData).length === 0) {
        const text = doc.body ? doc.body.textContent : '';
        return parseMealText(text);
      }

      return newData;
    }

    async function fetchMeals() {
      mealFetchStatus = 'fetching';
      render();

      for (const makeUrl of MEAL_CORS_PROXIES) {
        try {
          const url = makeUrl(MEAL_URL);
          const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
          if (!res.ok) continue;
          const html = await res.text();
          if (html.length < 200) continue;
          const parsed = parseMealHTML(html);
          if (Object.keys(parsed).length > 0) {
            Object.assign(mealData, parsed);
            saveMeals();
            mealFetchStatus = 'ok';
            render();
            showToast('Meal menu loaded');
            return;
          }
        } catch (e) {
          continue;
        }
      }

      // Also try the alternate URL
      for (const makeUrl of MEAL_CORS_PROXIES) {
        try {
          const url = makeUrl('https://yemek.istanbul.edu.tr/');
          const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
          if (!res.ok) continue;
          const html = await res.text();
          if (html.length < 200) continue;
          const parsed = parseMealHTML(html);
          if (Object.keys(parsed).length > 0) {

    // ── Swipe gestures ──
    let swipeState = null;
    const SWIPE_THRESHOLD = 80;

    function initSwipeListeners() {
      document.addEventListener('touchstart', function(e) {
        const wrap = e.target.closest('.item-swipe-wrap');
        if (!wrap) return;
        const touch = e.touches[0];
        swipeState = {
          id: wrap.dataset.swipeId,
          startX: touch.clientX,
          startY: touch.clientY,
          el: wrap,
          inner: wrap.querySelector('.item-swipe-inner'),
          bgRight: wrap.querySelector('.swipe-bg-right'),
          bgLeft: wrap.querySelector('.swipe-bg-left'),
          locked: false,
          swiping: false,
        };
      }, { passive: true });

      document.addEventListener('touchmove', function(e) {
        if (!swipeState) return;
        const touch = e.touches[0];
        const dx = touch.clientX - swipeState.startX;
        const dy = touch.clientY - swipeState.startY;

        // If vertical scroll is dominant, cancel swipe
        if (!swipeState.locked && Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 10) {
          swipeState = null;
          return;
        }
        if (Math.abs(dx) > 10) swipeState.locked = true;
        if (!swipeState.locked) return;

        swipeState.swiping = true;
        const clamped = Math.max(-150, Math.min(150, dx));
        swipeState.inner.style.transition = 'none';
        swipeState.inner.style.transform = `translateX(${clamped}px)`;

        // Show/hide swipe indicators
        const indRight = swipeState.el.querySelector('.swipe-indicator-right');
        const indLeft = swipeState.el.querySelector('.swipe-indicator-left');

        if (clamped > SWIPE_THRESHOLD) {
          swipeState.bgRight.classList.add('visible');
          swipeState.bgLeft.classList.remove('visible');
          if (indRight && !indRight.classList.contains('active')) {
            indRight.classList.add('active');
            haptic('light');
          }
          if (indLeft) indLeft.classList.remove('active');
        } else if (clamped < -SWIPE_THRESHOLD) {
          swipeState.bgLeft.classList.add('visible');
          swipeState.bgRight.classList.remove('visible');
          if (indLeft && !indLeft.classList.contains('active')) {
            indLeft.classList.add('active');
            haptic('light');
          }
          if (indRight) indRight.classList.remove('active');
        } else {
          swipeState.bgRight.classList.remove('visible');
          swipeState.bgLeft.classList.remove('visible');
          if (indRight) indRight.classList.remove('active');
          if (indLeft) indLeft.classList.remove('active');
        }
      }, { passive: true });

      document.addEventListener('touchend', function(e) {
        if (!swipeState || !swipeState.swiping) {
          swipeState = null;
          return;
        }
        const inner = swipeState.inner;
        const transform = inner.style.transform;
        const match = transform.match(/translateX\(([-.0-9]+)px\)/);
        const dx = match ? parseFloat(match[1]) : 0;

        inner.style.transition = 'transform 0.2s ease-out';
        inner.style.transform = 'translateX(0)';

        if (dx > SWIPE_THRESHOLD) {
          haptic('success');
          toggle(swipeState.id);
        } else if (dx < -SWIPE_THRESHOLD) {
          haptic('medium');
          setTaskStatus(swipeState.id, 'skip');
        }

        swipeState = null;
      }, { passive: true });
    }

    function resetDay() {
      if (isDayLocked(DAYS[selectedDay])) { showToast('Day is locked'); return; }
      if (!confirm(`Reset all tasks for ${DAYS[selectedDay]}?`)) return;
      const dayName = DAYS[selectedDay];
      schedule[dayName].sections.forEach(s => s.items.forEach(item => {
        delete checked[item.id];
        delete taskNotes[item.id];
        delete taskDeferred[item.id];
      }));
      saveState();
      render();

    // ── Progress ──
    function getDayProgress(dayName) {
      const day = schedule[dayName];
      let total = 0, done = 0;
      day.sections.forEach(s => s.items.forEach(item => {
        if (taskDeferred[item.id] && taskDeferred[item.id] !== dayName) return; // deferred out
        total++;
        const st = getStatus(item.id);
        if (st === 'done' || st === 'skip') done++;
      }));
      // Count deferred tasks coming IN from other days
      Object.entries(taskDeferred).forEach(([id, target]) => {
        if (target === dayName) {
          total++;
          const st = getStatus(id);
          if (st === 'done' || st === 'skip') done++;
        }
      });
      return { total, done, pct: total ? Math.round((done / total) * 100) : 0 };
    }

    function getWeeklyProgress() {
      let total = 0, done = 0;
      DAYS.forEach(d => { const p = getDayProgress(d); total += p.total; done += p.done; });
      return { total, done, pct: total ? Math.round((done / total) * 100) : 0 };
    }

    // ── Time-aware sections ──
    function getCurrentSectionIndex(sections) {
      const now = nowInTZ();
      const h = now.getHours() + now.getMinutes() / 60;
      const times = sections.map((s, i) => {
        for (const item of s.items) {
          const m = item.text.match(/(\d{1,2}):(\d{2})/);
          if (m) return parseInt(m[1]) + parseInt(m[2]) / 60;
        }
        const l = s.label.toLowerCase();
        if (l.includes('before') || l.includes('morning') || l.includes('core')) return 8;
        if (l.includes('after') || l.includes('afternoon')) return 15;
        if (l.includes('evening')) return 18;
        if (l.includes('class') || l.includes('meeting')) return 9;
        return 8 + i * 3;
      });
      let idx = 0;
      for (let i = 0; i < times.length; i++) { if (h >= times[i]) idx = i; }
      return idx;
    }

    // ── Export / Import ──
    function exportData() {
      const data = { checked, notes: taskNotes, deferred: taskDeferred, history: loadHistory(), weekKey: getWeekKey(), exported: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `study-plan-${getWeekKey()}.json`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function importData() {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const data = JSON.parse(ev.target.result);
            if (typeof data !== 'object' || data === null) { showToast('Invalid file format'); return; }
            const validStates = ['done', 'skip', 'progress'];
            if (data.checked && typeof data.checked === 'object') {
              // Validate: keys should match task ID pattern, values should be valid states
              const clean = {};
              for (const [k, v] of Object.entries(data.checked)) {
                if (/^[a-z]{3}-\d+$/.test(k) && (v === true || validStates.includes(v))) clean[k] = v;
              }
              checked = clean;
            }
            if (data.notes && typeof data.notes === 'object') {
              const clean = {};
              for (const [k, v] of Object.entries(data.notes)) {
                if (/^[a-z]{3}-\d+$/.test(k) && typeof v === 'string' && v.length < 1000) clean[k] = v;
              }
              taskNotes = clean;
            }
            if (data.deferred && typeof data.deferred === 'object') {
              const clean = {};
              for (const [k, v] of Object.entries(data.deferred)) {
                if (/^[a-z]{3}-\d+$/.test(k) && DAYS.includes(v)) clean[k] = v;
              }
              taskDeferred = clean;
            }
            saveState();
            if (data.history && typeof data.history === 'object') {
              const cleanHist = {};
              for (const [k, v] of Object.entries(data.history)) {
                if (/^sp26-w\d+$/.test(k) && typeof v === 'number' && v >= 0 && v <= 100) cleanHist[k] = v;
              }
              localStorage.setItem(HISTORY_KEY, JSON.stringify(cleanHist));
            }
            render();
            showToast('Data imported');
          } catch (err) { showToast('Invalid file'); }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function saveSyncCreds(email, password) {
      sessionStorage.setItem(SYNC_CREDS_KEY, JSON.stringify({ email, password }));
    }

    function loadFirebaseSDK() {
      if (window.firebase && window.firebase.auth && window.firebase.database) return Promise.resolve();
      if (firebaseSDKPromise) return firebaseSDKPromise;

      const scripts = [
        ['https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js', 'Firebase app SDK'],
        ['https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js', 'Firebase auth SDK'],
        ['https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js', 'Firebase database SDK'],
      ];

      firebaseSDKPromise = scripts.reduce((promise, [src, label]) => {
        return promise.then(() => new Promise((resolve, reject) => {
          if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
          const script = document.createElement('script');
          script.src = src;
          script.onload = resolve;
          script.onerror = () => reject(new Error(`Failed to load ${label}`));
          document.head.appendChild(script);
        }));
      }, Promise.resolve()).catch(err => {
        firebaseSDKPromise = null;
        throw err;
      });

      return firebaseSDKPromise;
    }

    function parseFirebaseConfig(text) {
      function fillDatabaseURL(obj) {
        if (!obj.databaseURL && obj.projectId) {
          obj.databaseURL = 'https://' + obj.projectId + '-default-rtdb.firebaseio.com';
        }
        return (obj.apiKey && obj.projectId) ? obj : null;
      }
      // Try direct JSON
      try { const obj = JSON.parse(text); if (fillDatabaseURL(obj)) return obj; } catch (e) { }
      // Find the object containing apiKey and convert JS object literal to JSON
      const match = text.match(/\{[^{}]*apiKey[^{}]*\}/s);
      if (match) {
        try {
          // Convert JS object literal to valid JSON (quote unquoted keys)
          const jsonStr = match[0].replace(/(['"])?(\w+)(['"])?\s*:/g, '"$2":').replace(/'/g, '"').replace(/,\s*}/g, '}');
          const obj = JSON.parse(jsonStr);
          if (obj && typeof obj === 'object' && fillDatabaseURL(obj)) return obj;
        } catch (e) { }
      }
      return null;
    }

    async function initSync(config, email, password) {
      syncStatus = 'syncing';
      updateSyncDot();

      await loadFirebaseSDK();

      if (!firebase.apps.length) {
        firebase.initializeApp(config);
      }

      // Sign in with email/password
      if (!firebase.auth().currentUser) {
        try {
          await firebase.auth().signInWithEmailAndPassword(email, password);
        } catch (err) {
          if (err.code === 'auth/user-not-found') {
            await firebase.auth().createUserWithEmailAndPassword(email, password);
          } else {
            throw err;
          }
        }
      }

      syncUid = firebase.auth().currentUser.uid;
      const db = firebase.database();
      const base = 'users/' + syncUid + '/study/';

      // Connection monitoring
      if (syncConnectionRef && syncConnectionListener) syncConnectionRef.off('value', syncConnectionListener);
      syncConnectionRef = db.ref('.info/connected');
      syncConnectionListener = syncConnectionRef.on('value', snap => {
        syncStatus = snap.val() ? 'connected' : 'offline';
        updateSyncDot();
      });

      // Listen for task states
      if (syncRef && syncListener) syncRef.off('value', syncListener);
      syncRef = db.ref(base + getWeekKey());
      syncListener = syncRef.on('value', snap => {
        if (ignoreNextRemote) { ignoreNextRemote = false; return; }
        if (snap.exists()) {
          checked = snap.val();
          localStorage.setItem(getWeekKey(), JSON.stringify(checked));
          render();
        }
      });

      // Listen for notes
      if (syncNotesRef && syncNotesListener) syncNotesRef.off('value', syncNotesListener);
      syncNotesRef = db.ref(base + getWeekKey() + '-notes');
      syncNotesListener = syncNotesRef.on('value', snap => {
        if (snap.exists()) {
          taskNotes = snap.val();
          localStorage.setItem(getWeekKey() + '-notes', JSON.stringify(taskNotes));
          render();
        }
      });

      // Listen for deferred
      if (syncDeferRef && syncDeferListener) syncDeferRef.off('value', syncDeferListener);
      syncDeferRef = db.ref(base + getWeekKey() + '-defer');
      syncDeferListener = syncDeferRef.on('value', snap => {
        if (snap.exists()) {
          taskDeferred = snap.val();
          localStorage.setItem(getWeekKey() + '-defer', JSON.stringify(taskDeferred));
          render();
        }
      });

      // Listen for history
      if (syncHistoryRef && syncHistoryListener) syncHistoryRef.off('value', syncHistoryListener);
      syncHistoryRef = db.ref(base + 'history');
      syncHistoryListener = syncHistoryRef.on('value', snap => {
        if (snap.exists()) {
          localStorage.setItem(HISTORY_KEY, JSON.stringify(snap.val()));
        }
      });

      firebaseReady = true;
      saveSyncConfig(config);
      saveSyncCreds(email, password);

      // Push local data on first connect
      syncPush();
    }

    let syncPushTimer = null;
    function syncPush() {
      if (!firebaseReady || !syncRef) return;
      clearTimeout(syncPushTimer);
      syncPushTimer = setTimeout(() => {
        ignoreNextRemote = true;
        syncRef.set(checked).catch(err => {
          ignoreNextRemote = false;
          console.error('Sync write failed:', err.message);
          showToast('Sync write failed \u2014 check Firebase rules');
        });
        if (syncNotesRef) syncNotesRef.set(taskNotes).catch(err => console.warn('Notes sync failed:', err.message));
        if (syncDeferRef) syncDeferRef.set(taskDeferred).catch(err => console.warn('Defer sync failed:', err.message));
        if (syncHistoryRef) {
          syncHistoryRef.set(loadHistory()).catch(err => console.warn('History sync failed:', err.message));
        }
      }, 500);
    }

    function updateSyncDot() {
      const dot = document.getElementById('sync-dot');
      if (!dot) return;
      dot.className = 'sync-dot ' + (getSyncConfig() || HARDCODED_CONFIG ? syncStatus : 'hidden');
      dot.title = syncStatus === 'connected' ? 'Synced' :
        syncStatus === 'syncing' ? 'Syncing\u2026' : 'Offline';
    }

    async function connectSync() {
      const input = document.getElementById('sync-config-input');
      const emailInput = document.getElementById('sync-email');
      const passInput = document.getElementById('sync-password');
      const msg = document.getElementById('sync-msg');
      if (!input || !msg) return;

      const config = parseFirebaseConfig(input.value.trim());
      if (!config) {
        msg.className = 'sync-msg err';
        msg.textContent = 'Could not parse config. Paste the full firebaseConfig object.';
        return;
      }

      const email = emailInput ? emailInput.value.trim() : '';
      const password = passInput ? passInput.value : '';
      if (!email || !password) {
        msg.className = 'sync-msg err';
        msg.textContent = 'Enter an email and password.';
        return;
      }

      msg.className = 'sync-msg wait';
      msg.textContent = 'Connecting\u2026';

      try {
        await initSync(config, email, password);
        render();
        showToast('Sync connected');
      } catch (err) {
        firebaseReady = false;
        syncStatus = 'offline';
        updateSyncDot();
        msg.className = 'sync-msg err';
        const friendly = err.code === 'auth/wrong-password' ? 'Wrong password.' :
          err.code === 'auth/invalid-email' ? 'Invalid email.' :
            err.code === 'auth/weak-password' ? 'Password must be at least 6 characters.' :
              err.message;
        msg.textContent = 'Failed: ' + friendly;
      }
    }

    function disconnectSync() {
      if (syncRef && syncListener) syncRef.off('value', syncListener);
      if (syncConnectionRef && syncConnectionListener) syncConnectionRef.off('value', syncConnectionListener);
      if (syncHistoryRef && syncHistoryListener) syncHistoryRef.off('value', syncHistoryListener);
      if (syncNotesRef && syncNotesListener) syncNotesRef.off('value', syncNotesListener);
      if (syncDeferRef && syncDeferListener) syncDeferRef.off('value', syncDeferListener);
      try {
        if (firebase.apps.length) {
          firebase.auth().signOut().catch(err => console.warn('Sign-out failed:', err.message));
        }
      } catch (e) { console.warn('Disconnect error:', e.message); }
      localStorage.removeItem(SYNC_CONFIG_KEY);
      sessionStorage.removeItem(SYNC_CREDS_KEY);
      firebaseReady = false;
      syncRef = null; syncListener = null;
      syncConnectionRef = null; syncConnectionListener = null;
      syncHistoryRef = null; syncHistoryListener = null;
      syncNotesRef = null; syncNotesListener = null;
      syncDeferRef = null; syncDeferListener = null;
      syncUid = null;
      syncStatus = 'offline';
      render();
      showToast('Sync disconnected');
    }

    async function setupStoredSync() {
      const config = HARDCODED_CONFIG || getSyncConfig();
      const creds = getSyncCreds();
      if (!config || !creds) return;

      try {
        await initSync(config, creds.email, creds.password);
        render();
      } catch (err) {
        firebaseReady = false;
        syncStatus = 'offline';
        updateSyncDot();
        console.warn('Auto-sync failed:', err.message);
      }
    }

    // ── Schedule Editor ──
    function addTaskToSection(dayName, sectionIdx, text, cat, hint) {
      const section = schedule[dayName].sections[sectionIdx];
      if (!section || !text.trim()) return;
      // Generate unique ID
      const dayPrefix = dayName.slice(0, 3).toLowerCase();
      let maxNum = 0;
      schedule[dayName].sections.forEach(s => s.items.forEach(item => {
        const m = item.id.match(new RegExp('^' + dayPrefix + '-(\\d+)$'));
        if (m) maxNum = Math.max(maxNum, parseInt(m[1]));
      }));
      const newId = dayPrefix + '-' + (maxNum + 1);
      section.items.push({ id: newId, text: text.trim(), hint: hint || null, cat: cat || 'homework' });
      // Add cat to CAT if not present (use default colors)
      if (!CAT[cat]) {
        CAT[cat] = { bg: '#1a1a1a', border: '#888' };
        CAT_LABEL[cat] = cat.toUpperCase();
      }
      saveScheduleToStorage();
      render();
      showToast('Task added');
    }

    function removeTaskFromSchedule(dayName, sectionIdx, itemIdx) {
      const section = schedule[dayName].sections[sectionIdx];
      if (!section) return;
      const item = section.items[itemIdx];
      if (item) {
        delete checked[item.id];
        delete taskNotes[item.id];
        delete taskDeferred[item.id];
      }
      section.items.splice(itemIdx, 1);
      saveScheduleToStorage();
      saveState();
      render();
      showToast('Task removed');
    }

    function saveScheduleToStorage() {
      try {
        localStorage.setItem('sp26-custom-schedule', JSON.stringify(schedule));
      } catch (e) { console.warn('Failed to save schedule:', e.message); }
    }

    function loadCustomSchedule() {
      try {
        const raw = localStorage.getItem('sp26-custom-schedule');
        if (!raw) return;
        const custom = JSON.parse(raw);
        if (typeof custom !== 'object') return;
        for (const day of DAYS) {
          if (custom[day] && custom[day].sections) {
            schedule[day] = custom[day];
          }
        }
      } catch (e) { console.warn('Failed to load custom schedule:', e.message); }
    }

    // Load custom schedule overrides
    loadCustomSchedule();
