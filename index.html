        const fabDay = schedule[DAYS[selectedDay]];
        fabHtml += `<div class="fab-panel" onclick="event.stopPropagation()">
          <div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:600">Quick add to ${DAYS[selectedDay]}</div>
          <input id="fab-text" type="text" placeholder="Task text..." onkeydown="if(event.key==='Enter')fabAddTask()">
          <div class="fab-panel-row">
            <select id="fab-cat" style="flex:1">`;
        Object.keys(CAT).forEach(k => {
          fabHtml += `<option value="${k}">${CAT_LABEL[k] || k}</option>`;
        });
        fabHtml += `</select>
            <select id="fab-section" style="flex:1">`;
        fabDay.sections.forEach((s, i) => {
          fabHtml += `<option value="${i}">${s.label}</option>`;
        });
        fabHtml += `</select>
          </div>
          <button class="fab-add-btn" onclick="fabAddTask()" style="margin-top:8px">Add Task</button>
        </div>`;
      }
      fabEl.innerHTML = fabHtml;

      requestAnimationFrame(() => window.scrollTo(0, scrollY));
    }

    function selectDay(i) {
      lastDayDirection = i > selectedDay ? 'right' : (i < selectedDay ? 'left' : null);
      selectedDay = i;
      viewMode = 'day';
      haptic('select');
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setViewMode(mode) {
      viewMode = mode;
      render();
    }

    // ── Swipe (with vertical guard) ──
    let touchStartX = 0, touchStartY = 0;
    document.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });
    document.addEventListener('touchend', e => {
      const diffX = e.changedTouches[0].screenX - touchStartX;
      const diffY = e.changedTouches[0].screenY - touchStartY;
      if (Math.abs(diffY) > Math.abs(diffX)) return;
      if (Math.abs(diffX) > 60) {
        if (diffX < 0 && selectedDay < 6) selectDay(selectedDay + 1);
        else if (diffX > 0 && selectedDay > 0) selectDay(selectedDay - 1);
      }
    }, { passive: true });

    // ── Keyboard ──
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        const el = document.activeElement;
        if (el && el.dataset.taskId) { e.preventDefault(); toggle(el.dataset.taskId); return; }
        if (el && el.dataset.panelId) { e.preventDefault(); togglePanel(el.dataset.panelId); return; }
      }
      if (e.key === 'ArrowRight' && selectedDay < 6) selectDay(selectedDay + 1);
      if (e.key === 'ArrowLeft' && selectedDay > 0) selectDay(selectedDay - 1);
    });

    // ── PWA Manifest ──
    (function () {
      const m = {
        name: 'Study Plan', short_name: 'Study', start_url: '.', display: 'standalone',
        background_color: '#09090b', theme_color: '#09090b',
        icons: [{ src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>\ud83d\udcd8</text></svg>", sizes: 'any', type: 'image/svg+xml' }]
      };
      const l = document.createElement('link'); l.rel = 'manifest';
      l.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(m));
      document.head.appendChild(l);
    })();

    // ── Service Worker ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(err => {
        console.warn('SW registration failed:', err.message);
      });
    }

    // ── Schedule migration ──
    // Preserves progress when schedule task IDs change across updates
    function getScheduleFingerprint() {
      const ids = [];
      DAYS.forEach(d => schedule[d].sections.forEach(s => s.items.forEach(item => ids.push(item.id))));
      return ids.join(',');
    }

    function buildTextToIdMap() {
      // Maps normalized task text+day → task id for current schedule
      // Uses day prefix to handle duplicate task texts across days
      const map = {};
      const seen = {};
      DAYS.forEach(d => schedule[d].sections.forEach(s => s.items.forEach(item => {
        const key = item.text.trim().toLowerCase();
        const uniqueKey = d + '::' + key;
        map[uniqueKey] = item.id;
        // Also store plain text key only if not a duplicate
        if (!seen[key]) {
          map[key] = item.id;
          seen[key] = true;
        }
      })));
      return map;
    }

    function buildIdToTextMap() {
      // For current schedule, maps id → { text, day } for migration
      const map = {};
      DAYS.forEach(d => schedule[d].sections.forEach(s => s.items.forEach(item => {
        map[item.id] = { text: item.text.trim().toLowerCase(), day: d };
      })));
      return map;
    }

    function getCurrentIds() {
      const ids = new Set();
      DAYS.forEach(d => schedule[d].sections.forEach(s => s.items.forEach(item => ids.add(item.id))));
      return ids;
    }

    function migrateProgress() {
      const fpKey = getWeekKey() + '-schedule-fp';
      const textMapKey = getWeekKey() + '-schedule-textmap';
      const currentFp = getScheduleFingerprint();
      const storedFp = localStorage.getItem(fpKey);

      if (storedFp === currentFp) return; // no change

      // First run — just store fingerprint and text map
      if (!storedFp) {
        localStorage.setItem(fpKey, currentFp);
        localStorage.setItem(textMapKey, JSON.stringify(buildIdToTextMap()));
        return;
      }

      // Schedule changed — attempt migration
      let oldTextMap = {};
      try {
        const raw = localStorage.getItem(textMapKey);
        if (raw) oldTextMap = JSON.parse(raw);
      } catch (e) { /* ignore */ }

      const newTextToId = buildTextToIdMap();
      const currentIds = getCurrentIds();
      let migrated = 0;

      // Build reverse map: old id → old text
      // Then find matching new id by text
      const newChecked = {};
      const newNotes = {};
      const newDeferred = {};

      // First, keep all entries that still have valid IDs
      for (const [id, val] of Object.entries(checked)) {
        if (currentIds.has(id)) {
          newChecked[id] = val;
        }
      }
      for (const [id, val] of Object.entries(taskNotes)) {
        if (currentIds.has(id)) {
          newNotes[id] = val;
        }
      }
      for (const [id, val] of Object.entries(taskDeferred)) {
        if (currentIds.has(id)) {
          newDeferred[id] = val;
        }
      }

      // Then, try to migrate orphaned entries by matching text (with day disambiguation)
      function findNewId(oldId) {
        const entry = oldTextMap[oldId];
        if (!entry) return null;
        const text = typeof entry === 'string' ? entry : entry.text;
        const day = typeof entry === 'object' ? entry.day : null;
        // Try day-specific match first (handles duplicates)
        if (day) {
          const dayKey = day + '::' + text;
          if (newTextToId[dayKey]) return newTextToId[dayKey];
        }
        // Fall back to plain text match
        return newTextToId[text] || null;
      }

      for (const [oldId, val] of Object.entries(checked)) {
        if (currentIds.has(oldId)) continue;
        const newId = findNewId(oldId);
        if (newId && !newChecked[newId]) {
          newChecked[newId] = val;
          migrated++;
        }
      }
      for (const [oldId, val] of Object.entries(taskNotes)) {
        if (currentIds.has(oldId)) continue;
        const newId = findNewId(oldId);
        if (newId && !newNotes[newId]) {
          newNotes[newId] = val;
          migrated++;
        }
      }
      for (const [oldId, val] of Object.entries(taskDeferred)) {
        if (currentIds.has(oldId)) continue;
        const newId = findNewId(oldId);
        if (newId && !newDeferred[newId]) {
          newDeferred[newId] = val;
          migrated++;
        }
      }

      checked = newChecked;
      taskNotes = newNotes;
      taskDeferred = newDeferred;

      // Save new fingerprint and text map
      localStorage.setItem(fpKey, currentFp);
      localStorage.setItem(textMapKey, JSON.stringify(buildIdToTextMap()));
      saveState();

      if (migrated > 0) {
        setTimeout(() => showToast(`Schedule updated \u2014 migrated ${migrated} item(s)`), 500);
      } else if (Object.keys(checked).length > 0 || Object.keys(taskNotes).length > 0) {
        setTimeout(() => showToast('Schedule updated \u2014 progress preserved'), 500);
      }
    }

    // ── Init ──
    loadState();
    migrateProgress();
    render();

    // Auto-connect sync if previously configured
    (function () {
      setupStoredSync().catch(err => {
        console.warn('Auto-sync failed:', err.message);
      });
    })();
  </script>
</body>

</html>
